<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成したRPG攻撃効果音8種（味方4・敵4）。咆哮はライオン音響ベースのフォルマント設計。" />
<title>攻撃の効果音 | Battle SFX</title>
</head>
<body>
<style>
  :root{ --ink:#eef2ff; --ally:#49d0ff; --ally2:#2f7fe0; --foe:#ff5470; --foe2:#a11238; --panel:#141a2e; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 20% 0%,#12203c,transparent 55%),
        radial-gradient(120% 80% at 90% 100%,#2a0f1e,transparent 55%),
        linear-gradient(180deg,#070a14,#0a0e1c);
    color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .board{width:min(680px,100%);border:1px solid #26304d;border-radius:20px;
    background:linear-gradient(180deg,rgba(18,24,44,.94),rgba(9,12,22,.97));
    box-shadow:0 30px 80px rgba(0,0,0,.6);padding:26px 24px 28px;overflow:hidden}
  .tag{font-size:11px;letter-spacing:.42em;color:#8fa2d6;text-transform:uppercase;text-align:center;opacity:.85}
  h1{text-align:center;font-size:clamp(24px,5.6vw,36px);font-weight:800;letter-spacing:.08em;margin:4px 0 2px;
    background:linear-gradient(90deg,#49d0ff,#fff 50%,#ff5470);-webkit-background-clip:text;background-clip:text;color:transparent}
  .subtitle{text-align:center;color:#7f8bb0;font-size:13px;letter-spacing:.2em;margin-bottom:18px}

  .arena{position:relative;height:120px;border-radius:14px;overflow:hidden;margin-bottom:20px;
    border:1px solid #26304d;background:radial-gradient(80% 120% at 50% 120%,#20304e,#0b1120 70%);
    display:flex;align-items:center;justify-content:space-between;padding:0 40px}
  .arena.shake{animation:ashake .32s}
  @keyframes ashake{0%,100%{transform:translate(0)}20%{transform:translate(-6px,3px)}40%{transform:translate(5px,-3px)}60%{transform:translate(-4px,2px)}80%{transform:translate(3px,-1px)}}
  .arena.megashake{animation:mshake .55s}
  @keyframes mshake{0%,100%{transform:translate(0)}10%{transform:translate(-10px,5px)}25%{transform:translate(9px,-6px)}40%{transform:translate(-7px,4px)}55%{transform:translate(6px,-3px)}70%{transform:translate(-4px,2px)}85%{transform:translate(2px,-1px)}}
  .fighter{font-size:60px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5));transition:transform .08s}
  .hero.hit{animation:hurt .3s}
  .foe.hit{animation:hurt .3s}
  @keyframes hurt{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px) rotate(-6deg)}75%{transform:translateX(8px) rotate(6deg)}}
  .flash{position:absolute;inset:0;opacity:0;pointer-events:none}
  .flash.ally{background:radial-gradient(circle at 72% 50%,rgba(73,208,255,.55),transparent 55%)}
  .flash.foe{background:radial-gradient(circle at 28% 50%,rgba(255,84,112,.55),transparent 55%)}
  .flash.white{background:rgba(255,255,255,.85)}
  .flash.show{animation:fl .3s}
  @keyframes fl{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
  .pop{position:absolute;top:45%;font-size:38px;opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.4)}
  .pop.show{animation:popa .5s ease-out}
  @keyframes popa{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(.9) translateY(-16px)}}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:520px){.cols{grid-template-columns:1fr}}
  .side{border:1px solid #26304d;border-radius:14px;padding:14px 12px;background:rgba(255,255,255,.02)}
  .side h2{font-size:13px;letter-spacing:.18em;text-align:center;margin-bottom:10px;font-weight:800}
  .side.ally h2{color:var(--ally)} .side.foe h2{color:var(--foe)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:11px;padding:14px 6px;font-size:13px;font-weight:700;
    letter-spacing:.04em;color:#0a1020;transition:transform .1s,filter .2s;line-height:1.3}
  .ally button{background:linear-gradient(180deg,#8fe6ff,#3ab6ea);box-shadow:0 6px 16px rgba(58,182,234,.32),inset 0 1px 0 rgba(255,255,255,.6)}
  .foe button{background:linear-gradient(180deg,#ff8a9d,#e5405f);color:#2a0510;box-shadow:0 6px 16px rgba(229,64,95,.32),inset 0 1px 0 rgba(255,255,255,.4)}
  button:hover{transform:translateY(-2px);filter:brightness(1.06)} button:active{transform:translateY(1px)}
  .emoji{font-size:20px;display:block;margin-bottom:3px}
  .volrow{display:flex;gap:8px;align-items:center;justify-content:center;color:#7f8bb0;font-size:12px;margin-top:18px}
  input[type=range]{accent-color:#8fa2d6;width:150px}
  .hint{text-align:center;color:#6d7aa0;font-size:12px;margin-top:14px;line-height:1.7}
</style>

<div class="board">
  <div class="tag">◆ Battle SFX ◆</div>
  <h1>攻撃の効果音</h1>
  <div class="subtitle">味方 4 &nbsp;vs&nbsp; 敵 4</div>

  <div class="arena" id="arena">
    <div class="flash ally" id="flashAlly"></div>
    <div class="flash foe" id="flashFoe"></div>
    <div class="flash white" id="flashWhite"></div>
    <div class="fighter hero" id="hero">🦸</div>
    <div class="fighter foe" id="foe">👹</div>
    <div class="pop" id="pop">💥</div>
  </div>

  <div class="cols">
    <div class="side ally">
      <h2>▶ 味方側</h2>
      <div class="grid">
        <button data-atk="a_slash"><span class="emoji">⚔️</span>斬撃</button>
        <button data-atk="a_punch"><span class="emoji">👊</span>打撃</button>
        <button data-atk="a_beam"><span class="emoji">✨</span>魔法ビーム</button>
        <button data-atk="a_special"><span class="emoji">💥</span>必殺技</button>
      </div>
    </div>
    <div class="side foe">
      <h2>▶ 敵側</h2>
      <div class="grid">
        <button data-atk="e_bite"><span class="emoji">🦷</span>牙・噛みつき</button>
        <button data-atk="e_poison"><span class="emoji">☠️</span>毒ビーム</button>
        <button data-atk="e_stomp"><span class="emoji">🦶</span>重い一撃</button>
        <button data-atk="e_roar"><span class="emoji">🐲</span>咆哮・必殺</button>
      </div>
    </div>
  </div>

  <div class="volrow">🔊 <input type="range" id="vol" min="0" max="100" value="80"></div>
  <div class="hint">
    Web Audioでリアルタイム合成した攻撃効果音です（音源ファイルなし）。<br>
    必殺技は「溜め→閃光と静寂→巨大着弾→追爆→余韻」の5幕構成。押すたびに微妙に表情が変わります。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, limiter, revS, revL, dly;
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const V=()=>1+(Math.random()*2-1)*.05;              // ±5% per-hit variation

  const _pw={};
  function pulseWave(duty){
    const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=16, real=new Float32Array(N), imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false});
  }
  const _sh={};
  function shaper(amt){
    const k=amt.toFixed(2); if(_sh[k])return _sh[k];
    const n=1024, c=new Float32Array(n);
    for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=Math.tanh(x*amt)/Math.tanh(amt); }
    const ws=ctx.createWaveShaper(); ws.curve=c; ws.oversample='2x';
    return _sh[k]=ws;
  }
  function impulse(dur,decay){
    const len=Math.max(1,Math.floor(ctx.sampleRate*dur)), buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){ const d=buf.getChannelData(c);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
    return buf;
  }
  function init(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-14; comp.knee.value=20; comp.ratio.value=3; comp.attack.value=.003; comp.release.value=.18;
    limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.1;
    master.connect(comp); comp.connect(limiter); limiter.connect(ctx.destination);
    // spaces: tight room / long hall / slap-echo (for supers & roars)
    revS=ctx.createConvolver(); revS.buffer=impulse(.35,3.5);
    const sOut=ctx.createGain(); sOut.gain.value=.9; revS.connect(sOut); sOut.connect(master);
    revL=ctx.createConvolver(); revL.buffer=impulse(1.9,2.4);
    const lOut=ctx.createGain(); lOut.gain.value=.9; revL.connect(lOut); lOut.connect(master);
    dly=ctx.createDelay(1); dly.delayTime.value=.16;
    const dfb=ctx.createGain(); dfb.gain.value=.36;
    const dOut=ctx.createGain(); dOut.gain.value=.5;
    dly.connect(dfb); dfb.connect(dly); dly.connect(dOut); dOut.connect(master);
  }
  function route(n,{pan=0,rs=0,rl=0,de=0}={}){
    let tail=n;
    if(ctx.createStereoPanner){ const p=ctx.createStereoPanner(); p.pan.value=pan; n.connect(p); tail=p; }
    tail.connect(master);
    if(rs){ const s=ctx.createGain(); s.gain.value=rs; n.connect(s); s.connect(revS); }
    if(rl){ const s=ctx.createGain(); s.gain.value=rl; n.connect(s); s.connect(revL); }
    if(de){ const s=ctx.createGain(); s.gain.value=de; n.connect(s); s.connect(dly); }
  }
  function tone(t,dur,{wave='square',duty=null,f0=440,f1=null,det=0,vib=0,vr=6,g=.15,a=.004,r=.06,
                       cut=8000,cutTo=null,ftype='lowpass',q=1.1,sat=0,env='perc',am=0,amf=50,pan=0,rs=0,rl=0,de=0}={}){
    const o=ctx.createOscillator();
    if(duty!=null)o.setPeriodicWave(pulseWave(duty)); else o.type=wave;
    o.frequency.setValueAtTime(Math.max(f0,1),t);
    if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    if(det)o.detune.setValueAtTime(det,t);
    if(vib){ const l=ctx.createOscillator(),lg=ctx.createGain();
      l.frequency.value=vr; lg.gain.value=vib; l.connect(lg); lg.connect(o.detune); l.start(t); l.stop(t+dur+.05); }
    const f=ctx.createBiquadFilter(); f.type=ftype; f.frequency.setValueAtTime(cut,t);
    if(cutTo)f.frequency.exponentialRampToValueAtTime(Math.max(cutTo,20),t+dur);
    f.Q.value=q;
    const e=ctx.createGain();
    e.gain.setValueAtTime(.0001,t);
    if(env==='swell'){ e.gain.linearRampToValueAtTime(g,t+dur*.85); e.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    else {
      e.gain.exponentialRampToValueAtTime(g,t+a);
      if(env==='hold'){ e.gain.setValueAtTime(g,t+Math.max(dur-r,a)); e.gain.exponentialRampToValueAtTime(.0001,t+dur); }
      else e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    }
    if(am){ const l=ctx.createOscillator(); l.frequency.value=amf;                 // AM roughness = vocal growl
      const lg=ctx.createGain(); lg.gain.value=g*am; l.connect(lg); lg.connect(e.gain); l.start(t); l.stop(t+dur+.02); }
    let head=o; if(sat){ const ws=shaper(sat); o.connect(ws); head=ws; }
    head.connect(f); f.connect(e); route(e,{pan,rs,rl,de});
    o.start(t); o.stop(t+dur+.06);
  }
  function nz(t,dur,{type='highpass',cut=4000,cutTo=null,q=1,g=.3,a=.001,sat=0,am=0,amf=50,pan=0,rs=0,rl=0,de=0}={}){
    const n=ctx.createBufferSource();
    const buf=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type=type; f.frequency.setValueAtTime(cut,t);
    if(cutTo)f.frequency.exponentialRampToValueAtTime(Math.max(cutTo,20),t+dur);
    f.Q.value=q;
    const e=ctx.createGain();
    e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+a);
    e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    if(am){ const l=ctx.createOscillator(); l.frequency.value=amf;                 // AM roughness = breath growl
      const lg=ctx.createGain(); lg.gain.value=g*am; l.connect(lg); lg.connect(e.gain); l.start(t); l.stop(t+dur+.02); }
    let head=n; if(sat){ const ws=shaper(sat); n.connect(ws); head=ws; }
    head.connect(f); f.connect(e); route(e,{pan,rs,rl,de});
    n.start(t); n.stop(t+dur+.02);
  }
  const subhit=(t,f0,f1,dur,g,satA=0)=> tone(t,dur,{wave:'sine',f0,f1,g,a:.003,cut:1600,sat:satA,rs:.08});
  function ring(t,base,ratios,dur,g,o={}){
    ratios.forEach((r,i)=> tone(t,dur*(1-.5*i/ratios.length),
      {wave:'sine',f0:base*r,f1:base*r*.985,g:g/(1+i*.7),det:(Math.random()*2-1)*5,a:.002,cut:12000,...o}));
  }
  function fm(t,dur,{cf=90,mf=61,idx=250,g=.2,f1=null,cut=900,env='perc',pan=0,rs=0,rl=0,de=0}={}){
    const c=ctx.createOscillator(); c.type='sine'; c.frequency.setValueAtTime(cf,t);
    if(f1)c.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    const m=ctx.createOscillator(); m.type='sine'; m.frequency.setValueAtTime(mf,t);
    const mg=ctx.createGain(); mg.gain.value=idx; m.connect(mg); mg.connect(c.frequency);
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut;
    const e=ctx.createGain();
    e.gain.setValueAtTime(.0001,t);
    if(env==='swell'){ e.gain.linearRampToValueAtTime(g,t+dur*.85); e.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    else { e.gain.exponentialRampToValueAtTime(g,t+.02); e.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    c.connect(f); f.connect(e); route(e,{pan,rs,rl,de});
    c.start(t); m.start(t); c.stop(t+dur+.05); m.stop(t+dur+.05);
  }
  // MEGA sub — twin saturated low layers + thump transient. The boss-weight foundation.
  function megasub(t,f0,f1,dur,g,satA=4){
    tone(t,dur,{wave:'sine',f0,f1,g,a:.003,cut:1200,sat:satA,rs:.1});
    tone(t,dur*.8,{wave:'triangle',f0:f0*1.01,f1:f1*1.02,g:g*.5,a:.004,cut:700,sat:satA*.75});
    nz(t,.03,{type:'lowpass',cut:1400,q:.7,g:g*.5});
  }
  // ring modulation — metallic scream/impact (carrier × sine modulator)
  function rmod(t,dur,{f0=800,f1=120,m0=137,m1=90,g=.3,cut=4200,sat=0,pan=0,rs=0,rl=0,de=0}={}){
    const c=ctx.createOscillator(); c.type='sawtooth';
    c.frequency.setValueAtTime(f0,t); c.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    const rm=ctx.createGain(); rm.gain.value=0;
    const m=ctx.createOscillator(); m.type='sine';
    m.frequency.setValueAtTime(m0,t); m.frequency.exponentialRampToValueAtTime(Math.max(m1,1),t+dur);
    m.connect(rm.gain); c.connect(rm);
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut;
    const e=ctx.createGain();
    e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.005);
    e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    let head=rm; if(sat){ const ws=shaper(sat); rm.connect(ws); head=ws; }
    head.connect(f); f.connect(e); route(e,{pan,rs,rl,de});
    c.start(t); m.start(t); c.stop(t+dur+.05); m.stop(t+dur+.05);
  }
  const blip=(t,f,g=.07)=> tone(t,.05,{wave:'sine',f0:f,f1:f*.55,g,a:.003,cut:2500,pan:rnd(-.5,.5),rl:.3});

  // ================= the 8 attacks =================
  const ATK={
    // ⚔️ 斬撃 — crossing double-whoosh → laser-katana zap + blade ring + crack
    a_slash(t){ const v=V();
      nz(t,.08,{type:'bandpass',cut:1000*v,cutTo:6000,q:1,g:.3,pan:-.5,rs:.15});           // whoosh L
      nz(t+.03,.08,{type:'bandpass',cut:1400*v,cutTo:7000,q:1,g:.24,pan:.35,rs:.15});      // whoosh R (crossing)
      tone(t+.06,.13,{wave:'sawtooth',f0:2800*v,f1:300,g:.26,cut:5200,q:4,sat:2,pan:.1,rs:.25}); // laser-katana zap
      ring(t+.06,3300*v,[1,1.34,2.1,2.76,3.9],.36,.2,{pan:.15,rl:.35});                    // blade shing
      nz(t+.06,.1,{type:'highpass',cut:6500,cutTo:1800,q:.7,g:.55,pan:.1,rs:.25});         // cut crack
      subhit(t+.065,320,85,.14,.35,2.5);                                                    // weight
    },
    // 👊 打撃 — hard click → ring-mod "DZZK" thunk → saturated sub → dust
    a_punch(t){ const v=V();
      nz(t,.012,{type:'highpass',cut:4000,q:.7,g:.65});                                     // knuckle transient
      rmod(t+.004,.12,{f0:180*v,f1:70,m0:95,m1:70,g:.34,cut:2600,sat:3,rs:.2});             // gnarly impact tone
      nz(t+.004,.07,{type:'bandpass',cut:1600*v,q:1.8,g:.5,rs:.2});                         // smack body
      subhit(t+.006,240*v,48,.26,.75,3.5);                                                   // sub thump
      nz(t+.05,.16,{type:'lowpass',cut:800,cutTo:200,q:.6,g:.12,rs:.3});                     // dust
    },
    // ✨ 魔法ビーム — screaming charge → thick beam(+sub octave+sizzle) → pyew-off + sparkles
    a_beam(t){ const v=V();
      for(const d of [-10,0,10]) tone(t,.22,{duty:.25,f0:500*v,f1:1900,g:.07,det:d,cut:7000,pan:d/40,rl:.3});
      rmod(t,.22,{f0:600,f1:2400,m0:220,m1:800,g:.06,cut:6000,rl:.3});                       // charge shimmer-scream
      const tf=t+.21;
      for(const d of [-8,0,8]) tone(tf,.36,{duty:.5,f0:1050*v,f1:1250,g:.13,det:d,vib:20,vr:12,cut:7500,env:'hold',r:.1,pan:d/50,rl:.25}); // beam core ×3
      tone(tf,.36,{wave:'sawtooth',f0:525*v,f1:625,g:.13,cut:2800,env:'hold',r:.1,sat:2});    // sub-octave growl
      nz(tf,.36,{type:'highpass',cut:6000,cutTo:9500,q:.6,g:.09,rl:.3});                      // energy sizzle
      tone(tf+.33,.16,{wave:'sawtooth',f0:1900*v,f1:240,g:.22,cut:5200,q:3,sat:2,rs:.25});    // pyew! cut-off
      for(let i=0;i<7;i++) tone(tf+.05+i*rnd(.03,.05),.09,
        {wave:'sine',f0:rnd(2400,7000),g:.06,a:.002,cut:9500,pan:rnd(-.6,.6),rl:.5});         // sparkles
    },
    // 💥 必殺技 — 5幕: 加速する溜め → 閃光＋静寂 → 巨大着弾(サブドロップ＋パワーコード＋金属の叫び) → 追爆×2 → 崩れる余韻
    a_special(t){ const v=V();
      // 幕1: charge (0〜.55) — accelerating zaps + rising cluster + screaming sweep
      let tt=0;
      for(let i=0;i<14;i++){
        tone(t+tt,.05,{wave:'sawtooth',f0:220*Math.pow(1.09,i)*v,g:.1+.008*i,cut:3200+i*280,q:2,sat:2,pan:(i%2?.35:-.35),rs:.2});
        tt+=.075*Math.pow(.9,i);
      }
      for(const d of [-12,0,12]) tone(t,.55,{wave:'sawtooth',f0:70,f1:520*v,g:.07,det:d,cut:900,cutTo:3200,env:'hold',r:.05,sat:2,rl:.2});
      nz(t,.55,{type:'bandpass',cut:300,cutTo:7500,q:3,g:.22,rl:.25});                        // resonant riser
      tone(t,.55,{wave:'sine',f0:40,f1:95,g:.3,cut:400,env:'hold',r:.05});                    // ground charge
      // 幕2: flash "ting" then 60ms of SILENCE
      ring(t+.53,2600*v,[1,1.5,2.02],.22,.16,{rl:.45});
      const ti=t+.62;
      // 幕3: MEGA IMPACT
      subhit(ti,420,28,.7,.9,4);                                                               // huge sub drop
      nz(ti,.06,{type:'highpass',cut:5000,q:.7,g:.6});                                         // crack transient
      nz(ti,.55,{type:'lowpass',cut:9000,cutTo:250,q:.6,g:.6,sat:2,rs:.3,rl:.35});             // explosion body
      rmod(ti,.45,{f0:900*v,f1:110,m0:137,m1:90,g:.3,cut:4200,sat:3,rl:.4,de:.3});             // metallic scream
      [110,165,220].forEach(fq=>{ for(const d of [-8,8])
        tone(ti+.01,.5,{wave:'sawtooth',f0:fq*v,g:.11,det:d,sat:3.5,cut:2400,cutTo:600,pan:d/40,rl:.4,de:.2}); }); // dark power chord
      // 幕4: after-blasts L→R
      subhit(ti+.22,260,40,.35,.45,3.5); nz(ti+.22,.3,{type:'lowpass',cut:4000,cutTo:300,q:.6,g:.35,sat:2,pan:-.45,rl:.3});
      subhit(ti+.42,220,36,.3,.32,3);   nz(ti+.42,.25,{type:'lowpass',cut:3200,cutTo:280,q:.6,g:.25,sat:2,pan:.45,rl:.3});
      // 幕5: falling debris + fading earth rumble
      for(let i=0;i<6;i++) blip(ti+.3+i*rnd(.05,.09), 1800*Math.pow(.72,i), .06);
      fm(ti,.9,{cf:42,mf:28,idx:110,g:.22,cut:280,rl:.3});
    },
    // 🦷 牙 — 貯め:唸りが膨らみ顎がきしむ → 噛み1 → 本命の噛み2(骨まで砕く重低音)
    e_bite(t){ const v=V();
      fm(t,.42,{cf:70*v,mf:48,idx:260,g:.3,cut:500,env:'swell',rl:.2});                        // growl swells
      tone(t+.05,.35,{wave:'sawtooth',f0:180*v,f1:420,g:.07,sat:2,ftype:'bandpass',cut:900,cutTo:1600,q:3,env:'swell'}); // jaw creaks open
      nz(t+.3,.13,{type:'lowpass',cut:700,cutTo:1600,q:.8,g:.3});                              // lunge!
      const t1=t+.46;                                                                           // snap 1
      nz(t1,.03,{type:'bandpass',cut:850*v,q:8,g:.6}); nz(t1+.005,.025,{type:'bandpass',cut:2700,q:6,g:.4,pan:.1});
      megasub(t1,150,45,.22,.6,3.5);
      const t2=t+.62;                                                                           // snap 2 — the kill bite
      nz(t2,.035,{type:'bandpass',cut:750*v,q:8,g:.8}); nz(t2+.005,.03,{type:'bandpass',cut:2500,q:6,g:.55,pan:-.1});
      nz(t2+.008,.02,{type:'highpass',cut:5200,q:1,g:.4});
      megasub(t2,130,28,.5,.95,4.5);                                                            // bone-crushing sub
      nz(t2+.02,.2,{type:'lowpass',cut:1200,cutTo:250,q:.8,g:.55,sat:4,rs:.25});                // flesh crunch
      fm(t2+.05,.4,{cf:60,mf:41,idx:300,g:.3,cut:450,rl:.2});                                   // satisfied growl
    },
    // ☠️ 毒ビーム — 貯め:大釜の泡が加速+喉の奥で毒が煮える → 重い毒砲発射
    e_poison(t){ const v=V();
      fm(t,.5,{cf:48*v,mf:33,idx:200,g:.32,cut:380,env:'swell',rl:.2});                         // menace swells
      let tt=0; for(let i=0;i<8;i++){ blip(t+tt, rnd(120,260), .1); tt+=.07*Math.pow(.86,i); }  // accelerating gurgle
      nz(t,.5,{type:'bandpass',cut:500,cutTo:2200,q:2,g:.15});                                  // pressure rising
      const tf=t+.52;                                                                            // FIRE
      nz(tf,.05,{type:'highpass',cut:2400,q:1,g:.5});                                            // spit crack
      megasub(tf,110,38,.45,.8,4);                                                               // heavy launch boom
      tone(tf,.5,{wave:'sawtooth',f0:300*v,f1:90,g:.22,sat:3,cut:1400,vib:12,vr:16,am:.4,amf:44,rl:.3,de:.2}); // toxic cannon (rough, not wobbly)
      tone(tf,.5,{duty:.5,f0:604*v,f1:150,g:.12,vib:14,vr:13,cut:2200,pan:.2,rl:.25});           // venom whine above
      nz(tf,.45,{type:'lowpass',cut:1800,cutTo:400,q:.9,g:.3,sat:2,rs:.2});                      // spray body
      for(let i=0;i<7;i++) blip(tf+.08+i*rnd(.04,.06), rnd(200,420), .09);                       // splatter
      nz(tf+.35,.35,{type:'highpass',cut:4800,cutTo:8500,q:.6,g:.08,rl:.4});                     // acid burn
    },
    // 🦶 重い一撃 — 貯め:足が持ち上がり大地が震える → 静寂 → 破滅の着地＋余震×2＋地震
    e_stomp(t){ const v=V();
      tone(t,.5,{wave:'sawtooth',f0:60,f1:200*v,g:.12,sat:2,cut:600,cutTo:1400,env:'swell',rl:.2}); // foot rises
      nz(t,.5,{type:'lowpass',cut:300,cutTo:900,q:1,g:.18});                                     // air gathers
      fm(t,.5,{cf:40,mf:27,idx:90,g:.22,cut:250,env:'swell'});                                   // ground trembles
      const ti=t+.58;                                                                             // (80ms hush) → LANDFALL
      nz(ti,.05,{type:'highpass',cut:3800,q:.8,g:.4});                                            // crack
      megasub(ti,90*v,22,.75,1.0,5);                                                              // COLOSSAL 22Hz sub
      rmod(ti,.16,{f0:280*v,f1:50,m0:75,m1:45,g:.4,cut:1600,sat:3.5});                            // gritty slam
      nz(ti,.16,{type:'lowpass',cut:1000,cutTo:200,q:.7,g:.7,sat:3});                             // ground slam
      megasub(ti+.3,120,26,.4,.5,4);                                                              // aftershock 1
      megasub(ti+.55,100,24,.35,.35,4);                                                           // aftershock 2
      for(let i=0;i<7;i++) nz(ti+.12+i*rnd(.05,.08),.05,
        {type:'bandpass',cut:rnd(400,1400),q:4,g:.12*(1-i/9),pan:rnd(-.6,.6),rs:.3});             // rubble
      fm(ti,1.1,{cf:38,mf:25,idx:140,g:.3,cut:240,rl:.35});                                       // long earthquake
    },
    // 🐲 咆哮・必殺 — 貯め:鋭い息吸い+震える大地+踏み込み → ライオン音響の咆哮
    // 本物の咆哮＝音程の揺れではなく「ノイズ主体のフォルマント＋50Hz帯の喉のガラガラ(AM)」。
    // 遅いビブラートは物理的に屁になるので全廃。
    e_roar(t){ const v=V();
      nz(t,.35,{type:'bandpass',cut:900,cutTo:2200,q:1.2,g:.22});                                 // sharp inhale (rising hiss)
      fm(t,.5,{cf:50,mf:34,idx:160,g:.28,cut:300,env:'swell',rl:.2});                             // earth trembles
      megasub(t+.44,120,45,.16,.5,3.5);                                                            // step
      const tr=t+.56;                                                                              // ROAR — bursts open
      nz(tr,.08,{type:'lowpass',cut:2000,q:.6,g:.5});                                              // blast transient
      nz(tr,.75,{type:'bandpass',cut:750,cutTo:380,q:2.2,g:.55,sat:3,am:.7,amf:52,rl:.35,de:.25}); // F1 "RAAAH" body (noise+growl AM)
      nz(tr,.7,{type:'bandpass',cut:1500,cutTo:900,q:2.5,g:.3,sat:2.5,am:.7,amf:47,pan:.1,rl:.3}); // F2 throat
      nz(tr,.5,{type:'bandpass',cut:2800,cutTo:1800,q:3,g:.14,am:.6,amf:60,pan:-.15,rl:.3});       // F3 bite
      tone(tr,.7,{wave:'sawtooth',f0:225*v,f1:105,g:.16,sat:4,ftype:'bandpass',cut:700,cutTo:400,q:1.8,vib:14,vr:19,am:.5,amf:55,rl:.3,de:.2}); // snarl (fast micro-rough only)
      tone(tr,.7,{wave:'sawtooth',f0:113*v,f1:53,g:.14,sat:4,cut:500,am:.5,amf:48});               // octave-down snarl
      rmod(tr+.03,.45,{f0:1600*v,f1:480,m0:190,m1:120,g:.16,cut:5200,sat:2.5,pan:.05,rl:.4,de:.3}); // monster screech layer
      megasub(tr,85,32,.5,.75,4.5);                                                                 // onset PUNCH (not a swell)
      megasub(tr+.5,120,28,.4,.6,4.5);                                                              // ending slam
      nz(tr+.5,.3,{type:'lowpass',cut:1200,cutTo:200,q:.6,g:.3,sat:2});                             // slam debris
    }
  };
  const POP={a_slash:'⚡',a_punch:'💢',a_beam:'✨',a_special:'💥',e_bite:'🩸',e_poison:'☠️',e_stomp:'💥',e_roar:'💢'};
  const HEAVY={a_punch:'shake',a_special:'megashake',e_bite:'megashake',e_poison:'shake',e_stomp:'megashake',e_roar:'megashake'};
  const DELAY={a_slash:60,a_punch:10,a_beam:210,a_special:620,e_bite:620,e_poison:520,e_stomp:580,e_roar:580};

  const volEl=document.getElementById('vol');
  const arena=document.getElementById('arena');
  const hero=document.getElementById('hero'), foe=document.getElementById('foe');
  const flashAlly=document.getElementById('flashAlly'), flashFoe=document.getElementById('flashFoe');
  const flashWhite=document.getElementById('flashWhite');
  const pop=document.getElementById('pop');
  function anim(name){
    const isAlly=name[0]==='a';
    setTimeout(()=>{
      const flash=(name==='a_special')?flashWhite:(isAlly?flashFoe:flashAlly);
      const target=isAlly?foe:hero;
      flash.classList.remove('show'); target.classList.remove('hit'); pop.classList.remove('show');
      arena.classList.remove('shake','megashake');
      void flash.offsetWidth;
      flash.classList.add('show'); target.classList.add('hit');
      pop.textContent=POP[name]; pop.style.left=isAlly?'72%':'28%'; pop.classList.add('show');
      if(HEAVY[name]) arena.classList.add(HEAVY[name]);
    }, DELAY[name]||0);
  }
  function play(name){
    if(!ctx) init();
    if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100, ctx.currentTime);
    ATK[name](ctx.currentTime+0.02);
    anim(name);
  }
  document.querySelectorAll('button[data-atk]').forEach(b=>
    b.addEventListener('click',()=>play(b.dataset.atk)));
  volEl.addEventListener('input',()=>{ if(master) master.gain.value=volEl.value/100; });
})();
</script>
