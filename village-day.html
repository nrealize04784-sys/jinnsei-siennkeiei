<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する、明るい昼の村のBGM『ひだまりの村』。ト長調・軽やかな足取りのループ。" />
<title>ひだまりの村 | Daytime Village Theme</title>
</head>
<body>
<style>
  :root{
    --sky1:#8fd0f0; --sky2:#c9ecff; --sun:#ffd24a; --grass:#7fc46a;
    --ink:#274257; --ink-soft:#5c7c90; --cream:#fbfefe; --leaf:#4f9a52;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:linear-gradient(180deg,#5bb8e6,#8fd0f0 45%,#bfe8c4 78%,#9fd88a);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .town{
    width:min(640px,100%);position:relative;
    border:1px solid rgba(255,255,255,.6);border-radius:22px;
    background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(233,247,255,.82));
    box-shadow:0 30px 70px rgba(40,90,120,.28), inset 0 1px 0 rgba(255,255,255,.9);
    padding:28px 26px 30px;overflow:hidden;backdrop-filter:blur(2px);
  }
  .tag{font-size:11px;letter-spacing:.4em;color:#3f8fb8;text-transform:uppercase;text-align:center;opacity:.9}
  h1{text-align:center;font-size:clamp(27px,6.4vw,42px);font-weight:800;letter-spacing:.1em;margin:4px 0 2px;
    color:#255a77;text-shadow:0 2px 0 rgba(255,255,255,.6)}
  .subtitle{text-align:center;color:var(--ink-soft);font-size:13px;letter-spacing:.22em;margin-bottom:20px}

  .scene{position:relative;height:190px;border-radius:16px;overflow:hidden;
    border:1px solid rgba(255,255,255,.7);
    background:linear-gradient(180deg,#8fd0f0 0%,#bfe8ff 52%,#9fd57f 52%,#7cc361 100%);
    margin-bottom:20px}
  .sun{position:absolute;top:18px;right:26px;font-size:46px;filter:drop-shadow(0 0 18px rgba(255,210,70,.7))}
  .scene.playing .sun{animation:spin 14s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cloud{position:absolute;font-size:38px;opacity:.92;top:26px;left:-60px}
  .cloud.b{top:60px;font-size:28px;opacity:.8}
  .scene.playing .cloud{animation:drift 16s linear infinite}
  .scene.playing .cloud.b{animation:drift 22s linear infinite;animation-delay:-6s}
  @keyframes drift{from{transform:translateX(-70px)}to{transform:translateX(720px)}}
  .houses{position:absolute;left:0;right:0;bottom:26px;display:flex;justify-content:center;gap:6px;font-size:52px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.15))}
  .houses span{transform-origin:bottom}
  .scene.playing .houses span{animation:bob 1.6s ease-in-out infinite}
  .scene.playing .houses span:nth-child(2){animation-delay:.2s}
  .scene.playing .houses span:nth-child(3){animation-delay:.4s}
  .scene.playing .houses span:nth-child(4){animation-delay:.6s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .viz{position:absolute;inset:auto 0 0 0;height:38px;display:flex;align-items:flex-end;gap:3px;padding:0 10px;opacity:.55}
  .viz i{flex:1;background:linear-gradient(180deg,#2f9a52,#1f6e39);border-radius:3px 3px 0 0;height:2px;transition:height .1s ease}

  .controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:13px;padding:14px 28px;
    font-size:15px;font-weight:800;letter-spacing:.1em;color:#12384a;
    background:linear-gradient(180deg,#ffe27a,#ffc23a);
    box-shadow:0 10px 26px rgba(255,180,40,.4),inset 0 1px 0 rgba(255,255,255,.7);transition:transform .12s,filter .2s}
  button:hover{transform:translateY(-2px);filter:brightness(1.05)}
  button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#a9d6ef,#6fb3d8);color:#0f3346}
  .vol{display:flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:12px}
  input[type=range]{accent-color:#ffc23a;width:120px}
  .status{text-align:center;font-size:12px;color:#3f8fb8;letter-spacing:.24em;height:16px;margin-top:12px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:16px;letter-spacing:.03em;line-height:1.8}
</style>

<div class="town">
  <div class="tag">◇ Daytime Village Theme ◇</div>
  <h1>ひだまりの村</h1>
  <div class="subtitle">SUNNY VILLAGE &nbsp;—&nbsp; "Market Day"</div>

  <div class="scene" id="scene">
    <div class="sun">☀️</div>
    <div class="cloud">☁️</div>
    <div class="cloud b">☁️</div>
    <div class="houses"><span>🏠</span><span>🏡</span><span>⛪</span><span>🏠</span></div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="controls">
    <button id="play">▶ 村へ行く</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="70"></div>
  </div>
  <div class="status" id="status">♪ にぎやかな昼下がり ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成している、明るい昼の村のBGMです（音源ファイルなし）。<br>
    ト長調・軽やかな足取りのリズムで、ずっと歩けるループにしています。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, analyser, freqData;
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);

  const _pw={};
  function pulseWave(duty){
    const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=32, real=new Float32Array(N), imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false});
  }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.85;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-15; comp.knee.value=26; comp.ratio.value=3; comp.attack.value=.005; comp.release.value=.25;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(analyser); analyser.connect(ctx.destination);
  }
  function voice(freq,t,dur,{type='triangle',duty=null,gain=.2,detune=5,cut=3000,a=.008,d=.08,s=.7,r=.12}={}){
    const g=ctx.createGain(), f=ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=cut; f.Q.value=1.4;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=type;o2.type=type;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t); o2.detune.value=detune;
    const peak=gain, sus=Math.max(gain*s,0.0001);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak,t+a);
    g.gain.exponentialRampToValueAtTime(sus,t+a+d);
    g.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o1.connect(f); o2.connect(f); f.connect(g); g.connect(master);
    o1.start(t); o2.start(t); o1.stop(t+dur+.03); o2.stop(t+dur+.03);
  }
  function noise(t,dur,type,cut,q,gain){
    const n=ctx.createBufferSource();
    const buf=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1;
    n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=cut; f.Q.value=q;
    const g=ctx.createGain(); g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f); f.connect(g); g.connect(master); n.start(t); n.stop(t+dur+.02);
  }
  const kick=t=>{ const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.setValueAtTime(135,t); o.frequency.exponentialRampToValueAtTime(50,t+.09);
    g.gain.setValueAtTime(.42,t); g.gain.exponentialRampToValueAtTime(.001,t+.14);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+.16); };
  const shaker=t=> noise(t,.03,'highpass',7000,.8,.06);
  const woodblock=t=>{ noise(t,.03,'bandpass',1900,3,.14);
    const o=ctx.createOscillator(),g=ctx.createGain(); o.type='square';
    o.frequency.setValueAtTime(1600,t); g.gain.setValueAtTime(.09,t); g.gain.exponentialRampToValueAtTime(.001,t+.04);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+.05); };

  // ---------- composition (G major, lively walking pace) ----------
  const BPM=124, S=60/BPM/4, BAR=16*S;
  const CH={
    G: {bass:['G2','D3'], pad:['G3','B3','D4'], arp:['G3','B3','D4','B3']},
    D: {bass:['D2','A2'], pad:['D3','F#3','A3'],arp:['D3','F#3','A3','F#3']},
    Em:{bass:['E2','B2'], pad:['E3','G3','B3'], arp:['E3','G3','B3','G3']},
    C: {bass:['C2','G2'], pad:['C3','E3','G3'], arp:['C3','E3','G3','E3']}
  };
  const prog=['G','D','Em','C','G','D','C','D'];

  // bright, skipping melody (8 bars) — chord-tone based, G major
  const lead=[
    ['D5',2],['G5',2],['G5',2],['A5',2],['B5',4],['G5',4],
    ['A5',2],['F#5',2],['D5',4],['F#5',4],['A5',4],
    ['B5',2],['A5',2],['G5',2],['E5',2],['E5',4],['B4',4],
    ['C5',2],['E5',2],['G5',2],['E5',2],['G5',4],['E5',4],
    ['D5',2],['G5',2],['B5',2],['D6',2],['B5',4],['G5',4],
    ['A5',2],['F#5',2],['A5',2],['D6',2],['A5',4],['F#5',4],
    ['E5',2],['G5',2],['C6',2],['G5',2],['E5',4],['C5',4],
    ['D5',2],['F#5',2],['A5',2],['F#5',2],['D5',8]
  ];

  function seqLead(base){
    let t=base;
    for(const [n,d] of lead){
      voice(hz(n), t, d*S*0.92, {duty:.25, gain:.17, cut:4200, detune:6, a:.006, d:.06, s:.72, r:.08}); // bright pulse lead
      voice(hz(n), t, d*S*0.9,  {type:'triangle', gain:.05, cut:2600, detune:3, a:.01, d:.06, s:.7, r:.08}); // soft body
      t += d*S;
    }
  }
  function bassBar(ch, base){
    // bouncing quarter-note walk: root fifth root fifth
    const seq=[ch.bass[0],ch.bass[1],ch.bass[0],ch.bass[1]];
    for(let i=0;i<4;i++)
      voice(hz(seq[i]), base+i*4*S, 4*S*0.9, {type:'triangle', gain:.2, cut:1100, detune:3, a:.006, d:.08, s:.6, r:.08});
  }
  function padBar(ch, base){
    for(const n of ch.pad)
      voice(hz(n), base, BAR*0.98, {type:'triangle', gain:.045, cut:1900, detune:8, a:.12, d:.2, s:.85, r:.25});
  }
  function pluckBar(ch, base){
    // light offbeat plucks (mandolin-ish), eighth notes
    for(let i=0;i<8;i++){
      const n=ch.arp[i%4];
      voice(hz(n), base+i*2*S, 2*S*0.7, {duty:.25, gain:.05, cut:3600, detune:2, a:.003, d:.04, s:.25, r:.05});
    }
  }
  function drumBar(base){
    for(let i=0;i<16;i++){
      const t=base+i*S;
      if(i===0||i===8) kick(t);          // soft downbeats
      if(i%2===0) shaker(t);             // gentle eighth shaker (market bustle)
      if(i===4||i===12) woodblock(t);    // light backbeat tick
    }
  }

  function section(base, {perc,pluck}){
    for(let b=0;b<8;b++){
      const bt=base+b*BAR, ch=CH[prog[b]];
      bassBar(ch, bt);
      padBar(ch, bt);
      if(pluck) pluckBar(ch, bt);
      if(perc)  drumBar(bt);
    }
    seqLead(base);
  }

  const BODY_BARS=16, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){
    section(base,        {perc:false, pluck:false}); // first pass: light
    section(base+8*BAR,  {perc:true,  pluck:true});  // second pass: full, bustling
  }
  function scheduleIntro(base){
    // bright 2-bar flourish on G
    for(const n of CH.G.pad) voice(hz(n), base, 2*BAR*0.96, {type:'triangle', gain:.06, cut:2200, a:.2, d:.3, s:.85, r:.4});
    const up=['G4','B4','D5','G5'];
    up.forEach((n,i)=> voice(hz(n), base+ i*2*S, 2*S*0.9, {duty:.25, gain:.12, cut:4000, a:.004, d:.05, s:.4, r:.06}));
    kick(base+BAR); woodblock(base+BAR+8*S);
    return 2*BAR;
  }

  // transport
  let playing=false, timer=null, nextBody=0, rafId=null;
  function start(){
    if(!ctx) initAudio();
    if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.85, ctx.currentTime);
    playing=true;
    const t0=ctx.currentTime+0.15;
    const introLen=scheduleIntro(t0);
    let bodyStart=t0+introLen;
    scheduleBody(bodyStart);
    nextBody=bodyStart+bodyLen;
    timer=setInterval(()=>{ if(!playing)return; if(ctx.currentTime>nextBody-3){scheduleBody(nextBody);nextBody+=bodyLen;} },350);
    playBtn.textContent='■ 村を出る'; playBtn.classList.add('playing');
    scene.classList.add('playing'); statusEl.classList.add('on');
    drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(0.0001,ctx.currentTime+0.35); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.85; },400);
    playBtn.textContent='▶ 村へ行く'; playBtn.classList.remove('playing');
    scene.classList.remove('playing'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  // visuals
  const scene=document.getElementById('scene');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  const N=32, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){
    if(!playing) return;
    analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*36).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz);
  }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.85; });
})();
</script>

</body>
</html>
