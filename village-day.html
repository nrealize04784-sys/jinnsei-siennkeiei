<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する昼の村のBGM『ひだまりの村』（ポケモンDP流リメイク）。ハ長調バラード、歌えるメロディ主役＋A7の郷愁。" />
<title>ひだまりの村（DP流） | Daytime Village</title>
</head>
<body>
<style>
  :root{ --sky:#bfe3f5; --warm:#ffe6b0; --grass:#a9d98a; --ink:#4a4030; --dim:#8c7f63; --gold:#e0a94e; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:linear-gradient(180deg,#a9d8ee 0%,#cfe9f5 30%,#ffe9c2 62%,#c9e6a0 100%);
    color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
  .town{width:min(620px,100%);position:relative;border:1px solid rgba(255,255,255,.7);border-radius:22px;
    background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,248,232,.86));
    box-shadow:0 30px 70px rgba(90,110,80,.26), inset 0 1px 0 rgba(255,255,255,.9);
    padding:28px 26px 30px;overflow:hidden;backdrop-filter:blur(2px)}
  .tag{font-size:11px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;text-align:center;opacity:.9}
  h1{text-align:center;font-size:clamp(27px,6.4vw,42px);font-weight:800;letter-spacing:.1em;margin:4px 0 2px;
    color:#6a5a2e;text-shadow:0 2px 0 rgba(255,255,255,.6)}
  .subtitle{text-align:center;color:var(--dim);font-size:13px;letter-spacing:.2em;margin-bottom:20px}
  .scene{position:relative;height:190px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.7);
    background:linear-gradient(180deg,#bfe3f5 0%,#e8f4d8 52%,#bfe0a0 52%,#a6d488 100%);margin-bottom:20px}
  .sun{position:absolute;top:20px;right:28px;font-size:44px;filter:drop-shadow(0 0 18px rgba(255,205,90,.7))}
  .stage.playing .sun,.scene.playing .sun{animation:sway 5s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .cloud{position:absolute;font-size:34px;opacity:.9;top:26px;left:-60px}
  .cloud.b{top:56px;font-size:26px;opacity:.75}
  .scene.playing .cloud{animation:drift 26s linear infinite}
  .scene.playing .cloud.b{animation:drift 34s linear infinite;animation-delay:-8s}
  @keyframes drift{from{transform:translateX(-70px)}to{transform:translateX(700px)}}
  .houses{position:absolute;left:0;right:0;bottom:26px;display:flex;justify-content:center;gap:8px;font-size:50px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.14))}
  .scene.playing .houses span{animation:bob 2.6s ease-in-out infinite}
  .scene.playing .houses span:nth-child(2){animation-delay:.5s}
  .scene.playing .houses span:nth-child(3){animation-delay:1s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .note{position:absolute;font-size:18px;opacity:0;color:#e0a94e}
  .scene.playing .note{animation:rise 4s ease-in-out infinite}
  @keyframes rise{0%{opacity:0;transform:translateY(0)}25%{opacity:.9}100%{opacity:0;transform:translateY(-40px)}}
  .viz{position:absolute;inset:auto 0 0 0;height:36px;display:flex;align-items:flex-end;gap:3px;padding:0 10px;opacity:.5}
  .viz i{flex:1;background:linear-gradient(180deg,#e0a94e,#9c6f1e);border-radius:3px 3px 0 0;height:2px;transition:height .12s ease}
  .controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:13px;padding:14px 30px;font-size:15px;font-weight:800;letter-spacing:.1em;
    color:#4a3a12;transition:transform .12s,filter .2s;
    background:linear-gradient(180deg,#ffe6a0,#e8b850);box-shadow:0 10px 26px rgba(210,160,50,.35),inset 0 1px 0 rgba(255,255,255,.7)}
  button:hover{transform:translateY(-2px);filter:brightness(1.05)} button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#a9d6ef,#6fb3d8);color:#0f3346}
  .vol{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px}
  input[type=range]{accent-color:var(--gold);width:120px}
  .status{text-align:center;font-size:12px;color:var(--gold);letter-spacing:.22em;height:16px;margin-top:12px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--dim);font-size:12px;margin-top:16px;letter-spacing:.03em;line-height:1.8}
</style>

<div class="town">
  <div class="tag">◇ Daytime Village · DP Style ◇</div>
  <h1>ひだまりの村</h1>
  <div class="subtitle">SUNNY VILLAGE &nbsp;—&nbsp; "Where We Grew Up"</div>

  <div class="scene" id="scene">
    <div class="sun">🌤️</div>
    <div class="cloud">☁️</div><div class="cloud b">☁️</div>
    <div class="note" style="left:24%;bottom:70px">♪</div>
    <div class="note" style="left:62%;bottom:66px;animation-delay:1.6s">♫</div>
    <div class="houses"><span>🏡</span><span>🏠</span><span>🌳</span></div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="controls">
    <button id="play">▶ 村で過ごす</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="78"></div>
  </div>
  <div class="status" id="status">♪ なつかしい昼下がり ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成する、昼の村のBGM（ポケモンDP流リメイク）です（音源ファイルなし）。<br>
    ハ長調・ゆったりバラード。歌えるメロディを主役に、A7の“郷愁”和音で切なさを一滴。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, limiter, rev, dly, fxIn, analyser, freqData;
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const nm=m=>NAMES[((m%12)+12)%12]+(Math.floor(m/12)-1);
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);
  const mf=m=>440*Math.pow(2,(m-69)/12);

  const _pw={};
  function pulseWave(duty){ const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=16,real=new Float32Array(N),imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false}); }
  function impulse(dur,decay){ const len=Math.max(1,Math.floor(ctx.sampleRate*dur)),buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);} return buf; }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.82;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-16; comp.knee.value=26; comp.ratio.value=2.6; comp.attack.value=.008; comp.release.value=.3;
    limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.12;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);
    rev=ctx.createConvolver(); rev.buffer=impulse(1.7,2.6); const r=ctx.createGain(); r.gain.value=.8; rev.connect(r); r.connect(master);
    fxIn=ctx.createGain(); dly=ctx.createDelay(1); dly.delayTime.value=3*S;   // gentle chime echo
    const fb=ctx.createGain(); fb.gain.value=.28; const dOut=ctx.createGain(); dOut.gain.value=.32;
    fxIn.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(dOut); dOut.connect(master);
  }

  let REC=null;
  function voice(f,t,d,o){ if(REC) REC.push({t,play:b=>_voice(f,b+t,d,o)}); else _voice(f,t,d,o); }
  function bell(t,n,g){ if(REC) REC.push({t,play:b=>_bell(b+t,n,g)}); else _bell(t,n,g); }

  function _voice(freq,t,dur,{wave='triangle',duty=null,g=.12,det=5,vib=0,vr=5,a=.02,d=.1,s=.7,r=.2,
                              cut=3000,ftype='lowpass',q=1,env='adsr',pan=0,rl=0,de=0}={}){
    const gn=ctx.createGain(), f=ctx.createBiquadFilter(); f.type=ftype; f.frequency.value=cut; f.Q.value=q;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=wave;o2.type=wave;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t); o2.detune.value=det;
    if(vib){const l=ctx.createOscillator(),lg=ctx.createGain();l.frequency.value=vr;lg.gain.value=vib;l.connect(lg);lg.connect(o1.detune);lg.connect(o2.detune);l.start(t);l.stop(t+dur+.03);}
    const peak=g, sus=Math.max(g*s,.0001);
    gn.gain.setValueAtTime(.0001,t); gn.gain.exponentialRampToValueAtTime(peak,t+a);
    if(env==='hold'){ gn.gain.setValueAtTime(peak,t+Math.max(dur-r,a)); gn.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    else { gn.gain.exponentialRampToValueAtTime(sus,t+a+d); gn.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d)); gn.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    o1.connect(f); o2.connect(f); f.connect(gn);
    let tail=gn; if(ctx.createStereoPanner){const p=ctx.createStereoPanner();p.pan.value=pan;gn.connect(p);tail=p;}
    tail.connect(master);
    if(rl){const x=ctx.createGain();x.gain.value=rl;gn.connect(x);x.connect(rev);}
    if(de){const x=ctx.createGain();x.gain.value=de;gn.connect(x);x.connect(fxIn);}
    o1.start(t);o2.start(t);o1.stop(t+dur+.05);o2.stop(t+dur+.05);
  }
  // celesta / music-box — warm & hopeful. Consonant HARMONIC partials (octave/fifth), no metallic clang
  const _bell=(t,note,g=.09)=>{ const f0=hz(note);
    [[1,1,1.8],[2,.5,1.5],[3,.24,1.2],[4,.12,.9],[6,.05,.7]].forEach(([r,a,dec])=>{ const o=ctx.createOscillator(),e=ctx.createGain(); o.type='sine'; o.frequency.value=f0*r;
      e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g*a,t+.008); e.gain.exponentialRampToValueAtTime(.0001,t+dec);
      o.connect(e); const x=ctx.createGain(); x.gain.value=.42; e.connect(x); x.connect(rev); const y=ctx.createGain(); y.gain.value=.26; e.connect(y); y.connect(fxIn);
      e.connect(master); o.start(t); o.stop(t+dec+.1); });
    // a breath of triangle warmth on the fundamental — soft, singing, hopeful
    const o=ctx.createOscillator(),e=ctx.createGain(); o.type='triangle'; o.frequency.value=f0;
    e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g*.42,t+.012); e.gain.exponentialRampToValueAtTime(.0001,t+1.1);
    o.connect(e); e.connect(master); const y=ctx.createGain(); y.gain.value=.22; e.connect(y); y.connect(rev); o.start(t); o.stop(t+1.2); };

  // ---------- composition (C major ballad — MELODY is the star, A7 nostalgia) ----------
  const BPM=88, S=60/BPM/4, BAR=16*S;
  const CH={
    C: {b:'C2', pad:['C4','E4','G4'], arp:['C3','G3','E4','G3']},
    G: {b:'G2', pad:['G3','B3','D4'], arp:['G2','D3','B3','D3']},
    Am:{b:'A2', pad:['A3','C4','E4'], arp:['A2','E3','C4','E3']},
    Em:{b:'E2', pad:['E3','G3','B3'], arp:['E3','B3','G3','B3']},
    F: {b:'F2', pad:['F3','A3','C4'], arp:['F2','C3','A3','C3']},
    A7:{b:'A2', pad:['A3','C#4','E4','G4'], arp:['A2','E3','C#4','G3']}, // V7/ii — the nostalgic pull
    Dm:{b:'D2', pad:['D3','F3','A3'], arp:['D3','A3','F3','A3']}
  };
  // I V vi iii IV  V7/ii ii V   — the A7→Dm move is the heart
  const progA=['C','G','Am','Em','F','A7','Dm','G'];
  const progB=['F','G','Em','Am','F','A7','Dm','G'];

  // MELODY — a hummable motif, developed. Star of the show. [note, dur in 16ths]
  const melA=[
    ['G4',4],['C5',4],['E5',4],['G5',4],   // C : rising, hopeful hook
    ['F5',4],['E5',4],['D5',8],            // G : come down and breathe
    ['E5',4],['G5',4],['A5',4],['G5',4],   // Am: lift
    ['E5',8],['B4',8],                     // Em: settle low, wistful
    ['A5',4],['G5',4],['F5',4],['E5',4],   // F : a gentle sigh down
    ['E5',4],['C#5',4],['E5',8],           // A7: ★ C#5 = the ache (3rd of A7)
    ['D5',4],['F5',4],['A5',4],['F5',4],   // Dm: C#→D resolves — the tearjerker landing
    ['E5',4],['D5',4],['C5',8]             // G : down home, loops back
  ];
  const melB=[
    ['A5',4],['C6',4],['A5',4],['F5',4],   // F
    ['G5',4],['B5',4],['D6',8],            // G : reach up (peak D6)
    ['B5',4],['G5',4],['E5',8],            // Em
    ['C6',4],['A5',4],['E5',8],            // Am
    ['A5',4],['G5',4],['F5',4],['A5',4],   // F
    ['E5',4],['C#5',4],['E5',8],           // A7: ★ motif of the ache returns
    ['D5',4],['F5',4],['A5',4],['D6',4],   // Dm
    ['C6',4],['B5',4],['G5',8]             // G
  ];

  function seqMel(list, base, {bell:doBell}={}){ let acc=0;
    for(const [n,d] of list){ const t=base+acc*S;
      // the STAR: warm flute (triangle) + thin bright pulse for presence, loud & clear
      voice(hz(n), t, d*S*0.96, {wave:'triangle', g:.2, cut:3400, det:4, vib:6, vr:5, a:.02, d:.08, s:.85, r:.1, pan:.04, rl:.28});
      voice(hz(n), t, d*S*0.9,  {duty:.25, g:.05, cut:4400, det:6, a:.02, s:.8, r:.08, pan:.04, rl:.2});
      if(doBell && acc%16===0) bell(t, nm(midi(n)+12), .06);   // chime doubles phrase starts
      acc+=d; } }
  function pianoArp(root, base){ const c=CH[root].arp;     // soft broken chord — supportive, quiet
    for(let i=0;i<8;i++) voice(hz(c[i%4]), base+i*2*S, 2*S*0.9, {duty:.5, g:.04, cut:2400, det:2, a:.006, d:.06, s:.4, r:.06, pan:(i%2?.22:-.22), rl:.2}); }
  function strings(root, base){ for(const n of CH[root].pad)
    voice(hz(n), base, BAR*0.99, {wave:'sawtooth', g:.028, det:10, vib:5, vr:4, cut:1600, a:.2, d:.3, s:.9, r:.3, rl:.45, pan:rnd(-.2,.2)}); }
  function softBass(root, base){ const rm=midi(CH[root].b);
    voice(mf(rm), base, BAR*0.5*0.95, {wave:'triangle', g:.15, cut:900, det:3, a:.02, d:.12, s:.7, r:.15});
    voice(mf(rm+7), base+BAR*0.5, BAR*0.5*0.95, {wave:'triangle', g:.12, cut:900, det:3, a:.02, d:.12, s:.7, r:.15}); }
  function bellArp(root, base){ const c=CH[root].pad;       // sparse high sparkle (A' reprise only)
    for(let i=0;i<4;i++) bell(base+i*4*S, nm(midi(c[i%c.length])+12), .045); }

  function sectionA(base, {full}={}){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progA[b];
      softBass(ch,bt); strings(ch,bt); pianoArp(ch,bt); if(full) bellArp(ch,bt); }
    seqMel(melA, base, {bell:true}); }
  function sectionB(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progB[b];
      softBass(ch,bt); strings(ch,bt); pianoArp(ch,bt); }
    seqMel(melB, base, {bell:true}); }

  const BODY_BARS=24, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){ sectionA(base); sectionB(base+8*BAR); sectionA(base+16*BAR,{full:true}); }
  function scheduleIntro(base){
    // a gentle rising chime + soft C chord swell, then the melody enters
    for(const n of CH.C.pad) voice(hz(n), base, 2*BAR*0.97, {wave:'triangle', g:.045, det:8, cut:1600, a:.4, d:.4, s:.9, r:.4, rl:.4});
    ['C4','E4','G4','C5','E5'].forEach((n,i)=> bell(base+8*S + i*2*S, n, .07));
    softBass('C', base+BAR);
    return 2*BAR;
  }

  function buildEvents(){ REC=[]; scheduleBody(0); const ev=REC; REC=null; ev.sort((a,b)=>a.t-b.t); return ev; }
  let playing=false, timer=null, rafId=null, EVENTS=null, loopBase=0, evIdx=0;
  function pump(){ if(!playing) return; const horizon=ctx.currentTime+0.35; let guard=0;
    while(guard++<4000){ if(evIdx>=EVENTS.length){ loopBase+=bodyLen; evIdx=0; }
      const e=EVENTS[evIdx]; if(loopBase+e.t>horizon) break; e.play(loopBase); evIdx++; } }
  function start(){
    if(!ctx) initAudio(); if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.82, ctx.currentTime);
    playing=true; EVENTS=buildEvents();
    const t0=ctx.currentTime+0.2; const introLen=scheduleIntro(t0);
    loopBase=t0+introLen; evIdx=0; timer=setInterval(pump,25);
    playBtn.textContent='■ 立ち去る'; playBtn.classList.add('playing');
    scene.classList.add('playing'); statusEl.classList.add('on'); drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime); master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(.0001,ctx.currentTime+.4); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.82; },440);
    playBtn.textContent='▶ 村で過ごす'; playBtn.classList.remove('playing');
    scene.classList.remove('playing'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  const scene=document.getElementById('scene');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  const N=36, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){ if(!playing) return; analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*34).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz); }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.82; });
})();
</script>

</body>
</html>
