<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する、明るい昼の村のBGM『ひだまりの村』。ポケモンの精神を継承（PSG矩形波・快適な音域・リミッター/小分けスケジューラで歪みなし）。" />
<title>ひだまりの村 | Daytime Village Theme</title>
</head>
<body>
<style>
  :root{
    --sky1:#8fd0f0; --sky2:#c9ecff; --sun:#ffd24a; --grass:#7fc46a;
    --ink:#274257; --ink-soft:#5c7c90; --cream:#fbfefe; --leaf:#4f9a52;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:linear-gradient(180deg,#5bb8e6,#8fd0f0 45%,#bfe8c4 78%,#9fd88a);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .town{
    width:min(640px,100%);position:relative;
    border:1px solid rgba(255,255,255,.6);border-radius:22px;
    background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(233,247,255,.82));
    box-shadow:0 30px 70px rgba(40,90,120,.28), inset 0 1px 0 rgba(255,255,255,.9);
    padding:28px 26px 30px;overflow:hidden;backdrop-filter:blur(2px);
  }
  .tag{font-size:11px;letter-spacing:.4em;color:#3f8fb8;text-transform:uppercase;text-align:center;opacity:.9}
  h1{text-align:center;font-size:clamp(27px,6.4vw,42px);font-weight:800;letter-spacing:.1em;margin:4px 0 2px;
    color:#255a77;text-shadow:0 2px 0 rgba(255,255,255,.6)}
  .subtitle{text-align:center;color:var(--ink-soft);font-size:13px;letter-spacing:.22em;margin-bottom:20px}

  .scene{position:relative;height:190px;border-radius:16px;overflow:hidden;
    border:1px solid rgba(255,255,255,.7);
    background:linear-gradient(180deg,#8fd0f0 0%,#bfe8ff 52%,#9fd57f 52%,#7cc361 100%);
    margin-bottom:20px}
  .sun{position:absolute;top:18px;right:26px;font-size:46px;filter:drop-shadow(0 0 18px rgba(255,210,70,.7))}
  .scene.playing .sun{animation:spin 14s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cloud{position:absolute;font-size:38px;opacity:.92;top:26px;left:-60px}
  .cloud.b{top:60px;font-size:28px;opacity:.8}
  .scene.playing .cloud{animation:drift 16s linear infinite}
  .scene.playing .cloud.b{animation:drift 22s linear infinite;animation-delay:-6s}
  @keyframes drift{from{transform:translateX(-70px)}to{transform:translateX(720px)}}
  .houses{position:absolute;left:0;right:0;bottom:26px;display:flex;justify-content:center;gap:6px;font-size:52px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.15))}
  .houses span{transform-origin:bottom}
  .scene.playing .houses span{animation:bob 1.6s ease-in-out infinite}
  .scene.playing .houses span:nth-child(2){animation-delay:.2s}
  .scene.playing .houses span:nth-child(3){animation-delay:.4s}
  .scene.playing .houses span:nth-child(4){animation-delay:.6s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .viz{position:absolute;inset:auto 0 0 0;height:38px;display:flex;align-items:flex-end;gap:3px;padding:0 10px;opacity:.55}
  .viz i{flex:1;background:linear-gradient(180deg,#2f9a52,#1f6e39);border-radius:3px 3px 0 0;height:2px;transition:height .1s ease}

  .controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:13px;padding:14px 28px;
    font-size:15px;font-weight:800;letter-spacing:.1em;color:#12384a;
    background:linear-gradient(180deg,#ffe27a,#ffc23a);
    box-shadow:0 10px 26px rgba(255,180,40,.4),inset 0 1px 0 rgba(255,255,255,.7);transition:transform .12s,filter .2s}
  button:hover{transform:translateY(-2px);filter:brightness(1.05)}
  button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#a9d6ef,#6fb3d8);color:#0f3346}
  .vol{display:flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:12px}
  input[type=range]{accent-color:#ffc23a;width:120px}
  .status{text-align:center;font-size:12px;color:#3f8fb8;letter-spacing:.24em;height:16px;margin-top:12px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:16px;letter-spacing:.03em;line-height:1.8}
</style>

<div class="town">
  <div class="tag">◇ Daytime Village Theme ◇</div>
  <h1>ひだまりの村</h1>
  <div class="subtitle">SUNNY VILLAGE &nbsp;—&nbsp; "Market Day"</div>

  <div class="scene" id="scene">
    <div class="sun">☀️</div>
    <div class="cloud">☁️</div>
    <div class="cloud b">☁️</div>
    <div class="houses"><span>🏠</span><span>🏡</span><span>⛪</span><span>🏠</span></div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="controls">
    <button id="play">▶ 村へ行く</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="72"></div>
  </div>
  <div class="status" id="status">♪ にぎやかな昼下がり ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成している、明るい昼の村のBGMです（音源ファイルなし）。<br>
    ト長調・スウィングした足取り・エコー＆残響つきで、ずっと歩けるループにしています。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, analyser, freqData, fxIn;
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);
  const mf=m=>440*Math.pow(2,(m-69)/12);

  const _pw={};
  function pulseWave(duty){
    const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=16, real=new Float32Array(N), imag=new Float32Array(N); // 16 harmonics: no aliasing buzz in our register
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false});
  }
  function makeImpulse(dur, decay){
    const len=Math.floor(ctx.sampleRate*dur), buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){ const d=buf.getChannelData(c);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
    return buf;
  }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.68;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=4; comp.attack.value=.004; comp.release.value=.25;
    // brickwall limiter — guarantees no clipping distortion even when FX/voices pile up
    const limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.12;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);

    // --- FX sends: tempo-synced delay (chiptune echo) + short reverb — kept subtle so it never builds up ---
    fxIn=ctx.createGain();
    const dl=ctx.createDelay(1.0); dl.delayTime.value=3*S;          // dotted-eighth echo
    const fb=ctx.createGain(); fb.gain.value=0.20;                  // lower feedback: no runaway wash
    const dWet=ctx.createGain(); dWet.gain.value=0.4;
    fxIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(dWet); dWet.connect(master);
    const rv=ctx.createConvolver(); rv.buffer=makeImpulse(1.0,2.8);
    const rWet=ctx.createGain(); rWet.gain.value=0.26;
    fxIn.connect(rv); rv.connect(rWet); rWet.connect(master);
  }
  // --- dual-mode sound layer ---
  // When REC is an array, the composition records events instead of playing them,
  // so a chunked look-ahead scheduler can emit them a little at a time (no big
  // synchronous burst at loop boundaries = no glitch). When REC is null, play now.
  let REC=null;
  function voice(f,t,d,o){ if(REC) REC.push({t,play:b=>_voice(f,b+t,d,o)}); else _voice(f,t,d,o); }
  function kick(t){ if(REC) REC.push({t,play:b=>_kick(b+t)}); else _kick(t); }
  function clap(t){ if(REC) REC.push({t,play:b=>_clap(b+t)}); else _clap(t); }
  function hat(t,open){ if(REC) REC.push({t,play:b=>_hat(b+t,open)}); else _hat(t,open); }
  function shaker(t){ if(REC) REC.push({t,play:b=>_shaker(b+t)}); else _shaker(t); }

  // voice: detuned pair, lowpass, ADSR; `fx` (0..1) sends to delay+reverb
  function _voice(freq,t,dur,{type='triangle',duty=null,gain=.2,detune=5,cut=3000,a=.008,d=.08,s=.7,r=.12,fx=0}={}){
    const g=ctx.createGain(), f=ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=cut; f.Q.value=1.4;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=type;o2.type=type;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t); o2.detune.value=detune;
    const peak=gain, sus=Math.max(gain*s,0.0001);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak,t+a);
    g.gain.exponentialRampToValueAtTime(sus,t+a+d);
    g.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o1.connect(f); o2.connect(f); f.connect(g); g.connect(master);
    if(fx>0){ const sg=ctx.createGain(); sg.gain.value=fx; g.connect(sg); sg.connect(fxIn); }
    o1.start(t); o2.start(t); o1.stop(t+dur+.03); o2.stop(t+dur+.03);
  }
  function _noise(t,dur,type,cut,q,gain){
    const n=ctx.createBufferSource();
    const buf=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1;
    n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=cut; f.Q.value=q;
    const g=ctx.createGain(); g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f); f.connect(g); g.connect(master); n.start(t); n.stop(t+dur+.02);
  }
  const _kick=t=>{ const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(48,t+.09);
    g.gain.setValueAtTime(.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+.17); };
  const _clap=t=>{ // layered short noise bursts = a soft handclap on the backbeat
    for(const off of [0,0.012,0.024]) _noise(t+off,.09,'bandpass',1700,1.6,.12); };
  const _hat=(t,open)=> _noise(t, open?.1:.035,'highpass',8500,.8, open?.14:.1);
  const _shaker=t=> _noise(t,.028,'highpass',6500,.7,.05);

  // ---------- composition (G major, swung walking pace) ----------
  const BPM=126, S=60/BPM/4, BAR=16*S, SW=0.34*S;   // SW = swing offset for off-eighths
  // swung time for a 16th index within a bar-base (delays the "and" of each beat)
  const sw=i => (i%4===2 ? SW : 0);

  // chords: explicit bass (slash chords) + soft triad pad voicing
  const CH={
    G:    {b:'G2',  pad:['G3','B3','D4']},
    'D/F#':{b:'F#2',pad:['D3','F#3','A3']},
    Em:   {b:'E2',  pad:['E3','G3','B3']},
    'G/D':{b:'D2',  pad:['G3','B3','D4']},
    C:    {b:'C2',  pad:['C3','E3','G3']},
    'G/B':{b:'B1',  pad:['G3','B3','D4']},
    Am:   {b:'A1',  pad:['A2','C3','E3']},
    D:    {b:'D2',  pad:['D3','F#3','A3']}
  };
  // A: descending-bass canon-style progression (rich voice leading)
  const progA=['G','D/F#','Em','G/D','C','G/B','Am','D'];
  // B: brighter lift
  const progB=['C','D','G','Em','C','D','G','D'];
  // pad chord tones per bar for arpeggio, by progression
  const arpOf=ch=>{ const p=CH[ch].pad; return [p[0],p[1],p[2],p[1]]; };

  // A theme — memorable hook + answer (chord-tone based). [note, dur-in-16ths]
  const leadA=[
    ['G5',4],['D5',4],['E5',4],['G5',4],
    ['F#5',4],['A5',4],['A5',8],
    ['G5',4],['B5',4],['A5',4],['G5',4],
    ['D5',4],['G5',4],['B5',8],
    ['C6',4],['B5',4],['A5',4],['G5',4],
    ['B5',4],['A5',4],['G5',8],
    ['A5',4],['C6',4],['B5',4],['A5',4],
    ['B5',4],['A5',4],['D5',8]
  ];
  // B theme — contrasting, in a warmer mid register (one octave lower than before)
  const leadB=[
    ['E5',8],['D5',4],['C5',4],
    ['D5',8],['A4',4],['D5',4],
    ['B4',4],['D5',4],['G5',8],
    ['E5',4],['D5',4],['B4',8],
    ['C5',4],['E5',4],['G5',4],['E5',4],
    ['A4',4],['D5',4],['F#5',4],['D5',4],
    ['G5',4],['F#5',4],['E5',4],['D5',4],
    ['A4',4],['B4',4],['D5',8]
  ];

  function seqLead(list, base){
    let acc=0;
    for(const [n,d] of list){
      const t=base + acc*S + sw(acc%16);
      voice(hz(n), t, d*S*0.92, {duty:.25, gain:.16, cut:3400, detune:6, a:.006, d:.06, s:.72, r:.08, fx:.16}); // bright lead w/ echo
      voice(hz(n), t, d*S*0.9,  {type:'triangle', gain:.05, cut:2600, detune:3, a:.01, d:.06, s:.7, r:.08});    // soft body
      acc += d;
    }
  }
  function bassBar(ch, base){
    // bouncing quarter-note walk: root(1) fifth(2) root(3) fifth(4)
    const rm=midi(CH[ch].b), fm=rm+7;
    const seq=[rm,fm,rm,fm];
    for(let i=0;i<4;i++)
      voice(mf(seq[i]), base+i*4*S, 4*S*0.88, {type:'triangle', gain:.18, cut:1050, detune:3, a:.006, d:.08, s:.6, r:.08});
  }
  function padBar(ch, base){
    for(const n of CH[ch].pad)
      voice(hz(n), base, BAR*0.98, {type:'triangle', gain:.04, cut:1700, detune:8, a:.14, d:.22, s:.85, r:.28, fx:.07});
  }
  function pluckBar(ch, base){
    // swung offbeat plucks (mandolin-ish) with a touch of echo
    const cell=arpOf(ch);
    for(let i=0;i<8;i++){
      const step=i*2;
      voice(hz(cell[i%4]), base+step*S+sw(step%16), 2*S*0.6,
        {duty:.25, gain:.045, cut:3000, detune:2, a:.003, d:.04, s:.22, r:.05, fx:.12});
    }
  }
  function drumBar(base){
    kick(base+0*S); kick(base+8*S); kick(base+11*S);          // beats 1,3 + syncopated push
    clap(base+4*S); clap(base+12*S);                          // backbeat 2 & 4
    for(let i=0;i<16;i+=2) hat(base+i*S+sw(i), i===14);       // swung eighth hats, open on last
    shaker(base+2*S+sw(2)); shaker(base+6*S+sw(6)); shaker(base+10*S+sw(10)); shaker(base+14*S+sw(14));
  }

  function section(base, prog, lead, {perc,pluck}){
    for(let b=0;b<8;b++){
      const bt=base+b*BAR, ch=prog[b];
      bassBar(ch, bt);
      padBar(ch, bt);
      if(pluck) pluckBar(ch, bt);
      if(perc)  drumBar(bt);
    }
    seqLead(lead, base);
  }

  const BODY_BARS=32, bodyLen=BODY_BARS*BAR;   // A, A+full, B, A(reprise)
  function scheduleBody(base){
    section(base+0*8*BAR,  progA, leadA, {perc:false, pluck:false}); // intro-ish: light
    section(base+1*8*BAR,  progA, leadA, {perc:true,  pluck:true});  // full & bustling
    section(base+2*8*BAR,  progB, leadB, {perc:true,  pluck:true});  // bright B contrast
    section(base+3*8*BAR,  progA, leadA, {perc:true,  pluck:true});  // reprise
  }
  function scheduleIntro(base){
    for(const n of CH.G.pad) voice(hz(n), base, 2*BAR*0.96, {type:'triangle', gain:.06, cut:2000, a:.2, d:.3, s:.85, r:.4, fx:.08});
    ['G4','B4','D5','G5'].forEach((n,i)=> voice(hz(n), base+i*2*S, 2*S*0.9, {duty:.25, gain:.11, cut:3200, a:.004, d:.05, s:.4, r:.06, fx:.16}));
    kick(base+BAR); clap(base+BAR+8*S);
    return 2*BAR;
  }

  // build the whole body once as a sorted event list (relative times)
  function buildEvents(){
    REC=[]; scheduleBody(0); const ev=REC; REC=null;
    ev.sort((a,b)=>a.t-b.t); return ev;
  }

  // transport — chunked look-ahead scheduler (emits only ~0.3s of events per 25ms tick)
  let playing=false, timer=null, rafId=null, EVENTS=null, loopBase=0, evIdx=0;
  function pump(){
    if(!playing) return;
    const horizon=ctx.currentTime+0.3;
    let guard=0;
    while(guard++<3000){
      if(evIdx>=EVENTS.length){ loopBase+=bodyLen; evIdx=0; }   // seamless loop
      const e=EVENTS[evIdx];
      if(loopBase+e.t > horizon) break;
      e.play(loopBase); evIdx++;
    }
  }
  function start(){
    if(!ctx) initAudio();
    if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.68, ctx.currentTime);
    playing=true;
    EVENTS=buildEvents();
    const t0=ctx.currentTime+0.2;
    const introLen=scheduleIntro(t0);   // intro plays once, directly
    loopBase=t0+introLen; evIdx=0;
    timer=setInterval(pump,25);
    playBtn.textContent='■ 村を出る'; playBtn.classList.add('playing');
    scene.classList.add('playing'); statusEl.classList.add('on');
    drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(0.0001,ctx.currentTime+0.35); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.68; },400);
    playBtn.textContent='▶ 村へ行く'; playBtn.classList.remove('playing');
    scene.classList.remove('playing'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  // visuals
  const scene=document.getElementById('scene');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  const N=32, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){
    if(!playing) return;
    analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*36).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz);
  }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.68; });
})();
</script>

</body>
</html>
