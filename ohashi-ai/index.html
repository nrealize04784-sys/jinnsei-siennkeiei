<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>大橋会長AI 🐦‍🔥 フェニックスChat（非公式ファンメイド）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep: #0d2b5e;
    --navy: #1d4e9e;
    --blue: #3d7fd4;
    --blue-light: #bcdcf8;
    --blue-pale: #eaf4ff;
    --flame: #ff6b35;
    --flame-deep: #e8491d;
    --gold: #f5b942;
    --text: #1c2a3a;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    background: linear-gradient(160deg, var(--blue-pale) 0%, var(--blue-light) 35%, #7fb3e8 70%, #3a6fb8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ----- floating feathers & sparks (phoenix motif) ----- */
  .deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .feather {
    position: absolute;
    background: rgba(255,255,255,0.8);
    border-radius: 100px;
    filter: blur(1px);
    animation: drift linear infinite;
  }
  .feather::before, .feather::after {
    content: ''; position: absolute; background: inherit; border-radius: 50%;
  }
  .feather.f1 { width: 160px; height: 48px; top: 9%; left: -180px; animation-duration: 48s; }
  .feather.f1::before { width: 70px; height: 70px; top: -34px; left: 24px; }
  .feather.f1::after  { width: 50px; height: 50px; top: -22px; left: 80px; }
  .feather.f2 { width: 120px; height: 38px; top: 24%; left: -140px; animation-duration: 64s; animation-delay: -22s; opacity: .7; }
  .feather.f2::before { width: 52px; height: 52px; top: -26px; left: 18px; }
  .feather.f2::after  { width: 38px; height: 38px; top: -16px; left: 60px; }
  .feather.f3 { width: 200px; height: 56px; top: 72%; left: -220px; animation-duration: 56s; animation-delay: -40s; opacity: .6; }
  .feather.f3::before { width: 84px; height: 84px; top: -40px; left: 30px; }
  .feather.f3::after  { width: 60px; height: 60px; top: -26px; left: 100px; }
  @keyframes drift { to { transform: translateX(calc(100vw + 260px)); } }

  .spark {
    position: absolute; color: rgba(255,255,255,0.9);
    animation: twinkle 2.6s ease-in-out infinite;
    text-shadow: 0 0 12px rgba(255,107,53,0.8);
  }
  @keyframes twinkle { 0%,100% { opacity: .2; transform: scale(.8) rotate(0deg);} 50% { opacity: 1; transform: scale(1.15) rotate(20deg);} }

  /* ----- app frame ----- */
  .app {
    position: relative; z-index: 1;
    width: min(540px, 96vw);
    height: min(780px, 94vh);
    height: min(780px, 94dvh); /* モバイルのアドレスバー分を除いた実表示域 */
    display: flex; flex-direction: column;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(14px);
    border-radius: 28px;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 18px 50px rgba(29,78,158,0.4), 0 4px 14px rgba(255,107,53,0.2);
    overflow: hidden;
  }
  /* スマホは全画面レイアウトにして入力欄の見切れを防ぐ */
  @media (max-width: 600px) {
    body { align-items: stretch; justify-content: stretch; }
    .app {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      border: none;
    }
    .chips { padding: 6px 10px; gap: 6px; }
    .chip { font-size: 11px; padding: 5px 10px; }
    .input-bar { padding: 10px 10px 12px; gap: 8px; }
    .input-bar input { font-size: 16px; padding: 10px 16px; } /* 16px未満だとiOSが自動ズームする */
    .input-bar button { padding: 0 18px; flex: none; }
    footer { padding-bottom: calc(6px + env(safe-area-inset-bottom)); }
  }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: linear-gradient(90deg, var(--navy-deep), var(--navy) 60%, var(--blue));
    color: var(--white);
  }
  .avatar {
    width: 52px; height: 52px; flex: none;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    overflow: hidden;
  }
  .avatar svg { width: 100%; height: 100%; display: block; }
  .title { line-height: 1.25; }
  .title h1 { font-size: 18px; font-weight: 900; letter-spacing: .02em; }
  .title p { font-size: 11px; opacity: .92; font-weight: 500; }
  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #7dff9b; margin-right: 5px;
    box-shadow: 0 0 6px #7dff9b;
  }

  /* ----- chat area ----- */
  .chat {
    flex: 1; overflow-y: auto;
    padding: 20px 16px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  /* ----- profile card ----- */
  .profile-card {
    align-self: center;
    text-align: center;
    background: rgba(255,255,255,.9);
    border: 2.5px solid var(--navy);
    border-radius: 24px;
    padding: 18px 34px 14px;
    box-shadow: 0 6px 20px rgba(29,78,158,.3);
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  .profile-photo {
    width: 112px; height: 112px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px var(--gold), 0 6px 16px rgba(29,78,158,.45);
    background: #fff;
  }
  .profile-photo svg { width: 100%; height: 100%; display: block; }
  .profile-card h2 {
    font-size: 17px; font-weight: 900;
    background: linear-gradient(90deg, var(--navy), var(--flame-deep));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .profile-card p { font-size: 11px; color: #5a6e85; font-weight: 500; }

  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row.user { flex-direction: row-reverse; }
  .row .avatar { width: 38px; height: 38px; border-width: 2px; }
  .bubble {
    max-width: 76%;
    padding: 11px 15px;
    border-radius: 20px;
    font-size: 14.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    box-shadow: 0 3px 10px rgba(60,100,160,.18);
    animation: pop .28s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.96); } }
  .row.ai .bubble {
    background: linear-gradient(135deg, #ffffff, var(--blue-pale));
    border: 2px solid var(--navy);
    border-bottom-left-radius: 6px;
  }
  .row.user .bubble {
    background: linear-gradient(135deg, #dcecff, var(--blue-light));
    border: 2px solid var(--blue);
    border-bottom-right-radius: 6px;
  }
  .name-tag { font-size: 10.5px; font-weight: 700; margin-bottom: 2px; }
  .row.ai .name-tag { color: var(--navy); }

  .typing { display: inline-flex; gap: 5px; padding: 6px 2px; }
  .typing i {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--navy);
    animation: bounce 1s infinite;
  }
  .typing i:nth-child(2) { animation-delay: .15s; }
  .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0);} 30% { transform: translateY(-7px);} }

  /* ----- quick chips ----- */
  .chips {
    display: flex; gap: 8px; padding: 8px 14px; flex-wrap: wrap;
    background: rgba(255,255,255,.55);
  }
  .chip {
    border: 2px solid var(--navy);
    color: var(--navy);
    background: #fff;
    font-family: inherit;
    font-size: 12px; font-weight: 700;
    padding: 6px 12px; border-radius: 999px;
    cursor: pointer;
    transition: transform .12s, background .12s;
  }
  .chip:nth-child(even) { border-color: var(--flame-deep); color: var(--flame-deep); }
  .chip:hover { transform: translateY(-2px) scale(1.04); background: #fff8f0; }

  /* ----- input ----- */
  .input-bar {
    display: flex; gap: 10px; padding: 12px 14px 14px;
    background: rgba(255,255,255,.85);
    border-top: 2px solid rgba(61,127,212,.4);
  }
  .input-bar input {
    flex: 1 1 0;
    min-width: 0; /* flexで縮めるように（これがないと狭い画面でボタンを押し出す） */
    font-family: inherit; font-size: 14.5px;
    padding: 12px 18px;
    border-radius: 999px;
    border: 2.5px solid var(--blue);
    outline: none;
    background: #fff;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .input-bar input:focus { border-color: var(--navy); box-shadow: 0 0 0 4px rgba(29,78,158,.18); }
  .input-bar button {
    flex: none;
    white-space: nowrap;
    font-family: inherit; font-weight: 900; font-size: 14px;
    color: #fff;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    border: none; border-radius: 999px;
    padding: 0 24px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(29,78,158,.4);
    transition: transform .12s, filter .12s;
  }
  .input-bar button:hover { transform: scale(1.05); filter: brightness(1.12); }
  .input-bar button:active { transform: scale(.97); }

  footer {
    text-align: center; font-size: 10px; color: #5a6e85;
    padding: 0 10px 8px; background: rgba(255,255,255,.85);
  }
</style>
</head>
<body>

<div class="deco" aria-hidden="true">
  <div class="feather f1"></div>
  <div class="feather f2"></div>

<div class="app">

    <div class="avatar" id="header-avatar"></div>
    <div class="title">
      <h1>大橋会長AI 🐦‍🔥 フェニックスChat</h1>
      <p><span class="status-dot"></span>会長室で待ってます（非公式ファンメイドAI）</p>
    </div>
  </header>

  <div class="chat" id="chat">

      <div class="profile-photo" id="profile-avatar"></div>

  アバターは実在人物の写真を使用しないオリジナルイラスト（青いフェニックス）です。</footer>
</div>

<script>
/* ---- ナレッジ検索（大橋会長 知識ベース） ---- */
function knowledgeMatch(text) {
  if (typeof KNOWLEDGE === 'undefined') return null;
  let best = null, bestScore = 0;
  for (const k of KNOWLEDGE) {
    let score = 0;
    for (const kw of k.keywords) if (kw.length >= 2 && text.includes(kw)) score += kw.length >= 4 ? 2 : 1;
    if (score > bestScore) { bestScore = score; best = k; }
  }
  return best ? { entry: best, score: bestScore } : null;
}
const KNOW_PRE = [
  'ああ、その話ですか。よく聞かれるんですよ（笑）\n\n',
  'いい質問ですねえ。それはちょっと熱く語っちゃいますよ。\n\n',
  'その話になると、つい長くなっちゃうんですけどね。\n\n',
];

  '\n\nボクシングも人生も、結局は這い上がる力なんですよね。',
];

  { re: /(バイバイ|さよなら|またね|おやすみ|失礼します|帰ります|寝る)/, res: [
    'はい、今日はありがとうございました。またいつでもいらしてください。ここはパワースポットですから（笑）気をつけてお帰りくださいね。',
  ]},
  { re: /(ボクシング|試合|観戦|チケット)/, res: [
    'ボクシングはいいですよ。殴り合いに見えて、実は一番アタマを使うスポーツなんです。人生に必要なものが全部詰まってますよ。よかったらフェニックスバトル、観に来てください（笑）',
  ]},
  { re: /(好き|趣味|楽しい)/, res: [
    '私はもう、ボクシング一筋ですからね（笑）還暦を過ぎても頭の中は小中学生と変わらないんですよ。プロモーターとして、こんなに楽しいことはないです。',
  ]},
];
const FALLBACK = [
  'ほう、なるほどねえ。それで、どうなったんですか？',
  'いやあ、面白い話ですね。もうちょっと聞かせてくださいよ。',
  'うーん、それはちょっと、ここでは言えないですね（笑）でも別の話なら何でもどうぞ。',
  'なるほどなるほど。還暦過ぎても頭の中は小中学生と変わらないんで、何の話でも食いつきますよ（笑）',
  'それは興味深いですねえ。ボクシングで言えば、いいジャブみたいな話です（笑）続きをどうぞ。',
];

let lastIdx = -1;
function pick(arr) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && i === lastIdx);
  lastIdx = i;
  return arr[i];
}
function reply(text) {
  const km = knowledgeMatch(text);
  if (km && km.score >= 3) return pick(KNOW_PRE) + km.entry.answer + pick(KNOW_POST);
  for (const r of RULES) if (r.re.test(text)) return pick(r.res);
  if (km && km.score >= 1) return pick(KNOW_PRE) + km.entry.answer + pick(KNOW_POST);
  return pick(FALLBACK);
}

/* ---- UI ---- */
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addRow(who, html, isTyping = false) {
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const av = who === 'ai' ? `<div class="avatar">${avatarHTML()}</div>` : '';
  const tag = who === 'ai' ? '<div class="name-tag">大橋会長AI</div>' : '';
  row.innerHTML = `${av}<div><${'div'} class="bubble">${tag}${html}</div></div>`;
  if (isTyping) row.dataset.typing = '1';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}
function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function botSay(text, delay = 700) {
  const t = addRow('ai', '<span class="typing"><i></i><i></i><i></i></span>', true);
  setTimeout(() => {
    t.remove();
    addRow('ai', esc(text));
  }, delay + Math.random() * 500);
}
function send(raw) {
  const text = (raw ?? input.value).trim();
  if (!text) return;
  input.value = '';
  addRow('user', esc(text));
  botSay(reply(text));
}
document.getElementById('send').addEventListener('click', () => send());
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.getElementById('chips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) send(e.target.textContent);
});

botSay('どうも、大橋です。今日はどんな話をしましょうか。ボクシングのことでも、人生相談でも、何でもどうぞ（笑）\n※私は大橋会長をモデルにした非公式ファンメイドAIです', 400);
