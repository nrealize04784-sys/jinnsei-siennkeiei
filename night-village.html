<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する、静かな夜の村のBGM『月夜の村』。イ短調・スロー・虫の音つき。ポケモンの精神を継承。" />
<title>月夜の村 | Moonlit Village Theme</title>
</head>
<body>
<style>
  :root{
    --ink:#dfe6ff; --ink-soft:#9aa6d4; --moon:#f3ecd0; --indigo:#1a2150; --accent:#8fb4ff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:
      radial-gradient(90% 70% at 78% 12%, #33407e 0%, transparent 55%),
      radial-gradient(80% 60% at 20% 120%, #241a4a 0%, transparent 55%),
      linear-gradient(180deg,#0a0e28,#0b1030 55%,#141a3e);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .night{
    width:min(620px,100%);position:relative;
    border:1px solid rgba(143,180,255,.24);border-radius:20px;
    background:linear-gradient(180deg,rgba(20,26,62,.92),rgba(10,14,40,.96));
    box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(180,200,255,.08);
    padding:28px 26px 30px;overflow:hidden;
  }
  .tag{font-size:11px;letter-spacing:.42em;color:var(--accent);text-transform:uppercase;text-align:center;opacity:.85}
  h1{text-align:center;font-size:clamp(27px,6.4vw,42px);font-weight:700;letter-spacing:.14em;margin:4px 0 2px;
    color:#f4f2ff;text-shadow:0 0 26px rgba(143,180,255,.35)}
  .subtitle{text-align:center;color:var(--ink-soft);font-size:13px;letter-spacing:.24em;margin-bottom:20px}

  .scene{position:relative;height:190px;border-radius:16px;overflow:hidden;
    border:1px solid rgba(143,180,255,.2);
    background:linear-gradient(180deg,#0e153c 0%,#1b2456 52%,#20305a 52%,#122043 100%);
    margin-bottom:20px}
  .moon{position:absolute;top:20px;right:30px;font-size:48px;filter:drop-shadow(0 0 22px rgba(243,236,208,.6))}
  .scene.playing .moon{animation:glow 4s ease-in-out infinite}
  @keyframes glow{0%,100%{filter:drop-shadow(0 0 18px rgba(243,236,208,.5))}50%{filter:drop-shadow(0 0 30px rgba(243,236,208,.85))}}
  .stars{position:absolute;inset:0}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#eaf0ff}
  .scene.playing .stars i{animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:.95}}
  .fly{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff2a8;box-shadow:0 0 8px 2px rgba(255,235,140,.8);opacity:0}
  .scene.playing .fly{animation:float 6s ease-in-out infinite}
  .scene.playing .fly.b{animation-duration:8s;animation-delay:-3s}
  @keyframes float{0%{opacity:0;transform:translate(0,0)}20%{opacity:.9}50%{transform:translate(40px,-24px)}80%{opacity:.7}100%{opacity:0;transform:translate(90px,-8px)}}
  .houses{position:absolute;left:0;right:0;bottom:22px;display:flex;justify-content:center;gap:8px;font-size:48px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
  .win{position:absolute;bottom:40px;width:9px;height:9px;border-radius:2px;background:radial-gradient(circle,#ffd98a,#ff9a3c);box-shadow:0 0 12px 3px rgba(255,160,60,.6);opacity:.5}
  .win.a{left:38%}.win.b{left:57%}
  .scene.playing .win{animation:lamp 3.6s ease-in-out infinite}
  .scene.playing .win.b{animation-delay:-1.8s}
  @keyframes lamp{0%,100%{opacity:.45}50%{opacity:.85}}
  .viz{position:absolute;inset:auto 0 0 0;height:36px;display:flex;align-items:flex-end;gap:3px;padding:0 10px;opacity:.5}
  .viz i{flex:1;background:linear-gradient(180deg,#8fb4ff,#3a4a9e);border-radius:3px 3px 0 0;height:2px;transition:height .12s ease}

  .controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:13px;padding:14px 28px;
    font-size:15px;font-weight:700;letter-spacing:.12em;color:#0c1030;
    background:linear-gradient(180deg,#cfe0ff,#8fb4ff);
    box-shadow:0 10px 26px rgba(90,130,220,.4),inset 0 1px 0 rgba(255,255,255,.6);transition:transform .12s,filter .2s}
  button:hover{transform:translateY(-2px);filter:brightness(1.06)}
  button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#5a6bb0,#3a4788);color:#eaf0ff}
  .vol{display:flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:12px}
  input[type=range]{accent-color:#8fb4ff;width:120px}
  .status{text-align:center;font-size:12px;color:var(--accent);letter-spacing:.24em;height:16px;margin-top:12px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:16px;letter-spacing:.03em;line-height:1.8}
</style>

<div class="night">
  <div class="tag">◇ Moonlit Village Theme ◇</div>
  <h1>月夜の村</h1>
  <div class="subtitle">MOONLIT VILLAGE &nbsp;—&nbsp; "Quiet Night"</div>

  <div class="scene" id="scene">
    <div class="stars" id="stars"></div>
    <div class="moon">🌙</div>
    <div class="fly"></div>
    <div class="fly b"></div>
    <div class="win a"></div>
    <div class="win b"></div>
    <div class="houses"><span>🏠</span><span>🏡</span><span>🏠</span></div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="controls">
    <button id="play">▶ 夜の村へ</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="72"></div>
  </div>
  <div class="status" id="status">♪ しずかな夜 ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成している、静かな夜の村のBGMです（音源ファイルなし）。<br>
    イ短調・ゆるやかなテンポ・かすかな虫の音。<b>月夜の静けさ重視でぐっと音量を抑え</b>、まず静かな月あかりの床だけ→やがてやわらかな旋律がそっと差す構成にしています。<br>
    <span style="opacity:.8">📱 iPhoneで無音のときは本体横のサイレントスイッチを確認してね！</span>
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, analyser, freqData, fxIn;
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);
  const mf=m=>440*Math.pow(2,(m-69)/12);

  const _pw={};
  function pulseWave(duty){
    const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=16, real=new Float32Array(N), imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false});
  }
  function makeImpulse(dur, decay){
    const len=Math.floor(ctx.sampleRate*dur), buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){ const d=buf.getChannelData(c);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
    return buf;
  }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.5;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-18; comp.knee.value=24; comp.ratio.value=4; comp.attack.value=.004; comp.release.value=.25;
    const limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.12;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);
    // subtle echo + reverb for nocturnal space (kept low so it never builds up)
    fxIn=ctx.createGain();
    const dl=ctx.createDelay(1.0); dl.delayTime.value=4*S;         // quarter-note echo
    const fb=ctx.createGain(); fb.gain.value=0.22;
    const dWet=ctx.createGain(); dWet.gain.value=0.4;
    fxIn.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(dWet); dWet.connect(master);
    const rv=ctx.createConvolver(); rv.buffer=makeImpulse(1.4,2.4);
    const rWet=ctx.createGain(); rWet.gain.value=0.3;
    fxIn.connect(rv); rv.connect(rWet); rWet.connect(master);
  }

  // dual-mode sound layer (record for the chunked scheduler, or play now)
  let REC=null;
  function voice(f,t,d,o){ if(REC) REC.push({t,play:b=>_voice(f,b+t,d,o)}); else _voice(f,t,d,o); }
  function cricket(t){ if(REC) REC.push({t,play:b=>_cricket(b+t)}); else _cricket(t); }

  function _voice(freq,t,dur,{type='triangle',duty=null,gain=.2,detune=5,cut=2600,a=.02,d=.12,s=.7,r=.28,fx=0}={}){
    const g=ctx.createGain(), f=ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=cut; f.Q.value=1.1;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=type;o2.type=type;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t); o2.detune.value=detune;
    const peak=gain, sus=Math.max(gain*s,0.0001);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak,t+a);
    g.gain.exponentialRampToValueAtTime(sus,t+a+d);
    g.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o1.connect(f); o2.connect(f); f.connect(g); g.connect(master);
    if(fx>0){ const sg=ctx.createGain(); sg.gain.value=fx; g.connect(sg); sg.connect(fxIn); }
    o1.start(t); o2.start(t); o1.stop(t+dur+.03); o2.stop(t+dur+.03);
  }
  // crickets: a very short high chirp (two ticks), faint — night ambience via the noise channel
  function _cricket(t){
    for(const off of [0,0.05]){
      const n=ctx.createBufferSource();
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.03),ctx.sampleRate);
      const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1;
      n.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=7200; f.Q.value=12;
      const g=ctx.createGain(); g.gain.setValueAtTime(.02,t+off); g.gain.exponentialRampToValueAtTime(.0001,t+off+.03);
      n.connect(f); f.connect(g); g.connect(master); n.start(t+off); n.stop(t+off+.05);
    }
  }

  // ---------- composition (A minor, slow & nocturnal) ----------
  const BPM=80, S=60/BPM/4, BAR=16*S;
  const CH={
    Am:{b:'A2', pad:['A3','C4','E4']},
    F: {b:'F2', pad:['F3','A3','C4']},
    C: {b:'C2', pad:['C4','E4','G4']},
    G: {b:'G2', pad:['G3','B3','D4']},
    Dm:{b:'D2', pad:['D3','F3','A3']},
    E: {b:'E2', pad:['E3','G#3','B3']}   // E major (harmonic-minor V) — the night's ache
  };
  const prog=['Am','F','C','G','Am','F','Dm','E'];
  const arpOf=ch=>{ const p=CH[ch].pad; return [p[0],p[1],p[2],p[1]]; };

  // gentle, contemplative melody (8 bars), mid register. [note, dur-in-16ths]
  const lead=[
    ['E5',8],['C5',4],['A4',4],
    ['F5',8],['E5',4],['C5',4],
    ['E5',4],['G5',4],['E5',8],
    ['D5',4],['B4',4],['G4',8],
    ['A4',4],['C5',4],['E5',4],['A5',4],
    ['A5',8],['G5',4],['F5',4],
    ['F5',4],['E5',4],['D5',4],['A4',4],
    ['E5',4],['B4',4],['G#4',8]
  ];

  function seqLead(base){
    let acc=0;
    for(const [n,d] of lead){
      const t=base+acc*S;
      voice(hz(n), t, d*S*0.94, {duty:.22, gain:.082, cut:2000, detune:5, a:.05, d:.14, s:.72, r:.24, fx:.34}); // distant, soft flute
      voice(hz(n), t, d*S*0.9,  {type:'triangle', gain:.06, cut:1700, detune:3, a:.05, d:.1, s:.7, r:.2, fx:.16}); // warm body (leads the tone)
      acc += d;
    }
  }
  function bassBar(ch, base){
    const rm=midi(CH[ch].b), fm=rm+7;
    voice(mf(rm), base,        BAR*0.5*0.95, {type:'triangle', gain:.14, cut:640, detune:3, a:.04, d:.2, s:.72, r:.28});
    voice(mf(fm), base+BAR*0.5, BAR*0.5*0.95, {type:'triangle', gain:.11, cut:640, detune:3, a:.04, d:.2, s:.72, r:.28});
  }
  function padBar(ch, base){
    for(const n of CH[ch].pad)
      voice(hz(n), base, BAR*0.98, {type:'triangle', gain:.038, cut:1500, detune:8, a:.35, d:.4, s:.85, r:.5, fx:.1});
  }
  function boxBar(ch, base){
    // sparse music-box arpeggio: quarter notes, soft, with echo — like distant chimes
    const cell=arpOf(ch);
    for(let i=0;i<4;i++)
      voice(hz(cell[i]), base+i*4*S, 4*S*0.7, {duty:.125, gain:.03, cut:3000, detune:2, a:.004, d:.06, s:.25, r:.1, fx:.3});
  }
  function ambBar(base, b){ if(b%2===0) cricket(base+7*S); } // a single faint chirp every other bar

  function section(base, {box, lead}){
    for(let b=0;b<8;b++){
      const bt=base+b*BAR, ch=prog[b];
      bassBar(ch, bt);
      padBar(ch, bt);
      if(box) boxBar(ch, bt);
      ambBar(bt, b);
    }
    if(lead) seqLead(base);
  }

  const BODY_BARS=16, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){
    section(base,       {box:false, lead:false}); // still moonlit bed — pads, soft bass, faint crickets (no melody = stillness)
    section(base+8*BAR, {box:true,  lead:true});  // the gentle melody drifts in with distant music-box
  }
  function scheduleIntro(base){
    for(const n of CH.Am.pad) voice(hz(n), base, 2*BAR*0.97, {type:'triangle', gain:.05, cut:1300, a:.6, d:.5, s:.85, r:.6, fx:.12});
    ['A4','C5','E5','A5'].forEach((n,i)=> voice(hz(n), base+i*4*S, 4*S*0.7, {duty:.2, gain:.055, cut:2400, a:.006, d:.1, s:.3, r:.16, fx:.36}));
    cricket(base+2*S); cricket(base+BAR+6*S);
    return 2*BAR;
  }

  // build body once, then chunked look-ahead scheduler
  function buildEvents(){ REC=[]; scheduleBody(0); const ev=REC; REC=null; ev.sort((a,b)=>a.t-b.t); return ev; }
  let playing=false, timer=null, rafId=null, EVENTS=null, loopBase=0, evIdx=0;
  function pump(){
    if(!playing) return;
    const horizon=ctx.currentTime+0.35;
    let guard=0;
    while(guard++<3000){
      if(evIdx>=EVENTS.length){ loopBase+=bodyLen; evIdx=0; }
      const e=EVENTS[evIdx];
      if(loopBase+e.t > horizon) break;
      e.play(loopBase); evIdx++;
    }
  }
  function start(){
    if(!ctx) initAudio();
    if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.5, ctx.currentTime);
    playing=true;
    EVENTS=buildEvents();
    const t0=ctx.currentTime+0.2;
    const introLen=scheduleIntro(t0);
    loopBase=t0+introLen; evIdx=0;
    timer=setInterval(pump,25);
    playBtn.textContent='■ 夜を離れる'; playBtn.classList.add('playing');
    scene.classList.add('playing'); statusEl.classList.add('on');
    drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(0.0001,ctx.currentTime+0.45); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.5; },500);
    playBtn.textContent='▶ 夜の村へ'; playBtn.classList.remove('playing');
    scene.classList.remove('playing'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  // visuals
  const scene=document.getElementById('scene');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  const starBox=document.getElementById('stars');
  for(let i=0;i<34;i++){ const s=document.createElement('i');
    s.style.left=(3+i*2.9%94)+'%'; s.style.top=(4+(i*41%46))+'%'; s.style.animationDelay=(i%7*0.4)+'s';
    starBox.appendChild(s); }
  const N=32, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){
    if(!playing) return;
    analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*34).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz);
  }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.5; });
})();
</script>

</body>
</html>
