<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する中ボス（ダンジョンボス）BGM『黄金神殿の守護者』。イ短調・印象的なピアノ導入＋シロナ型進行＋♭II恐怖。ポケモンの精神を継承。" />
<title>黄金神殿の守護者 | Dungeon Boss</title>
</head>
<body>
<style>
  :root{ --gold:#e0a94e; --gold2:#8a5e1a; --red:#ff3b57; --ink:#f4ead2; --dim:#a08a5e; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:
      radial-gradient(120% 90% at 50% -10%, #3a2408 0%, transparent 52%),
      radial-gradient(90% 70% at 50% 120%, #3a0512 0%, transparent 55%),
      linear-gradient(180deg,#0a0803,#0c0705 60%,#0d0604);
    color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
  .cab{width:min(700px,100%);position:relative;border:1px solid #4a3418;border-radius:18px;
    background:linear-gradient(180deg,rgba(22,15,7,.95),rgba(8,5,3,.97));
    box-shadow:0 0 0 1px rgba(224,169,78,.1),0 30px 90px rgba(0,0,0,.75), inset 0 1px 0 rgba(224,169,78,.1);padding:26px 26px 30px;overflow:hidden}
  .cab::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;opacity:.5}
  .tag{font-size:11px;letter-spacing:.44em;color:var(--gold);text-transform:uppercase;text-align:center;opacity:.9}
  h1{text-align:center;font-size:clamp(26px,6.6vw,44px);font-weight:800;letter-spacing:.06em;line-height:1.08;margin:2px 0;
    background:linear-gradient(180deg,#fff0cf,#e0a94e 50%,#ff3b57);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(224,120,60,.3)}
  .subtitle{text-align:center;color:var(--dim);font-size:13px;letter-spacing:.2em;margin-bottom:18px}
  .stage{position:relative;height:190px;border-radius:12px;overflow:hidden;border:1px solid #4a3418;
    background:radial-gradient(80% 120% at 50% 120%,#4a1a0a,#1a0f06 55%,#0a0604);margin-bottom:16px}
  .boss{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:92px;filter:drop-shadow(0 0 24px rgba(224,120,60,.55));animation:hover 2.6s ease-in-out infinite}
  @keyframes hover{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
  .stage.rage .boss{animation:rage .11s linear infinite}
  @keyframes rage{0%{transform:translateX(-50%) translateY(0) rotate(-3deg)}50%{transform:translateX(-52%) translateY(-5px) rotate(3deg)}100%{transform:translateX(-48%) translateY(0) rotate(-2deg)}}
  .aura{position:absolute;left:50%;bottom:0;width:260px;height:260px;transform:translate(-50%,42%);
    background:radial-gradient(circle,rgba(224,169,78,.4),rgba(255,59,87,.22) 42%,transparent 66%);opacity:0;transition:opacity .4s}
  .stage.playing .aura{opacity:1;animation:pulse 1.3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
  .rune{position:absolute;font-size:18px;opacity:0;color:#ffcf6b;text-shadow:0 0 10px #e0a94e}
  .stage.playing .rune{animation:spin 3.2s linear infinite}
  @keyframes spin{0%{opacity:0;transform:rotate(0) translateY(0)}25%{opacity:.7}100%{opacity:0;transform:rotate(360deg) translateY(-28px)}}
  .viz{position:absolute;inset:auto 0 0 0;height:58px;display:flex;align-items:flex-end;gap:2px;padding:0 6px;opacity:.9}
  .viz i{flex:1;background:linear-gradient(180deg,var(--gold),var(--red));border-radius:2px 2px 0 0;height:2px;transition:height .05s linear}
  .hpwrap{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .hpname{font-size:13px;font-weight:800;letter-spacing:.12em;white-space:nowrap;color:#ffd28a}
  .hpbar{flex:1;height:15px;border-radius:8px;background:#1e1206;border:1px solid #4a3418;overflow:hidden}
  .hpfill{height:100%;width:100%;border-radius:8px;background:linear-gradient(90deg,#e0a94e,#ff8a3c,#ff3b57);box-shadow:0 0 14px rgba(224,169,78,.6) inset;transition:width .3s ease}
  .hpnum{font-variant-numeric:tabular-nums;font-size:12px;color:var(--dim);width:88px;text-align:right}
  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:800;letter-spacing:.08em;
    color:#2a1a06;transition:transform .12s,filter .2s;
    background:linear-gradient(180deg,#f0d18a,#d69a34);box-shadow:0 8px 24px rgba(200,140,40,.4),inset 0 1px 0 rgba(255,255,255,.4)}
  button:hover{transform:translateY(-2px);filter:brightness(1.08)} button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#ff6b8a,#ff3b57);color:#fff}
  .ghost{background:transparent;color:var(--dim);box-shadow:none;border:1px solid #4a3418;font-weight:600}
  .ghost:hover{color:var(--ink);filter:none}
  .vol{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px}
  input[type=range]{accent-color:var(--gold);width:110px}
  .status{text-align:center;font-size:12px;color:var(--red);letter-spacing:.2em;height:16px;margin-top:10px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--dim);font-size:12px;margin-top:14px;letter-spacing:.03em;line-height:1.7}
</style>

<div class="cab">
  <div class="tag">◆ Dungeon Boss ◆</div>
  <h1>黄金神殿の守護者</h1>
  <div class="subtitle">GUARDIAN OF THE GOLDEN TEMPLE &nbsp;—&nbsp; mid-boss</div>

  <div class="stage" id="stage">
    <div class="aura"></div>
    <div class="boss" id="boss">🗿</div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="hpwrap">
    <span class="hpname">🗿 守護者</span>
    <div class="hpbar"><div class="hpfill" id="hp"></div></div>
    <span class="hpnum" id="hpnum">120000/120000</span>
  </div>

  <div class="controls">
    <button id="play">▶ 戦闘開始</button>
    <button class="ghost" id="attack">⚔ こうげき</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="74"></div>
  </div>
  <div class="status" id="status">♪ GUARDIAN BATTLE ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成する中ボス（ダンジョンボス）BGMです（音源ファイルなし）。<br>
    印象的なピアノ導入 → 疾走 → ♭IIの重い顕現 → クライマックスを切れ目なくループします。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, limiter, revL, revS, dly, fxIn, analyser, freqData;
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);
  const mf=m=>440*Math.pow(2,(m-69)/12);

  const _pw={};
  function pulseWave(duty){ const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=16,real=new Float32Array(N),imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false}); }
  const _sh={};
  function shaper(amt){const k=amt.toFixed(2);if(_sh[k])return _sh[k];const n=1024,c=new Float32Array(n);
    for(let i=0;i<n;i++){const x=i/(n-1)*2-1;c[i]=Math.tanh(x*amt)/Math.tanh(amt);}
    const ws=ctx.createWaveShaper();ws.curve=c;ws.oversample='2x';return _sh[k]=ws;}
  function impulse(dur,decay){ const len=Math.max(1,Math.floor(ctx.sampleRate*dur)),buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);} return buf; }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.82;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-15; comp.knee.value=22; comp.ratio.value=3.4; comp.attack.value=.003; comp.release.value=.18;
    limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.1;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);
    revL=ctx.createConvolver(); revL.buffer=impulse(2.2,2.3); const l=ctx.createGain(); l.gain.value=.85; revL.connect(l); l.connect(master);
    revS=ctx.createConvolver(); revS.buffer=impulse(.5,3.2); const s=ctx.createGain(); s.gain.value=.75; revS.connect(s); s.connect(master);
    fxIn=ctx.createGain(); dly=ctx.createDelay(1); dly.delayTime.value=3*S;
    const fb=ctx.createGain(); fb.gain.value=.3; const dOut=ctx.createGain(); dOut.gain.value=.42;
    fxIn.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(dOut); dOut.connect(master);
  }

  let REC=null;
  function voice(f,t,d,o){ if(REC) REC.push({t,play:b=>_voice(f,b+t,d,o)}); else _voice(f,t,d,o); }
  function piano(t,n,g,pan){ if(REC) REC.push({t,play:b=>_piano(b+t,n,g,pan)}); else _piano(t,n,g,pan); }
  function kick(t){ if(REC) REC.push({t,play:b=>_kick(b+t)}); else _kick(t); }
  function snare(t,g){ if(REC) REC.push({t,play:b=>_snare(b+t,g)}); else _snare(t,g); }
  function hat(t,o){ if(REC) REC.push({t,play:b=>_hat(b+t,o)}); else _hat(t,o); }
  function timp(t,f,g){ if(REC) REC.push({t,play:b=>_timp(b+t,f,g)}); else _timp(t,f,g); }
  function crash(t,g){ if(REC) REC.push({t,play:b=>_crash(b+t,g)}); else _crash(t,g); }
  function growl(t,d,o){ if(REC) REC.push({t,play:b=>_growl(b+t,d,o)}); else _growl(t,d,o); }
  function scream(t,d,o){ if(REC) REC.push({t,play:b=>_scream(b+t,d,o)}); else _scream(t,d,o); }

  function _voice(freq,t,dur,{wave='sawtooth',duty=null,f1=null,g=.15,det=6,vib=0,vr=5,a=.006,d=.05,s=.7,r=.08,
                              cut=5000,cutTo=null,ftype='lowpass',q=1.1,sat=0,env='adsr',pan=0,rl=0,rs=0,de=0}={}){
    const gn=ctx.createGain(), f=ctx.createBiquadFilter(); f.type=ftype; f.frequency.setValueAtTime(cut,t); if(cutTo)f.frequency.exponentialRampToValueAtTime(Math.max(cutTo,20),t+dur); f.Q.value=q;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=wave;o2.type=wave;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t);
    if(f1){o1.frequency.exponentialRampToValueAtTime(f1,t+dur);o2.frequency.exponentialRampToValueAtTime(f1,t+dur);}
    o2.detune.value=det;
    if(vib){const l=ctx.createOscillator(),lg=ctx.createGain();l.frequency.value=vr;lg.gain.value=vib;l.connect(lg);lg.connect(o1.detune);lg.connect(o2.detune);l.start(t);l.stop(t+dur+.03);}
    const peak=g, sus=Math.max(g*s,.0001);
    gn.gain.setValueAtTime(.0001,t); gn.gain.exponentialRampToValueAtTime(peak,t+a);
    if(env==='hold'){ gn.gain.setValueAtTime(peak,t+Math.max(dur-r,a)); gn.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    else { gn.gain.exponentialRampToValueAtTime(sus,t+a+d); gn.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d)); gn.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    if(sat){const ws=shaper(sat);o1.connect(ws);o2.connect(ws);ws.connect(f);}else{o1.connect(f);o2.connect(f);}
    f.connect(gn);
    let tail=gn; if(ctx.createStereoPanner){const p=ctx.createStereoPanner();p.pan.value=pan;gn.connect(p);tail=p;}
    tail.connect(master);
    if(rl){const x=ctx.createGain();x.gain.value=rl;gn.connect(x);x.connect(revL);}
    if(rs){const x=ctx.createGain();x.gain.value=rs;gn.connect(x);x.connect(revS);}
    if(de){const x=ctx.createGain();x.gain.value=de;gn.connect(x);x.connect(fxIn);}
    o1.start(t);o2.start(t);o1.stop(t+dur+.05);o2.stop(t+dur+.05);
  }
  function _noise(t,dur,type,cut,q,g,dest){ const n=ctx.createBufferSource();
    const buf=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1; n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=cut; f.Q.value=q;
    const gn=ctx.createGain(); gn.gain.setValueAtTime(g,t); gn.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f); f.connect(gn); gn.connect(dest||master); n.start(t); n.stop(t+dur+.02); }
  // grand piano stab (Sirona-style): triangle+pulse, percussive with echo — the boss's "weapon"
  const _piano=(t,note,g=.16,pan=0)=>{ const f0=hz(note);
    const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f0;
    const o2=ctx.createOscillator(); o2.setPeriodicWave(pulseWave(.25)); o2.frequency.value=f0;
    const flt=ctx.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=3800;
    const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.004); e.gain.exponentialRampToValueAtTime(.0001,t+.5);
    const e2=ctx.createGain(); e2.gain.setValueAtTime(g*.35,t); e2.gain.exponentialRampToValueAtTime(.0001,t+.25);
    o.connect(e); o2.connect(e2); e.connect(flt); e2.connect(flt);
    const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=pan;flt.connect(p);p.connect(master);}else flt.connect(master);
    const x=ctx.createGain(); x.gain.value=.3; flt.connect(x); x.connect(revL); const y=ctx.createGain(); y.gain.value=.28; flt.connect(y); y.connect(fxIn);
    o.start(t);o2.start(t);o.stop(t+.55);o2.stop(t+.3); };
  const _kick=t=>{ const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(45,t+.09);
    const ws=shaper(2.5); g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(.001,t+.17); o.connect(ws); ws.connect(g); g.connect(master); o.start(t); o.stop(t+.19); _noise(t,.02,'highpass',3000,.7,.35); };
  const _snare=(t,g=.5)=>{ _noise(t,.16,'highpass',1900,1.1,g); _noise(t,.05,'bandpass',400,1,g*.5);
    const o=ctx.createOscillator(),e=ctx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(210,t); e.gain.setValueAtTime(g*.5,t); e.gain.exponentialRampToValueAtTime(.001,t+.09); o.connect(e); e.connect(master); o.start(t); o.stop(t+.1); };
  const _hat=(t,open)=> _noise(t,open?.12:.03,'highpass',9000,.8,open?.16:.12);
  const _timp=(t,freq,g=.7)=>{ const o=ctx.createOscillator(),e=ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(freq*1.5,t); o.frequency.exponentialRampToValueAtTime(freq,t+.08); e.gain.setValueAtTime(g,t); e.gain.exponentialRampToValueAtTime(.0001,t+.55); o.connect(e); const x=ctx.createGain(); x.gain.value=.3; e.connect(x); x.connect(revL); e.connect(master); o.start(t); o.stop(t+.6); };
  const _crash=(t,g=.3)=> _noise(t,1.1,'highpass',6000,.6,g);
  const _growl=(t,dur,{cf=55,mf2=37,idx=180,g=.3}={})=>{ const c=ctx.createOscillator(); c.type='sine'; c.frequency.value=cf;
    const m=ctx.createOscillator(); m.type='sine'; m.frequency.value=mf2; const mg=ctx.createGain(); mg.gain.value=idx; m.connect(mg); mg.connect(c.frequency);
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=700; const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.02); e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    c.connect(f); f.connect(e); e.connect(master); c.start(t); m.start(t); c.stop(t+dur+.03); m.stop(t+dur+.03); };
  // ring-mod scream riser for section transitions
  const _scream=(t,dur,{f0=300,f1=1800,m0=130,m1=520,g=.12}={})=>{
    const c=ctx.createOscillator(); c.type='sawtooth'; c.frequency.setValueAtTime(f0,t); c.frequency.exponentialRampToValueAtTime(f1,t+dur);
    const rm=ctx.createGain(); rm.gain.value=0; const m=ctx.createOscillator(); m.type='sine'; m.frequency.setValueAtTime(m0,t); m.frequency.exponentialRampToValueAtTime(m1,t+dur);
    m.connect(rm.gain); c.connect(rm);
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=5000; const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.02); e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    const ws=shaper(2); rm.connect(ws); ws.connect(f); f.connect(e); const x=ctx.createGain(); x.gain.value=.3; e.connect(x); x.connect(revL); e.connect(master);
    c.start(t); m.start(t); c.stop(t+dur+.05); m.stop(t+dur+.05); };

  // ---------- composition (A minor / harmonic + ♭II phrygian, fast) ----------
  const BPM=172, S=60/BPM/4, BAR=16*S;
  const CH={
    Am:{b:'A1', pad:['A3','C4','E4'], arp:['A3','C4','E4','A4']},
    G: {b:'G1', pad:['G3','B3','D4'], arp:['G3','B3','D4','G4']},
    F: {b:'F1', pad:['F3','A3','C4'], arp:['F3','A3','C4','F4']},
    Dm:{b:'D2', pad:['D4','F4','A4'], arp:['D4','F4','A4','D5']},
    E: {b:'E2', pad:['E3','G#3','B3'], arp:['E3','G#3','B3','E4']},   // E major (harmonic-minor V)
    Bb:{b:'A#1',pad:['A#3','D4','F4'], arp:['A#3','D4','F4','A#4']}   // ♭II Neapolitan/phrygian — the temple's dread
  };
  const progA=['Am','G','F','G','Am','F','Dm','E'];
  const progB=['Am','Bb','Am','Bb','Dm','Bb','E','E'];
  const progC=['Am','G','F','G','Am','F','E','E'];

  const leadA=[
    ['A5',4],['E5',4],['C5',4],['E5',4],
    ['G5',4],['B5',4],['D6',8],
    ['C6',4],['A5',4],['F5',4],['A5',4],
    ['B5',2],['C6',2],['B5',2],['A5',2],['G5',8],
    ['A5',4],['C6',4],['E6',4],['C6',4],
    ['A5',4],['G5',4],['F5',8],
    ['D5',4],['F5',4],['A5',4],['D6',4],
    ['G#5',4],['B5',4],['E6',4],['B5',4]
  ];
  const leadB=[
    ['A5',8],['E5',8],
    ['A#5',8],['F5',8],          // ♭II dread
    ['A5',8],['C6',8],
    ['A#5',8],['D6',8],
    ['A5',4],['D6',4],['A5',8],
    ['A#5',4],['D6',4],['A#5',8],
    ['B5',4],['G#5',4],['E5',8],
    ['G#5',8],['B5',8]
  ];
  const leadC=[
    ['A5',2],['C6',2],['E6',2],['C6',2],['A5',2],['E5',2],['A5',2],['C6',2],
    ['B5',2],['D6',2],['G5',2],['D6',2],['B5',2],['G5',2],['D6',2],['B5',2],
    ['C6',2],['A5',2],['F5',2],['A5',2],['C6',2],['F5',2],['A5',2],['C6',2],
    ['D6',4],['B5',4],['G5',4],['D6',4],
    ['E6',4],['C6',4],['A5',4],['E6',4],
    ['C6',4],['A5',4],['F5',8],
    ['E6',4],['B5',4],['G#5',4],['B5',4],
    ['E6',8],['B5',8]
  ];

  function seqLead(list, base, opt){ let acc=0;
    for(const [n,d] of list){ const t=base+acc*S;
      voice(hz(n), t, d*S*0.94, Object.assign({duty:.25, g:.16, cut:5000, det:8, a:.005, d:.05, s:.72, r:.06, sat:1.5, pan:.05, rl:.2, de:.18}, opt));
      voice(hz(n), t, d*S*0.9, {wave:'triangle', g:.05, cut:2600, det:4, a:.006, s:.7, r:.06, pan:.05});
      acc+=d; } }
  function galBass(root, base, heavy){ const rm=midi(CH[root].b), f=mf(rm);
    const pat=[0,2,3,4,6,8,10,11,12,14];
    for(const p of pat){ const up=(p===3||p===11);
      voice(up?f*2:f, base+p*S, 1.2*S, {wave:'sawtooth', g:heavy?.26:.22, cut:heavy?2400:2000, det:5, a:.003, d:.03, s:.7, r:.04, sat:2, pan:-.05}); }
    if(heavy) growl(base, BAR*0.5, {cf:mf(rm-12), mf2:mf(rm-12)*.66, idx:130, g:.2}); }
  function padBar(root, base, g){ for(const n of CH[root].pad)
    voice(hz(n), base, BAR*0.98, {wave:'triangle', g:g||.045, det:9, cut:2100, a:.06, d:.2, s:.9, r:.2, rl:.35}); }
  function arpBar(root, base){ const c=CH[root].arp;
    for(let i=0;i<16;i++) voice(hz(c[i%4]), base+i*S, S*0.9, {duty:.125, g:.055, cut:3800, det:3, a:.003, d:.02, s:.4, r:.03, pan:(i%2?.35:-.35), de:.14}); }
  function pianoStabs(root, base){ const p=CH[root].arp;   // piano punctuation
    piano(base, p[0]+'', .12, -.1); piano(base+4*S, p[2]+'', .1, .1); piano(base+8*S, p[1]+'', .11, -.1); piano(base+12*S, p[3]+'', .1, .1); }
  function drumBar(base, {fill, half}={}){
    if(half){ kick(base); kick(base+8*S); snare(base+4*S,.55); snare(base+12*S,.55); for(let i=0;i<16;i+=4) hat(base+i*S); }
    else { for(const p of [0,4,6,8,12,14]) kick(base+p*S); snare(base+4*S,.5); snare(base+12*S,.5); for(let i=0;i<16;i+=2) hat(base+i*S, i===14); }
    if(fill){ snare(base+13*S,.4); snare(base+13.5*S,.45); snare(base+14*S,.5); snare(base+15*S,.6); crash(base+16*S,.3); } }

  function sectionA(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progA[b];
    galBass(ch,bt,true); padBar(ch,bt,.04); arpBar(ch,bt); drumBar(bt,{fill:b===7}); }
    timp(base,hz('A2'),.6); seqLead(leadA, base); }
  function sectionB(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progB[b];
    galBass(ch,bt,false); padBar(ch,bt,.06); pianoStabs(ch,bt); drumBar(bt,{half:true, fill:b===7}); timp(bt,hz(CH[ch].b),.4); }
    scream(base,BAR,{f0:260,f1:1400,m0:120,m1:440,g:.1}); crash(base,.28); seqLead(leadB, base, {g:.19, vib:5}); }
  function sectionC(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progC[b];
    galBass(ch,bt,true); padBar(ch,bt,.04); arpBar(ch,bt); pianoStabs(ch,bt); drumBar(bt,{fill:b===7||b===3}); }
    scream(base,BAR,{g:.12}); crash(base,.34); timp(base,hz('A2'),.6); seqLead(leadC, base, {g:.17}); }

  const BODY_BARS=24, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){ sectionA(base); sectionB(base+8*BAR); sectionC(base+16*BAR); }
  function scheduleIntro(base){
    // Sirona-style: a solo piano cascade over Am, then a big hit → the band drops in
    const casc=['A2','C3','E3','A3','C4','E4','A4','C5','E5','A5','C6','E6'];
    casc.forEach((n,i)=> piano(base + i*(1.4*S), n, .13, (i%2?.3:-.3)));
    piano(base+2*BAR, 'A4', .14,-.1); piano(base+2*BAR,'C5',.12,.1); piano(base+2*BAR,'E5',.12,0);  // held chord
    timp(base+2*BAR,hz('A1'),.6); growl(base+2*BAR, 2*BAR, {cf:mf(midi('A0')), mf2:mf(midi('A0'))*.66, idx:110, g:.18});
    for(let i=0;i<10;i++) _noise(base+3*BAR + i*(BAR/10), .12, 'highpass', 5000, .7, .04+i*0.02); // snare roll
    scream(base+3*BAR, BAR, {f0:220,f1:1600,m0:110,m1:520,g:.12});
    crash(base+4*BAR,.4); kick(base+4*BAR);
    return 4*BAR;
  }

  function buildEvents(){ REC=[]; scheduleBody(0); const ev=REC; REC=null; ev.sort((a,b)=>a.t-b.t); return ev; }
  let playing=false, timer=null, rafId=null, EVENTS=null, loopBase=0, evIdx=0;
  function pump(){ if(!playing) return; const horizon=ctx.currentTime+0.3; let guard=0;
    while(guard++<5000){ if(evIdx>=EVENTS.length){ loopBase+=bodyLen; evIdx=0; }
      const e=EVENTS[evIdx]; if(loopBase+e.t>horizon) break; e.play(loopBase); evIdx++; } }
  function start(){
    if(!ctx) initAudio(); if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.82, ctx.currentTime);
    playing=true; EVENTS=buildEvents();
    const t0=ctx.currentTime+0.2; const introLen=scheduleIntro(t0);
    loopBase=t0+introLen; evIdx=0; timer=setInterval(pump,25);
    playBtn.textContent='■ 中断'; playBtn.classList.add('playing');
    stage.classList.add('playing'); statusEl.classList.add('on'); drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime); master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(.0001,ctx.currentTime+.3); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.82; },340);
    playBtn.textContent='▶ 戦闘開始'; playBtn.classList.remove('playing');
    stage.classList.remove('playing','rage'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  const stage=document.getElementById('stage');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  for(let i=0;i<5;i++){ const r=document.createElement('div'); r.className='rune'; r.textContent=['✦','☥','⚜','✧','❂'][i]; r.style.left=(15+i*17)+'%'; r.style.bottom='30%'; r.style.animationDelay=(i*0.5)+'s'; stage.appendChild(r); }
  const N=44, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){ if(!playing) return; analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*56).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz); }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.82; });

  const hpEl=document.getElementById('hp'), hpNum=document.getElementById('hpnum'), boss=document.getElementById('boss');
  const MAX=120000; let hp=MAX;
  function renderHP(){ const pct=Math.max(0,hp/MAX*100); hpEl.style.width=pct+'%'; hpNum.textContent=Math.max(0,Math.round(hp))+'/'+MAX;
    if(pct<35) stage.classList.add('rage'); else stage.classList.remove('rage'); boss.textContent = hp<=0?'💥':(pct<35?'😤':'🗿'); }
  document.getElementById('attack').addEventListener('click', ()=>{
    if(hp<=0){ hp=MAX; renderHP(); return; }
    hp-=Math.floor(6000+Math.random()*16000)*(Math.random()<.12?3:1); if(hp<0) hp=0; renderHP();
    if(ctx&&playing){ _noise(ctx.currentTime,.12,'highpass',3000,1,.4); _kick(ctx.currentTime); }
    if(hp<=0){ statusEl.textContent='☆ GUARDIAN DOWN ☆'; setTimeout(()=>statusEl.textContent='♪ GUARDIAN BATTLE ♪',2400); }
  });
  renderHP();
})();
</script>
