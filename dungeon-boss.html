<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する中ボスBGM『石の守護者、目覚める』。緊迫感を注入した儀式トライバル（和太鼓＋詠唱＋トレモロ弦＋脈打つ低音）。ポケモンの精神を継承。" />
<title>石の守護者、目覚める | Dungeon Boss</title>
</head>
<body>
<style>
  :root{ --gold:#d9a441; --gold2:#8a5e1a; --stone:#7d746a; --ember:#ff7a3c; --ink:#efe6d2; --dim:#9a8c72; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:
      radial-gradient(120% 90% at 50% -10%, #2e2410 0%, transparent 52%),
      radial-gradient(90% 70% at 50% 120%, #3a1e08 0%, transparent 55%),
      linear-gradient(180deg,#0a0805,#0b0806 60%,#0c0904);
    color:var(--ink);font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
  .cab{width:min(700px,100%);position:relative;border:1px solid #4a3e2a;border-radius:18px;
    background:linear-gradient(180deg,rgba(22,18,10,.95),rgba(9,7,4,.97));
    box-shadow:0 0 0 1px rgba(217,164,65,.08),0 30px 90px rgba(0,0,0,.75), inset 0 1px 0 rgba(217,164,65,.1);padding:26px 26px 30px;overflow:hidden}
  .cab::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;opacity:.5}
  .tag{font-size:11px;letter-spacing:.44em;color:var(--gold);text-transform:uppercase;text-align:center;opacity:.9}
  h1{text-align:center;font-size:clamp(26px,6.6vw,44px);font-weight:700;letter-spacing:.08em;line-height:1.08;margin:2px 0;
    background:linear-gradient(180deg,#efe0bf,#d9a441 55%,#8a5e1a);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(217,140,60,.28)}
  .subtitle{text-align:center;color:var(--dim);font-size:13px;letter-spacing:.2em;margin-bottom:18px}
  .stage{position:relative;height:190px;border-radius:12px;overflow:hidden;border:1px solid #4a3e2a;
    background:radial-gradient(80% 120% at 50% 120%,#3a2810,#1a1206 55%,#0a0804);margin-bottom:16px}
  .boss{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:94px;filter:drop-shadow(0 0 22px rgba(217,140,60,.5)) grayscale(.3)}
  .stage.playing .boss{animation:stomp 1.07s ease-in-out infinite}
  @keyframes stomp{0%,100%{transform:translateX(-50%) translateY(0) scale(1)}50%{transform:translateX(-50%) translateY(-6px) scale(1.03)}}
  .stage.rage .boss{animation:quake .12s linear infinite;filter:drop-shadow(0 0 26px rgba(255,120,60,.7)) grayscale(0)}
  @keyframes quake{0%{transform:translateX(-50%) translateY(0) rotate(-2deg)}50%{transform:translateX(-53%) translateY(-4px) rotate(2deg)}100%{transform:translateX(-47%) translateY(0) rotate(-1deg)}}
  .aura{position:absolute;left:50%;bottom:0;width:260px;height:260px;transform:translate(-50%,42%);
    background:radial-gradient(circle,rgba(217,164,65,.35),rgba(255,120,60,.2) 42%,transparent 66%);opacity:0;transition:opacity .4s}
  .stage.playing .aura{opacity:1;animation:pulse 2.14s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}
  .glyph{position:absolute;font-size:20px;opacity:0;color:#ffcf6b;text-shadow:0 0 12px #d9a441}
  .stage.playing .glyph{animation:gl 2.14s ease-in-out infinite}
  @keyframes gl{0%,100%{opacity:0}50%{opacity:.85}}
  .viz{position:absolute;inset:auto 0 0 0;height:56px;display:flex;align-items:flex-end;gap:2px;padding:0 6px;opacity:.9}
  .viz i{flex:1;background:linear-gradient(180deg,var(--gold),var(--ember));border-radius:2px 2px 0 0;height:2px;transition:height .06s linear}
  .hpwrap{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .hpname{font-size:13px;font-weight:800;letter-spacing:.12em;white-space:nowrap;color:#ffd28a}
  .hpbar{flex:1;height:15px;border-radius:8px;background:#1e1608;border:1px solid #4a3e2a;overflow:hidden}
  .hpfill{height:100%;width:100%;border-radius:8px;background:linear-gradient(90deg,#8a5e1a,#d9a441,#ff7a3c);box-shadow:0 0 14px rgba(217,164,65,.6) inset;transition:width .3s ease}
  .hpnum{font-variant-numeric:tabular-nums;font-size:12px;color:var(--dim);width:88px;text-align:right}
  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:800;letter-spacing:.08em;
    color:#2a1e06;transition:transform .12s,filter .2s;
    background:linear-gradient(180deg,#e9c877,#c99630);box-shadow:0 8px 24px rgba(180,120,40,.4),inset 0 1px 0 rgba(255,255,255,.4)}
  button:hover{transform:translateY(-2px);filter:brightness(1.08)} button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#e88a4c,#c9541a);color:#fff}
  .ghost{background:transparent;color:var(--dim);box-shadow:none;border:1px solid #4a3e2a;font-weight:600}
  .ghost:hover{color:var(--ink);filter:none}
  .vol{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px}
  input[type=range]{accent-color:var(--gold);width:110px}
  .status{text-align:center;font-size:12px;color:var(--ember);letter-spacing:.2em;height:16px;margin-top:10px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--dim);font-size:12px;margin-top:14px;letter-spacing:.03em;line-height:1.7}
</style>

<div class="cab">
  <div class="tag">◆ Dungeon Boss ◆</div>
  <h1>石の守護者、目覚める</h1>
  <div class="subtitle">THE STONE GUARDIAN AWAKENS &nbsp;—&nbsp; ritual of the temple</div>

  <div class="stage" id="stage">
    <div class="aura"></div>
    <div class="boss" id="boss">🗿</div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="hpwrap">
    <span class="hpname">🗿 守護者</span>
    <div class="hpbar"><div class="hpfill" id="hp"></div></div>
    <span class="hpnum" id="hpnum">120000/120000</span>
  </div>

  <div class="controls">
    <button id="play">▶ 戦闘開始</button>
    <button class="ghost" id="attack">⚔ こうげき</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="76"></div>
  </div>
  <div class="status" id="status">♪ ANCIENT RITUAL ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成する中ボス（ダンジョンボス）BGMです（音源ファイルなし）。<br>
    和太鼓＋詠唱＋ガムランの儀式トライバル。石像が目覚め、層を重ねて襲いかかります。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, limiter, revL, revS, dly, fxIn, analyser, freqData;
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);
  const mf=m=>440*Math.pow(2,(m-69)/12);

  const _sh={};
  function shaper(amt){const k=amt.toFixed(2);if(_sh[k])return _sh[k];const n=1024,c=new Float32Array(n);
    for(let i=0;i<n;i++){const x=i/(n-1)*2-1;c[i]=Math.tanh(x*amt)/Math.tanh(amt);}
    const ws=ctx.createWaveShaper();ws.curve=c;ws.oversample='2x';return _sh[k]=ws;}
  function impulse(dur,decay){ const len=Math.max(1,Math.floor(ctx.sampleRate*dur)),buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);} return buf; }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.82;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-16; comp.knee.value=24; comp.ratio.value=3.2; comp.attack.value=.004; comp.release.value=.2;
    limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.1;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);
    revL=ctx.createConvolver(); revL.buffer=impulse(2.6,2.1); const l=ctx.createGain(); l.gain.value=1.0; revL.connect(l); l.connect(master);   // stone temple
    revS=ctx.createConvolver(); revS.buffer=impulse(.6,3); const s=ctx.createGain(); s.gain.value=.6; revS.connect(s); s.connect(master);
    fxIn=ctx.createGain(); dly=ctx.createDelay(1); dly.delayTime.value=4*S;
    const fb=ctx.createGain(); fb.gain.value=.36; const dOut=ctx.createGain(); dOut.gain.value=.4;
    fxIn.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(dOut); dOut.connect(master);
  }

  let REC=null;
  function taiko(t,f,g){ if(REC) REC.push({t,play:b=>_taiko(b+t,f,g)}); else _taiko(t,f,g); }
  function shake(t,g){ if(REC) REC.push({t,play:b=>_shake(b+t,g)}); else _shake(t,g); }
  function gong(t,g){ if(REC) REC.push({t,play:b=>_gong(b+t,g)}); else _gong(t,g); }
  function gam(t,n,g,pan){ if(REC) REC.push({t,play:b=>_gam(b+t,n,g,pan)}); else _gam(t,n,g,pan); }
  function chant(t,n,dur,g,pan){ if(REC) REC.push({t,play:b=>_chant(b+t,n,dur,g,pan)}); else _chant(t,n,dur,g,pan); }
  function horn(t,n,dur,g,vib){ if(REC) REC.push({t,play:b=>_horn(b+t,n,dur,g,vib)}); else _horn(t,n,dur,g,vib); }
  function drone(t,n,dur,g){ if(REC) REC.push({t,play:b=>_drone(b+t,n,dur,g)}); else _drone(t,n,dur,g); }
  function str(t,f,dur,o){ if(REC) REC.push({t,play:b=>_str(f,b+t,dur,o)}); else _str(f,t,dur,o); }

  function _noise(t,dur,type,cut,q,g,dest){ const n=ctx.createBufferSource();
    const buf=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1; n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=cut; f.Q.value=q;
    const gn=ctx.createGain(); gn.gain.setValueAtTime(g,t); gn.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f); f.connect(gn); gn.connect(dest||master); n.start(t); n.stop(t+dur+.02); }
  // TAIKO — big membrane drum: pitch-drop sine + saturated body + skin-slap noise
  const _taiko=(t,f0,g=.8)=>{ const o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(f0*1.8,t); o.frequency.exponentialRampToValueAtTime(f0,t+.07);
    const ws=shaper(2.2); const e=ctx.createGain(); e.gain.setValueAtTime(g,t); e.gain.exponentialRampToValueAtTime(.001,t+.34);
    o.connect(ws); ws.connect(e); e.connect(master); const x=ctx.createGain(); x.gain.value=.18; e.connect(x); x.connect(revL);
    o.start(t); o.stop(t+.36); _noise(t,.03,'bandpass',f0*4,.8,g*.35); };
  const _shake=(t,g=.12)=> _noise(t,.05,'highpass',7000,.7,g);
  // GONG — huge inharmonic metallic swell, long tail
  const _gong=(t,g=.5)=>{ const base=98;
    [[1,1],[1.48,.6],[2.1,.4],[2.9,.28],[4.2,.16]].forEach(([r,a])=>{ const o=ctx.createOscillator(),e=ctx.createGain(); o.type=r<2?'sine':'triangle'; o.frequency.value=base*r;
      e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g*a,t+.03); e.gain.exponentialRampToValueAtTime(.0001,t+3.2*(1-.12*r));
      o.connect(e); const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=rnd(-.3,.3);e.connect(p);p.connect(master);}else e.connect(master);
      const x=ctx.createGain(); x.gain.value=.6; e.connect(x); x.connect(revL); o.start(t); o.stop(t+3.3); });
    _noise(t,1.4,'bandpass',600,.5,g*.3); };
  // GAMELAN — bright inharmonic tuned percussion, interlocking, with echo
  const _gam=(t,note,g=.09,pan=0)=>{ const f0=hz(note);
    [[1,1],[2.76,.5],[5.4,.24]].forEach(([r,a])=>{ const o=ctx.createOscillator(),e=ctx.createGain(); o.type='sine'; o.frequency.value=f0*r;
      e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g*a,t+.004); e.gain.exponentialRampToValueAtTime(.0001,t+.6*(1-.1*r));
      o.connect(e); const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=pan;e.connect(p);p.connect(master);}else e.connect(master);
      const x=ctx.createGain(); x.gain.value=.3; e.connect(x); x.connect(revL); const y=ctx.createGain(); y.gain.value=.3; e.connect(y); y.connect(fxIn); o.start(t); o.stop(t+.65); }); };
  // CHANT — low male voices "ooh": detuned saw+triangle through a vowel bandpass, slow, AM waver
  const _chant=(t,note,dur,g=.06,pan=0)=>{ const f0=hz(note);
    const o1=ctx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=f0;
    const o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=f0; o2.detune.value=8;
    const o3=ctx.createOscillator(); o3.type='sawtooth'; o3.frequency.value=f0; o3.detune.value=-10;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=620; bp.Q.value=4;   // "oh" formant
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1400;
    const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.15); e.gain.setValueAtTime(g,t+Math.max(dur-.4,.15)); e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    const am=ctx.createOscillator(); am.frequency.value=5.2; const ag=ctx.createGain(); ag.gain.value=g*.3; am.connect(ag); ag.connect(e.gain);
    o1.connect(bp); o2.connect(bp); o3.connect(bp); bp.connect(lp); lp.connect(e);
    const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=pan;e.connect(p);p.connect(master);}else e.connect(master);
    const x=ctx.createGain(); x.gain.value=.5; e.connect(x); x.connect(revL);
    o1.start(t);o2.start(t);o3.start(t);am.start(t); o1.stop(t+dur+.05);o2.stop(t+dur+.05);o3.stop(t+dur+.05);am.stop(t+dur+.05); };
  // HORN/DUDUK — low wailing ethnic lead: triangle+saw through bandpass, vibrato, expressive
  const _horn=(t,note,dur,g=.16,vib=14)=>{ const f0=hz(note);
    const o1=ctx.createOscillator(); o1.type='triangle'; o1.frequency.value=f0;
    const o2=ctx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=f0; o2.detune.value=6;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1250; bp.Q.value=2.4;   // reedy formant
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2600;
    const lfo=ctx.createOscillator(); lfo.frequency.value=5.5; const lg=ctx.createGain(); lg.gain.value=vib; lfo.connect(lg); lg.connect(o1.detune); lg.connect(o2.detune);
    const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.05); e.gain.setValueAtTime(g,t+Math.max(dur-.12,.05)); e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o1.connect(bp); o2.connect(bp); bp.connect(lp); lp.connect(e);
    const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=.04;e.connect(p);p.connect(master);}else e.connect(master);
    const x=ctx.createGain(); x.gain.value=.34; e.connect(x); x.connect(revL); const y=ctx.createGain(); y.gain.value=.2; e.connect(y); y.connect(fxIn);
    o1.start(t);o2.start(t);lfo.start(t); o1.stop(t+dur+.05);o2.stop(t+dur+.05);lfo.stop(t+dur+.05); };
  const _drone=(t,note,dur,g=.05)=>{ const f0=hz(note);
    const o1=ctx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=f0;
    const o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=f0; o2.detune.value=6;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700;
    const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+.5); e.gain.setValueAtTime(g,t+Math.max(dur-.6,.5)); e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o1.connect(lp);o2.connect(lp);lp.connect(e); e.connect(master); const x=ctx.createGain(); x.gain.value=.4; e.connect(x); x.connect(revL);
    o1.start(t);o2.start(t); o1.stop(t+dur+.05);o2.stop(t+dur+.05); };
  // generic filtered string/synth voice — for tremolo strings, pulse bass, dissonant clusters (the tension bed)
  const _str=(freq,t,dur,{g=.05,cut=1500,det=8,a=.02,r=.1,sat=0,q=1,type='sawtooth',pan=0,rl=0}={})=>{
    const o1=ctx.createOscillator(),o2=ctx.createOscillator(); o1.type=type;o2.type=type; o1.frequency.value=freq;o2.frequency.value=freq;o2.detune.value=det;
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut; f.Q.value=q;
    const e=ctx.createGain(); e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g,t+a); e.gain.setValueAtTime(g,t+Math.max(dur-r,a)); e.gain.exponentialRampToValueAtTime(.0001,t+dur);
    if(sat){const ws=shaper(sat);o1.connect(ws);o2.connect(ws);ws.connect(f);}else{o1.connect(f);o2.connect(f);}
    f.connect(e); const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=pan;e.connect(p);p.connect(master);}else e.connect(master);
    if(rl){const x=ctx.createGain();x.gain.value=rl;e.connect(x);x.connect(revL);}
    o1.start(t);o2.start(t);o1.stop(t+dur+.03);o2.stop(t+dur+.03); };

  // ---------- composition (A phrygian ritual tribal — now with driving TENSION) ----------
  const BPM=130, S=60/BPM/4, BAR=16*S;
  const CH={
    Am:{lo:'A1', root:'A2', fifth:'E3', gam:['A4','C5','E5','C5'], tr:['A4','E4'], clash:'A#4'},
    Bb:{lo:'A#1',root:'A#2',fifth:'F3', gam:['A#4','D5','F5','D5'], tr:['A#4','F4'], clash:'A4'},   // ♭II
    Dm:{lo:'D2', root:'D3', fifth:'A3', gam:['D5','F5','A5','F5'], tr:['D5','A4'], clash:'D#5'}
  };
  // relentless i↔♭II (Am↔Bb) hammering = the "Jaws" alarm
  const prog=['Am','Bb','Am','Bb','Dm','Bb','Am','Bb'];
  // agitated horn — semitone A↔Bb oscillation + rising urgency, ends unresolved on the ♭2
  const melody=[
    ['A4',4],['A#4',4],['A4',4],['C5',4],
    ['A#4',4],['A4',4],['A#4',4],['D5',4],
    ['C5',4],['A#4',4],['A4',4],['G4',4],
    ['A4',4],['E4',4],['A4',8],
    ['D5',4],['F5',4],['E5',4],['D5',4],
    ['A#4',4],['D5',4],['F5',4],['A#4',4],
    ['C5',4],['A#4',4],['A4',4],['C5',4],
    ['A#4',4],['A4',4],['A#4',8]
  ];

  // driving taiko — busier, galloping, with 16th fills
  function taikoBar(base, root, lvl){
    for(const p of [0,3,6,8,11,14]) taiko(base+p*S, 72, .82);        // rolling low booms
    for(const p of [2,4,10,12])     taiko(base+p*S, 130, .5);        // mid drive
    for(let i=0;i<16;i++) shake(base+i*S, i%2?.06:.1);              // 16th shakers = urgency
    taiko(base, mf(midi(CH[root].lo)), .5);
    if(lvl>=1){ for(const p of [5,13]) taiko(base+p*S,110,.42); }
    if(lvl>=2){ for(const p of [1,7,9,15]) taiko(base+p*S,150,.4);   // 16th fills
      taiko(base+14*S,130,.4); taiko(base+14.5*S,150,.5); taiko(base+15*S,170,.6); taiko(base+15.5*S,190,.7); } }
  // pulsing low ostinato = racing heartbeat (never stops)
  function pulseBass(root, base){ const f=mf(midi(CH[root].lo)+12);
    for(let i=0;i<16;i+=2) str(base+i*S, f, 2*S*0.85, {g:.11, cut:520, det:3, a:.004, r:.05, sat:2, type:'sawtooth'}); }
  // tremolo strings — the cinematic "danger" shimmer (16th tremolo on chord tones)
  function tremStr(root, base, g){ const c=CH[root].tr;
    for(let i=0;i<16;i++){ const n=c[i%2]; str(base+i*S, hz(n), S*0.95, {g:g||.03, cut:1900, det:10, a:.004, r:.03, q:1.2, pan:(i%2?.3:-.3), rl:.3}); } }
  // dissonant minor-2nd cluster grinding underneath (root + ♭II clash)
  function clusterBar(root, base, g){ str(base, hz(CH[root].root), BAR*0.98, {g:g||.04, cut:1300, det:8, a:.15, r:.4, rl:.5, pan:-.2});
    str(base, hz(CH[root].clash), BAR*0.98, {g:(g||.04)*.8, cut:1300, det:8, a:.2, r:.4, rl:.5, pan:.2}); }
  function gamelanBar(root, base){ const cell=CH[root].gam;
    for(let i=0;i<16;i++){ if(i%2===0 || i%4===1) gam(base+i*S, cell[i%4], .07, (i%2?.4:-.4)); } }
  function chantDrone(root, base, g){ const c=CH[root];
    chant(base, c.root, BAR*0.98, g||.05, -.25); chant(base, c.fifth, BAR*0.98, (g||.05)*.8, .25); }
  function chantStab(root, base, g){ const c=CH[root];   // aggressive "hah! hah!" rhythmic stabs
    for(const p of [0,3,6,8,11,14]) chant(base+p*S, c.root, 1.6*S, g||.06, rnd(-.15,.15)); }
  function seqHorn(base, gg){ let acc=0; for(const [n,d] of melody){ horn(base+acc*S, n, d*S*0.9, gg||.18, 16); acc+=d; } }

  function sectionA(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=prog[b];
    drone(bt, CH[ch].lo, BAR*0.99, .05); pulseBass(ch,bt); taikoBar(bt, ch, 0); tremStr(ch,bt,.026); gamelanBar(ch, bt); chantDrone(ch, bt, .05); }
    gong(base, .4); }
  function sectionB(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=prog[b];
    drone(bt, CH[ch].lo, BAR*0.99, .06); pulseBass(ch,bt); taikoBar(bt, ch, 1); tremStr(ch,bt,.036); clusterBar(ch,bt,.035); gamelanBar(ch, bt); chantStab(ch, bt, .055); }
    gong(base, .45); seqHorn(base, .18); }
  function sectionC(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=prog[b];
    drone(bt, CH[ch].lo, BAR*0.99, .06); pulseBass(ch,bt); taikoBar(bt, ch, 2); tremStr(ch,bt,.046); clusterBar(ch,bt,.045); gamelanBar(ch, bt); chantStab(ch, bt, .07); }
    gong(base, .55); seqHorn(base, .2); }

  const BODY_BARS=24, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){ sectionA(base); sectionB(base+8*BAR); sectionC(base+16*BAR); }
  function scheduleIntro(base){
    // tense awakening: gong + rising tremolo strings (accelerating) + accelerating taiko + creeping pulse → hit
    gong(base, .6); drone(base, 'A1', 4*BAR*0.98, .06);
    for(let i=0;i<Math.floor(4*BAR/S);i++){ const t=base+i*S; str(t, hz('A4'), S*0.95, {g:.01+.03*(i/(4*BAR/S)), cut:1700, det:10, a:.004, r:.03, q:1.3, pan:(i%2?.3:-.3), rl:.3}); } // crescendo tremolo
    chant(base, 'A2', 4*BAR*0.97, .05, -.2); chant(base+2*BAR, 'A#2', 2*BAR*0.97, .05, .2);   // drone shifts up a semitone = unease
    let acc=0, gap=1.4; for(let b=0;b<4;b++){ for(let k=0;k<(b+1)*2;k++){ taiko(base+acc*S, 72, .35+b*.13); acc+=Math.max(gap*Math.pow(.86,b),0.5); } }  // accelerating taiko
    for(let i=0;i<8;i++) str(base+3*BAR+i*2*S, hz('A3'), 2*S*0.85, {g:.06, cut:500, det:3, a:.004, r:.05, sat:2}); // pulse creeps in bar4
    gong(base+3*BAR, .5); taiko(base+4*BAR, 72, .95); taiko(base+4*BAR,150,.7);
    return 4*BAR;
  }

  function buildEvents(){ REC=[]; scheduleBody(0); const ev=REC; REC=null; ev.sort((a,b)=>a.t-b.t); return ev; }
  let playing=false, timer=null, rafId=null, EVENTS=null, loopBase=0, evIdx=0;
  function pump(){ if(!playing) return; const horizon=ctx.currentTime+0.3; let guard=0;
    while(guard++<5000){ if(evIdx>=EVENTS.length){ loopBase+=bodyLen; evIdx=0; }
      const e=EVENTS[evIdx]; if(loopBase+e.t>horizon) break; e.play(loopBase); evIdx++; } }
  function start(){
    if(!ctx) initAudio(); if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.82, ctx.currentTime);
    playing=true; EVENTS=buildEvents();
    const t0=ctx.currentTime+0.2; const introLen=scheduleIntro(t0);
    loopBase=t0+introLen; evIdx=0; timer=setInterval(pump,25);
    playBtn.textContent='■ 中断'; playBtn.classList.add('playing');
    stage.classList.add('playing'); statusEl.classList.add('on'); drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime); master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(.0001,ctx.currentTime+.35); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.82; },380);
    playBtn.textContent='▶ 戦闘開始'; playBtn.classList.remove('playing');
    stage.classList.remove('playing','rage'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  const stage=document.getElementById('stage');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  for(let i=0;i<5;i++){ const r=document.createElement('div'); r.className='glyph'; r.textContent=['𓂀','☥','⚜','𓆟','❂'][i]; r.style.left=(15+i*17)+'%'; r.style.bottom='32%'; r.style.animationDelay=(i*0.42)+'s'; stage.appendChild(r); }
  const N=44, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){ if(!playing) return; analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*54).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz); }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.82; });

  const hpEl=document.getElementById('hp'), hpNum=document.getElementById('hpnum'), boss=document.getElementById('boss');
  const MAX=120000; let hp=MAX;
  function renderHP(){ const pct=Math.max(0,hp/MAX*100); hpEl.style.width=pct+'%'; hpNum.textContent=Math.max(0,Math.round(hp))+'/'+MAX;
    if(pct<35) stage.classList.add('rage'); else stage.classList.remove('rage'); boss.textContent = hp<=0?'💥':(pct<35?'👹':'🗿'); }
  document.getElementById('attack').addEventListener('click', ()=>{
    if(hp<=0){ hp=MAX; renderHP(); return; }
    hp-=Math.floor(6000+Math.random()*16000)*(Math.random()<.12?3:1); if(hp<0) hp=0; renderHP();
    if(ctx&&playing){ _taiko(ctx.currentTime,120,.7); _noise(ctx.currentTime,.05,'highpass',4000,1,.3); }
    if(hp<=0){ statusEl.textContent='☆ GUARDIAN DOWN ☆'; setTimeout(()=>statusEl.textContent='♪ ANCIENT RITUAL ♪',2400); }
  });
  renderHP();
})();
</script>
