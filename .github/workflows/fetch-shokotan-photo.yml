name: Fetch Shokotan photo (CC BY 2.0)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Wikimedia Commons のフリーライセンス写真を取得
      # File:Nakagawa Shoko DEC 2016.jpg / Dick Thomas Johnson / CC BY 2.0
      - name: Download photo from Wikimedia Commons
        run: |
          curl -fL --retry 3 -A "shokotan-ai-fan-project/1.0 (github fan project)" \
            "https://commons.wikimedia.org/wiki/Special:FilePath/Nakagawa_Shoko_DEC_2016.jpg?width=600" \
            -o shokotan-ai/shokotan.jpg
          file shokotan-ai/shokotan.jpg | grep -i image

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shokotan-ai/shokotan.jpg
          git commit -m "Add CC BY 2.0 photo of Shoko Nakagawa (Wikimedia Commons) [skip ci]"
          git push
