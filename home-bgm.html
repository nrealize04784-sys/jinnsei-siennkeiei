<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成する、あたたかいRPG民家・故郷のBGM『やすらぎの家』。ハ長調・打楽器なしのループ。" />
<title>やすらぎの家 | Home &amp; Village Theme</title>
</head>
<body>
<style>
  :root{
    --bg0:#1a1108; --paper:#f7ecd6; --amber:#e0a45a; --amber-deep:#b9702f;
    --ink:#3a2a17; --ink-soft:#7a6242; --cream:#fff7e8; --ember:#ff8a3c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, #3a2410 0%, transparent 55%),
      radial-gradient(90% 80% at 50% 120%, #4a2a12 0%, transparent 55%),
      linear-gradient(180deg,#241708,#160f07 60%,#1a1108);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,"Times New Roman",serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .room{
    width:min(620px,100%);position:relative;
    border:1px solid rgba(224,164,90,.3);border-radius:20px;
    background:linear-gradient(180deg,rgba(46,32,17,.94),rgba(28,19,10,.97));
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,220,160,.08);
    padding:30px 28px 32px;overflow:hidden;
  }
  .tag{font-size:11px;letter-spacing:.42em;color:var(--amber);text-transform:uppercase;text-align:center;opacity:.85}
  h1{
    text-align:center;font-size:clamp(28px,6.5vw,44px);font-weight:700;letter-spacing:.14em;margin:4px 0 2px;
    color:var(--cream);text-shadow:0 0 26px rgba(255,150,70,.28);
  }
  .subtitle{text-align:center;color:var(--ink-soft);font-size:13px;letter-spacing:.24em;margin-bottom:22px}

  .scene{
    position:relative;height:180px;border-radius:14px;overflow:hidden;
    border:1px solid rgba(224,164,90,.22);
    background:
      radial-gradient(60% 80% at 50% 118%, #6a3d18 0%, #3a2410 55%, #1c1206 100%);
    margin-bottom:20px;
  }
  .house{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);font-size:88px;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.5))}
  .win{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);width:26px;height:26px;border-radius:5px;
    background:radial-gradient(circle,#ffd98a,#ff9a3c 70%);box-shadow:0 0 22px 6px rgba(255,150,60,.55);opacity:.55}
  .scene.playing .win{animation:flicker 2.4s ease-in-out infinite}
  @keyframes flicker{0%,100%{opacity:.5;filter:brightness(1)}45%{opacity:.9;filter:brightness(1.25)}70%{opacity:.65}}
  .smoke{position:absolute;left:calc(50% + 26px);bottom:104px;width:10px;height:10px;border-radius:50%;
    background:rgba(240,224,200,.25);opacity:0}
  .scene.playing .smoke{animation:rise 3.4s ease-out infinite}
  @keyframes rise{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:.5}100%{opacity:0;transform:translateY(-70px) scale(1.8)}}
  .stars{position:absolute;inset:0}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#ffe9c2;opacity:.5}
  .viz{position:absolute;inset:auto 0 0 0;height:44px;display:flex;align-items:flex-end;gap:3px;padding:0 10px;opacity:.7}
  .viz i{flex:1;background:linear-gradient(180deg,var(--ember),var(--amber-deep));border-radius:3px 3px 0 0;height:2px;transition:height .12s ease}

  .controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:13px;padding:14px 28px;
    font-size:15px;font-weight:700;letter-spacing:.12em;color:#2a1a0a;
    background:linear-gradient(180deg,#f6d79b,#e0a45a);
    box-shadow:0 10px 26px rgba(224,164,90,.32),inset 0 1px 0 rgba(255,255,255,.5);
    transition:transform .12s,filter .2s}
  button:hover{transform:translateY(-2px);filter:brightness(1.05)}
  button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#cbb089,#9c7e56);color:#fff}
  .vol{display:flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:12px}
  input[type=range]{accent-color:var(--amber);width:120px}
  .status{text-align:center;font-size:12px;color:var(--amber);letter-spacing:.24em;height:16px;margin-top:12px;opacity:0;transition:opacity .3s}
  .status.on{opacity:1}
  .hint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:16px;letter-spacing:.04em;line-height:1.8}
</style>

<div class="room">
  <div class="tag">◇ Home &amp; Village Theme ◇</div>
  <h1>やすらぎの家</h1>
  <div class="subtitle">OUR HOME &nbsp;—&nbsp; "A Warm Hearth"</div>

  <div class="scene" id="scene">
    <div class="stars" id="stars"></div>
    <div class="smoke"></div>
    <div class="win"></div>
    <div class="house">🏠</div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="controls">
    <button id="play">▶ 家に入る</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="72"></div>
  </div>
  <div class="status" id="status">♪ ただいま… ♪</div>

  <div class="hint">
    Web Audio API でリアルタイム合成している、あたたかい民家のBGMです（音源ファイルなし）。<br>
    ハ長調・ゆるやかなテンポ・打楽器なしで、ずっと聴けるループにしています。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, analyser, freqData;
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);

  const _pw={};
  function pulseWave(duty){
    const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=32, real=new Float32Array(N), imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false});
  }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.8;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-16; comp.knee.value=28; comp.ratio.value=2.6; comp.attack.value=.01; comp.release.value=.3;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(analyser); analyser.connect(ctx.destination);
  }
  // soft voice: detuned pair, gentle lowpass, slow-ish ADSR
  function voice(freq,t,dur,{type='triangle',duty=null,gain=.2,detune=5,cut=2600,a=.02,d=.12,s=.7,r=.3}={}){
    const g=ctx.createGain(), f=ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=cut; f.Q.value=1.2;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=type;o2.type=type;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t); o2.detune.value=detune;
    const peak=gain, sus=Math.max(gain*s,0.0001);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak,t+a);
    g.gain.exponentialRampToValueAtTime(sus,t+a+d);
    g.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o1.connect(f); o2.connect(f); f.connect(g); g.connect(master);
    o1.start(t); o2.start(t); o1.stop(t+dur+.03); o2.stop(t+dur+.03);
  }

  // ---------- composition (C major, gentle) ----------
  const BPM=96, S=60/BPM/4, BAR=16*S;
  // 8-bar progression: C vi(Am) IV(F) V(G) | C vi(Am) ii(Dm) V(G)
  const CH={
    C: {bass:['C2','G2'], pad:['C3','E3','G3'], arp:['C4','E4','G4','E4']},
    Am:{bass:['A1','E2'], pad:['A2','C3','E3'], arp:['A3','C4','E4','C4']},
    F: {bass:['F1','C2'], pad:['F2','A2','C3'], arp:['F3','A3','C4','A3']},
    G: {bass:['G1','D2'], pad:['G2','B2','D3'], arp:['G3','B3','D4','B3']},
    Dm:{bass:['D2','A1'], pad:['D3','F3','A3'], arp:['D4','F4','A4','F4']}
  };
  const prog=['C','Am','F','G','C','Am','Dm','G'];

  // gentle, mostly-stepwise, chord-tone melody (8 bars). [note, dur-in-16ths]
  const lead=[
    ['E4',4],['G4',4],['C5',8],
    ['C5',4],['E5',4],['A4',8],
    ['C5',4],['A4',4],['F4',4],['A4',4],
    ['G4',4],['B4',4],['D5',8],
    ['E5',4],['G5',4],['E5',4],['C5',4],
    ['A4',4],['C5',4],['E5',8],
    ['F5',4],['E5',4],['D5',4],['A4',4],
    ['B4',4],['D5',4],['G4',8]
  ];

  function seqLead(base){
    let t=base;
    for(const [n,d] of lead){
      voice(hz(n), t, d*S*0.9, {type:'triangle', gain:.17, cut:3000, detune:4, a:.02, d:.1, s:.8, r:.16}); // ocarina-ish
      voice(hz(n)*2, t, d*S*0.85, {duty:.125, gain:.028, cut:4200, detune:3, a:.02, d:.08, s:.5, r:.12});   // faint music-box sparkle
      t += d*S;
    }
  }
  function bassBar(ch, base){
    // gentle root then fifth, half-note each
    voice(hz(ch.bass[0]), base,        BAR*0.5*0.95, {type:'triangle', gain:.22, cut:900, detune:3, a:.02, d:.15, s:.8, r:.2});
    voice(hz(ch.bass[1]), base+BAR*0.5, BAR*0.5*0.95, {type:'triangle', gain:.20, cut:900, detune:3, a:.02, d:.15, s:.8, r:.2});
  }
  function padBar(ch, base){
    for(const n of ch.pad)
      voice(hz(n), base, BAR*0.98, {type:'triangle', gain:.05, cut:1600, detune:7, a:.25, d:.3, s:.85, r:.4});
  }
  function arpBar(ch, base){
    // soft eighth-note music-box arpeggio
    for(let i=0;i<8;i++){
      const n=ch.arp[i%4];
      voice(hz(n), base+i*2*S, 2*S*0.9, {duty:.125, gain:.045, cut:3200, detune:2, a:.005, d:.05, s:.4, r:.06});
    }
  }

  function section(base, {arp}){
    for(let b=0;b<8;b++){
      const bt=base+b*BAR, ch=CH[prog[b]];
      bassBar(ch, bt);
      padBar(ch, bt);
      if(arp) arpBar(ch, bt);
    }
    seqLead(base);
  }

  const BODY_BARS=16, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){
    section(base,            {arp:false});   // first pass: warm and bare
    section(base+8*BAR,      {arp:true});    // second pass: add gentle music-box arpeggio
  }
  function scheduleIntro(base){
    // 2-bar soft swell on C
    for(const n of CH.C.pad) voice(hz(n), base, 2*BAR*0.97, {type:'triangle', gain:.06, cut:1300, a:.5, d:.5, s:.85, r:.6});
    voice(hz('C2'), base, 2*BAR*0.9, {type:'triangle', gain:.16, cut:800, a:.4, d:.4, s:.8, r:.5});
    voice(hz('E5'), base+BAR, BAR*0.8, {type:'triangle', gain:.12, cut:3000, a:.1, d:.2, s:.6, r:.3});
    voice(hz('G5'), base+BAR+8*S, BAR*0.6, {type:'triangle', gain:.11, cut:3000, a:.1, d:.2, s:.6, r:.3});
    return 2*BAR;
  }

  // transport
  let playing=false, timer=null, nextBody=0, rafId=null;
  function start(){
    if(!ctx) initAudio();
    if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.8, ctx.currentTime);
    playing=true;
    const t0=ctx.currentTime+0.15;
    const introLen=scheduleIntro(t0);
    let bodyStart=t0+introLen;
    scheduleBody(bodyStart);
    nextBody=bodyStart+bodyLen;
    timer=setInterval(()=>{ if(!playing)return; if(ctx.currentTime>nextBody-3){scheduleBody(nextBody);nextBody+=bodyLen;} },400);
    playBtn.textContent='■ 家を出る'; playBtn.classList.add('playing');
    scene.classList.add('playing'); statusEl.classList.add('on');
    drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime);
      master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(0.0001,ctx.currentTime+0.4); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.8; },460);
    playBtn.textContent='▶ 家に入る'; playBtn.classList.remove('playing');
    scene.classList.remove('playing'); statusEl.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  // visuals
  const scene=document.getElementById('scene');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  const statusEl=document.getElementById('status');
  // scatter stars
  const starBox=document.getElementById('stars');
  for(let i=0;i<26;i++){ const s=document.createElement('i');
    s.style.left=(6+i*3.5%92)+'%'; s.style.top=(6+(i*37%60))+'%'; s.style.opacity=(0.2+ (i%5)*0.12).toFixed(2);
    starBox.appendChild(s); }
  const N=32, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){
    if(!playing) return;
    analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*40).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz);
  }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.8; });
})();
</script>

</body>
</html>
