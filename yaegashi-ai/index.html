<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>八重樫東AI 〜激闘王CHAT〜（非公式ファンメイド）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Reggae+One&display=swap" rel="stylesheet">
<style>
  :root {
    /* 黒×白×赤（激闘王カラー） */
    --black: #0a0a0e;
    --ink: #15151a;
    --ink-soft: #26262c;
    --red: #d8232a;
    --red-deep: #a51220;
    --red-glow: #ff4b52;
    --white: #ffffff;
    --paper: #f6f3ee;
    --text: #15151a;
    --fight-font: 'Reggae One', 'M PLUS Rounded 1c', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    color: var(--text);
    /* リングの上から差すスポットライト＋赤いコーナーの照り返し */
    background:
      radial-gradient(ellipse 62% 42% at 50% -6%, rgba(255,255,255,.16), transparent 62%),
      radial-gradient(ellipse 55% 38% at 50% 106%, rgba(216,35,42,.30), transparent 66%),
      linear-gradient(160deg, var(--black) 0%, #14141a 45%, #220e13 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ----- ring ropes / corner pads / embers ----- */
  .deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .rope {
    position: absolute; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.30) 15%, rgba(255,255,255,.30) 85%, transparent);
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .rope.red { background: linear-gradient(90deg, transparent, rgba(216,35,42,.7) 15%, rgba(216,35,42,.7) 85%, transparent); height: 4px; }
  .rope.t1 { top: 9%; }  .rope.t2 { top: 14%; } .rope.t3 { top: 19%; }
  .rope.b1 { bottom: 9%; } .rope.b2 { bottom: 14%; } .rope.b3 { bottom: 19%; }
  .corner {
    position: absolute; width: 130px; height: 16px;
    background: linear-gradient(90deg, var(--red), var(--red-deep));
    border-radius: 999px;
    box-shadow: 0 0 22px rgba(216,35,42,.55);
  }
  .corner.tl { top: 26px; left: -34px;  transform: rotate(45deg); }
  .corner.tr { top: 26px; right: -34px; transform: rotate(-45deg); }
  .corner.bl { bottom: 26px; left: -34px;  transform: rotate(-45deg); }
  .corner.br { bottom: 26px; right: -34px; transform: rotate(45deg); }

  .spark {
    position: absolute; color: var(--red-glow);
    animation: twinkle 2.6s ease-in-out infinite;
    text-shadow: 0 0 14px rgba(216,35,42,.9);
  }
  .spark.w { color: rgba(255,255,255,.92); text-shadow: 0 0 10px rgba(255,255,255,.7); }
  @keyframes twinkle { 0%,100% { opacity: .15; transform: scale(.8) rotate(0deg);} 50% { opacity: 1; transform: scale(1.15) rotate(20deg);} }

  /* ----- app frame ----- */
  .app {
    position: relative; z-index: 1;
    width: min(540px, 96vw);
    height: min(800px, 94vh);
    height: min(800px, 94dvh); /* モバイルのアドレスバー分を除いた実表示域 */
    display: flex; flex-direction: column;
    background: var(--white);
    border-radius: 24px;
    border: 3px solid var(--ink);
    box-shadow: 0 0 0 6px rgba(216,35,42,.55), 0 24px 60px rgba(0,0,0,.7);
    overflow: hidden;
  }
  /* スマホは全画面レイアウトにして入力欄の見切れを防ぐ */
  @media (max-width: 600px) {
    body { align-items: stretch; justify-content: stretch; }
    .app {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
    .record { font-size: 10.5px; letter-spacing: .05em; }
    .chips { padding: 6px 10px; gap: 6px; }
    .chip { font-size: 12px; padding: 6px 10px; }
    .input-bar { padding: 10px 10px 12px; gap: 8px; }
    .input-bar input { font-size: 16px; padding: 11px 16px; } /* 16px未満だとiOSが自動ズームする */
    .input-bar button { padding: 0 18px; flex: none; }
    footer { padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  }

  /* ----- header（黒のコーナーマット＋赤ライン） ----- */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px 12px;
    background:
      repeating-linear-gradient(135deg, var(--black) 0 14px, var(--ink) 14px 28px);
    color: var(--white);
    border-bottom: 4px solid var(--red);
  }
  .avatar {
    width: 54px; height: 54px; flex: none;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--red);
    box-shadow: 0 0 10px rgba(216,35,42,.6);
    overflow: hidden;
  }
  .avatar svg { width: 100%; height: 100%; display: block; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .title { line-height: 1.3; }
  .title h1 {
    font-family: var(--fight-font);
    font-weight: 400;
    font-size: 23px;
    letter-spacing: .05em;
    text-shadow: 2px 2px 0 var(--red-deep);
  }
  .title h1 .ai { color: var(--red-glow); }
  .title p { font-size: 11.5px; font-weight: 700; color: #f2efea; }
  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--red-glow); margin-right: 5px;
    box-shadow: 0 0 8px var(--red-glow);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  /* ----- 戦績ストリップ ----- */
  .record {
    background: var(--ink);
    color: var(--white);
    text-align: center;
    font-size: 12px; font-weight: 800;
    letter-spacing: .12em;
    padding: 6px 8px 7px;
    border-bottom: 3px solid var(--red);
  }
  .record b { color: var(--red-glow); }

  /* ----- chat area ----- */
  .chat {
    flex: 1; overflow-y: auto;
    padding: 18px 16px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
    background: var(--paper);
  }

  /* ----- profile card（ファイトポスター風） ----- */
  .profile-card {
    align-self: center;
    text-align: center;
    background: var(--white);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 18px 30px 16px;
    box-shadow: 6px 6px 0 var(--red);
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  .kanji-badge {
    font-family: var(--fight-font);
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-size: 13px;
    letter-spacing: .3em;
    padding: 3px 12px 4px 15px;
    border-radius: 6px;
    margin-bottom: 10px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .profile-photo {
    width: 116px; height: 116px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 4px solid var(--white);
    box-shadow: 0 0 0 4px var(--ink), 0 0 0 8px var(--red), 0 10px 22px rgba(165,18,32,.4);
    background: #fff;
  }
  .profile-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .profile-photo svg { width: 100%; height: 100%; display: block; }
  .profile-card h2 {
    font-family: var(--fight-font);
    font-weight: 400;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: .08em;
    margin-top: 4px;
  }
  .profile-card h2 .ai { color: var(--red); }
  .profile-card .yomi { font-size: 12px; color: #55504b; font-weight: 700; margin-top: 2px; }
  .belts { display: flex; gap: 6px; justify-content: center; margin: 10px 0 2px; flex-wrap: wrap; }
  .belts span {
    background: var(--ink); color: var(--white);
    border: 2px solid var(--red);
    border-radius: 999px;
    font-size: 11px; font-weight: 800;
    padding: 3px 11px;
    letter-spacing: .06em;
  }
  .motto {
    font-family: var(--fight-font);
    color: var(--red-deep);
    font-size: 14px;
    letter-spacing: .22em;
    margin-top: 8px;
  }

  /* ----- ROUND仕切り ----- */
  .round-divider {
    display: flex; align-items: center; gap: 12px;
    color: #6d6862;
    font-size: 11.5px; font-weight: 800; letter-spacing: .22em;
  }
  .round-divider::before, .round-divider::after {
    content: ''; flex: 1; height: 2px;
    background: linear-gradient(90deg, transparent, #c4bcb2);
  }
  .round-divider::after { background: linear-gradient(90deg, #c4bcb2, transparent); }
  .round-divider .r { color: var(--red); }

  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row.user { flex-direction: row-reverse; }
  .row .avatar { width: 40px; height: 40px; border-width: 2.5px; }
  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15.5px;
    font-weight: 500;
    line-height: 1.85;
    white-space: pre-wrap;
    animation: pop .28s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.96); } }
  .row.ai .bubble {
    background: var(--white);
    border: 2.5px solid var(--red);
    color: var(--text);
    border-bottom-left-radius: 6px;
    box-shadow: 3px 3px 0 rgba(216,35,42,.25);
  }
  .row.user .bubble {
    background: var(--ink);
    border: 2.5px solid var(--black);
    color: var(--white);
    border-bottom-right-radius: 6px;
    box-shadow: 3px 3px 0 rgba(10,10,14,.25);
  }
  .name-tag {
    font-family: var(--fight-font);
    font-size: 11.5px; font-weight: 400; margin-bottom: 3px;
    letter-spacing: .08em;
  }
  .row.ai .name-tag { color: var(--red); }

  .typing { display: inline-flex; gap: 5px; padding: 6px 2px; }
  .typing i {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--red);
    animation: bounce 1s infinite;
  }
  .typing i:nth-child(2) { animation-delay: .15s; }
  .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0);} 30% { transform: translateY(-7px);} }

  /* ----- quick chips ----- */
  .chips {
    display: flex; gap: 8px; padding: 9px 14px; flex-wrap: wrap;
    background: var(--white);
    border-top: 2px solid #e8e2da;
  }
  .chip {
    border: 2.5px solid var(--red);
    color: var(--red-deep);
    background: var(--white);
    font-family: inherit;
    font-size: 12.5px; font-weight: 800;
    padding: 6px 13px; border-radius: 999px;
    cursor: pointer;
    transition: transform .12s, background .12s, color .12s;
  }
  .chip:nth-child(even) { border-color: var(--ink); color: var(--ink); }
  .chip:hover { transform: translateY(-2px) scale(1.04); background: var(--red); color: #fff; border-color: var(--red); }

  /* ----- input（黒コーナー） ----- */
  .input-bar {
    display: flex; gap: 10px; padding: 12px 14px;
    background: var(--ink);
    border-top: 4px solid var(--red);
  }
  .input-bar input {
    flex: 1 1 0;
    min-width: 0; /* flexで縮めるように（これがないと狭い画面でボタンを押し出す） */
    font-family: inherit; font-size: 15px; font-weight: 500;
    padding: 12px 18px;
    border-radius: 999px;
    border: 2.5px solid var(--white);
    outline: none;
    background: var(--white);
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .input-bar input::placeholder { color: #8a847d; }
  .input-bar input:focus { border-color: var(--red-glow); box-shadow: 0 0 0 4px rgba(216,35,42,.35); }
  .input-bar button {
    flex: none;
    white-space: nowrap;
    font-family: inherit; font-weight: 800; font-size: 14.5px;
    color: #fff;
    background: linear-gradient(135deg, var(--red), var(--red-deep));
    border: 2px solid rgba(255,255,255,.85); border-radius: 999px;
    padding: 0 22px;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(216,35,42,.5);
    transition: transform .12s, filter .12s;
  }
  .input-bar button:hover { transform: scale(1.05); filter: brightness(1.1); }
  .input-bar button:active { transform: scale(.94); }

  footer {
    text-align: center; font-size: 10.5px; font-weight: 500; color: #b9b3ac;
    padding: 6px 10px 9px; background: var(--ink);
    line-height: 1.6;
  }
</style>
</head>

/* ---- ナレッジ検索（プロフィール・全35戦・価値観・雑学） ---- */
function knowledgeMatch(text) {
  if (typeof KNOWLEDGE === 'undefined') return null;
  let best = null, bestScore = 0;
  for (const k of KNOWLEDGE) {
    let score = 0;
    for (const kw of k.keywords) if (kw.length >= 2 && text.toLowerCase().includes(kw.toLowerCase())) score += kw.length >= 4 ? 2 : 1;
    if (score > bestScore) { bestScore = score; best = k; }
  }
  return best ? { entry: best, score: bestScore } : null;
}
/* 回答文は knowledge.js 側で本人の口調で書いてあるため、前置き・締めは付けない */
const KNOW_PRE = [''];
const KNOW_POST = [''];

  ]},
  { re: /(疲れ|つかれ|つらい|辛い|悲し|かなし|落ち込|へこ|凹|しんど|泣|不安|くじけ|ダメだ|だめだ)/, res: [
    '大丈夫ですよ。僕なんてプロで7回負けて、顎を2か所折られたこともあります。それでも立ち上がってこられた。だから、あなたも大丈夫です。今日はゆっくり休んでください。休むのも練習のうちですから。',

const FALLBACK = [
  'うーん、それはちょっと分からないですね(笑)。でも、面白い質問です。',
  'なるほど…そうきましたか(笑)。もう少し詳しく教えてもらえますか？',
  '（マジか…どう返そう）…すみません、つい本音が(笑)。よかったら別の聞き方で教えてください。',
  'それは僕も勉強になります。ボクシングの話なら、いくらでも付き合いますよ(笑)',
  'いい質問ですね。うまく答えられるか分からないですけど、もう少し聞かせてください。',
];

let lastIdx = -1;
function pick(arr) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && i === lastIdx);
  lastIdx = i;
  return arr[i];
}
function reply(text) {
  const km = knowledgeMatch(text);
  if (km && km.score >= 3) return pick(KNOW_PRE) + km.entry.answer + pick(KNOW_POST);
  for (const r of RULES) if (r.re.test(text)) return pick(r.res);
  if (km && km.score >= 1) return pick(KNOW_PRE) + km.entry.answer + pick(KNOW_POST);
  return pick(FALLBACK);
}

/* ---- UI ---- */
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addRow(who, html, isTyping = false) {
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const av = who === 'ai' ? `<div class="avatar">${avatarHTML()}</div>` : '';
  const tag = who === 'ai' ? '<div class="name-tag">八重樫東AI</div>' : '';
  row.innerHTML = `${av}<div><${'div'} class="bubble">${tag}${html}</div></div>`;
  if (isTyping) row.dataset.typing = '1';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}
function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function botSay(text, delay = 700) {
  const t = addRow('ai', '<span class="typing"><i></i><i></i><i></i></span>', true);
  setTimeout(() => {
    t.remove();
    addRow('ai', esc(text));
  }, delay + Math.random() * 500);
}
function send(raw) {
  const text = (raw ?? input.value).trim();
  if (!text) return;
  input.value = '';
  addRow('user', esc(text));
  botSay(reply(text));
}
document.getElementById('send').addEventListener('click', () => send());
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.getElementById('chips').addEventListener('click', e => {
  if (e.target.classList.contains('chip')) send(e.target.textContent);
});
