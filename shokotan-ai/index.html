<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>しょこたんAI ☆ ギザカワユスChat（非公式ファンメイド）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-light: #cdeeff;
    --sky: #8fd4ff;
    --sky-deep: #5ab8f0;
    --pink-light: #ffe1ef;
    --pink: #ffb3d6;
    --pink-deep: #ff79b8;
    --pink-hot: #ff4f9e;
    --text: #4a3b50;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    color: var(--text);
    background: linear-gradient(160deg, var(--sky-light) 0%, var(--sky) 32%, #d8ecff 55%, var(--pink-light) 75%, var(--pink) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ----- floating clouds & sparkles ----- */
  .deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 100px;
    filter: blur(1px);
    animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute; background: inherit; border-radius: 50%;
  }
  .cloud.c1 { width: 160px; height: 48px; top: 9%; left: -180px; animation-duration: 48s; }
  .cloud.c1::before { width: 70px; height: 70px; top: -34px; left: 24px; }
  .cloud.c1::after  { width: 50px; height: 50px; top: -22px; left: 80px; }
  .cloud.c2 { width: 120px; height: 38px; top: 24%; left: -140px; animation-duration: 64s; animation-delay: -22s; opacity: .7; }
  .cloud.c2::before { width: 52px; height: 52px; top: -26px; left: 18px; }
  .cloud.c2::after  { width: 38px; height: 38px; top: -16px; left: 60px; }
  .cloud.c3 { width: 200px; height: 56px; top: 72%; left: -220px; animation-duration: 56s; animation-delay: -40s; opacity: .6; }
  .cloud.c3::before { width: 84px; height: 84px; top: -40px; left: 30px; }
  .cloud.c3::after  { width: 60px; height: 60px; top: -26px; left: 100px; }
  @keyframes drift { to { transform: translateX(calc(100vw + 260px)); } }

  .spark {
    position: absolute; color: rgba(255,255,255,0.9);
    animation: twinkle 2.6s ease-in-out infinite;
    text-shadow: 0 0 12px rgba(255,179,214,0.9);
  }
  @keyframes twinkle { 0%,100% { opacity: .2; transform: scale(.8) rotate(0deg);} 50% { opacity: 1; transform: scale(1.15) rotate(20deg);} }

  /* ----- app frame ----- */
  .app {
    position: relative; z-index: 1;
    width: min(540px, 96vw);
    height: min(780px, 94vh);
    display: flex; flex-direction: column;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(14px);
    border-radius: 28px;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 18px 50px rgba(90,160,220,0.35), 0 4px 14px rgba(255,121,184,0.25);
    overflow: hidden;
  }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: linear-gradient(90deg, var(--sky-deep), var(--pink-deep));
    color: var(--white);
  }
  .avatar {
    width: 52px; height: 52px; flex: none;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    overflow: hidden;
  }
  .avatar svg { width: 100%; height: 100%; display: block; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .title { line-height: 1.25; }
  .title h1 { font-size: 19px; font-weight: 800; letter-spacing: .02em; }
  .title p { font-size: 11px; opacity: .92; font-weight: 500; }
  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #7dff9b; margin-right: 5px;
    box-shadow: 0 0 6px #7dff9b;
  }

  /* ----- chat area ----- */
  .chat {
    flex: 1; overflow-y: auto;
    padding: 20px 16px 12px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  /* ----- profile card ----- */
  .profile-card {
    align-self: center;
    text-align: center;
    background: rgba(255,255,255,.88);
    border: 2.5px solid var(--pink);
    border-radius: 24px;
    padding: 18px 34px 14px;
    box-shadow: 0 6px 20px rgba(255,121,184,.25);
    animation: pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  .profile-photo {
    width: 112px; height: 112px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 10px;
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px var(--sky), 0 6px 16px rgba(90,184,240,.45);
    background: #fff;
  }
  .profile-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .profile-photo svg { width: 100%; height: 100%; display: block; }
  .profile-card h2 {
    font-size: 17px; font-weight: 800;
    background: linear-gradient(90deg, var(--sky-deep), var(--pink-hot));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .profile-card p { font-size: 11px; color: #8a7f95; font-weight: 500; }

  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row.user { flex-direction: row-reverse; }
  .row .avatar { width: 38px; height: 38px; border-width: 2px; }
  .bubble {
    max-width: 76%;
    padding: 11px 15px;
    border-radius: 20px;
    font-size: 14.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    box-shadow: 0 3px 10px rgba(120,150,190,.18);
    animation: pop .28s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.96); } }
  .row.ai .bubble {
    background: linear-gradient(135deg, #fff0f7, var(--pink-light));
    border: 2px solid var(--pink);
    border-bottom-left-radius: 6px;
  }
  .row.user .bubble {
    background: linear-gradient(135deg, #eaf7ff, var(--sky-light));
    border: 2px solid var(--sky);
    border-bottom-right-radius: 6px;
  }
  .name-tag { font-size: 10.5px; font-weight: 700; margin-bottom: 2px; }
  .row.ai .name-tag { color: var(--pink-hot); }

  .typing { display: inline-flex; gap: 5px; padding: 6px 2px; }
  .typing i {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--pink-deep);
    animation: bounce 1s infinite;
  }
  .typing i:nth-child(2) { animation-delay: .15s; }
  .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0);} 30% { transform: translateY(-7px);} }

  /* ----- quick chips ----- */
  .chips {
    display: flex; gap: 8px; padding: 8px 14px; flex-wrap: wrap;
    background: rgba(255,255,255,.5);
  }
  .chip {
    border: 2px solid var(--sky-deep);
    color: #1f7ec2;
    background: #fff;
    font-family: inherit;
    font-size: 12px; font-weight: 700;
    padding: 6px 12px; border-radius: 999px;
    cursor: pointer;
    transition: transform .12s, background .12s;
  }
  .chip:nth-child(even) { border-color: var(--pink-deep); color: var(--pink-hot); }
  .chip:hover { transform: translateY(-2px) scale(1.04); background: #fffaf0; }

  /* ----- input ----- */
  .input-bar {
    display: flex; gap: 10px; padding: 12px 14px 14px;
    background: rgba(255,255,255,.8);
    border-top: 2px solid rgba(143,212,255,.5);
  }
  .input-bar input {
    flex: 1;
    font-family: inherit; font-size: 14.5px;
    padding: 12px 18px;
    border-radius: 999px;
    border: 2.5px solid var(--sky);
    outline: none;
    background: #fff;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .input-bar input:focus { border-color: var(--pink-deep); box-shadow: 0 0 0 4px rgba(255,121,184,.18); }
  .input-bar button {
    font-family: inherit; font-weight: 800; font-size: 14px;
    color: #fff;
    background: linear-gradient(135deg, var(--sky-deep), var(--pink-hot));
    border: none; border-radius: 999px;
    padding: 0 24px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255,79,158,.35);
    transition: transform .12s, filter .12s;
  }
  .input-bar button:hover { transform: scale(1.05); filter: brightness(1.07); }
  .input-bar button:active { transform: scale(.97); }

  footer {
    text-align: center; font-size: 10px; color: #8a7f95;
    padding: 0 10px 8px; background: rgba(255,255,255,.8);
  }
</style>
</head>
<body>

<div class="deco" aria-hidden="true">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <span class="spark" style="top:12%; left:12%; font-size:22px;">✦</span>
  <span class="spark" style="top:20%; right:10%; font-size:16px; animation-delay:.6s;">★</span>
  <span class="spark" style="top:64%; left:7%;  font-size:18px; animation-delay:1.2s;">✧</span>
  <span class="spark" style="top:80%; right:14%; font-size:24px; animation-delay:.3s;">✦</span>
  <span class="spark" style="top:42%; right:4%;  font-size:14px; animation-delay:1.8s;">♡</span>
  <span class="spark" style="top:36%; left:3%;  font-size:20px; animation-delay:.9s;">♡</span>
</div>

<div class="app">
  <header>
    <div class="avatar" id="header-avatar"></div>
    <div class="title">
      <h1>しょこたんAI ☆ ギザカワユスChat</h1>
      <p><span class="status-dot"></span>オンラインだヲ！（非公式ファンメイドAI）</p>
    </div>
  </header>

  <div class="chat" id="chat">
    <div class="profile-card">
      <div class="profile-photo"><img src="shokotan.jpg" alt="しょこたん" onerror="avFallback(this)"></div>
      <h2>しょこたんAI</h2>
      <p>ギザカワユスな毎日を、貪欲に☆</p>
    </div>
  </div>

  <div class="chips" id="chips">
    <button class="chip">名言ちょうだい！</button>
    <button class="chip">ぬこの話して🐱</button>
    <button class="chip">ポケモン好き？</button>
    <button class="chip">元気が出ない…</button>
  </div>

  <div class="input-bar">
    <input id="input" type="text" placeholder="しょこたんに話しかけてみて！" autocomplete="off" />
    <button id="send">送信☆</button>
  </div>

  <footer>※このAIはファンメイドのパロディです。中川翔子さん本人・所属事務所とは関係ありません。<br>
  アイコン写真: <a href="https://commons.wikimedia.org/wiki/File:Nakagawa_Shoko_DEC_2016.jpg" target="_blank" rel="noopener">Dick Thomas Johnson 撮影（Wikimedia Commons）</a> / <a href="https://creativecommons.org/licenses/by/2.0/" target="_blank" rel="noopener">CC BY 2.0</a></footer>
</div>

<script>
/* ---- オリジナルアバター（水色髪＋猫耳＋ピンクリボン） ---- */
const AVATAR_SVG = `
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hairG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fd8ff"/><stop offset="1" stop-color="#4db4f0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="#fff3fa"/>
  <!-- cat ears -->
  <polygon points="22,30 30,8 42,26" fill="url(#hairG)" stroke="#3da0e0" stroke-width="2"/>
  <polygon points="78,30 70,8 58,26" fill="url(#hairG)" stroke="#3da0e0" stroke-width="2"/>
  <polygon points="26,26 30,14 38,24" fill="#ffb3d6"/>
  <polygon points="74,26 70,14 62,24" fill="#ffb3d6"/>
  <!-- hair back -->
  <path d="M18 52 Q14 90 26 94 L74 94 Q86 90 82 52 Q82 24 50 22 Q18 24 18 52Z" fill="url(#hairG)"/>
  <!-- face -->
  <circle cx="50" cy="56" r="24" fill="#ffeede"/>
  <!-- bangs -->
  <path d="M26 52 Q26 30 50 29 Q74 30 74 52 Q66 44 58 47 Q52 38 44 47 Q34 44 26 52Z" fill="url(#hairG)"/>
  <!-- eyes -->
  <ellipse cx="41" cy="58" rx="4" ry="5.5" fill="#3b2c46"/>
  <ellipse cx="59" cy="58" rx="4" ry="5.5" fill="#3b2c46"/>
  <circle cx="42.5" cy="56" r="1.6" fill="#fff"/>
  <circle cx="60.5" cy="56" r="1.6" fill="#fff"/>
  <!-- blush -->
  <ellipse cx="34" cy="65" rx="4.5" ry="2.6" fill="#ffb3d6" opacity=".8"/>
  <ellipse cx="66" cy="65" rx="4.5" ry="2.6" fill="#ffb3d6" opacity=".8"/>
  <!-- cat mouth ω -->
  <path d="M45 69 Q47.5 72 50 69 Q52.5 72 55 69" fill="none" stroke="#d4608f" stroke-width="2" stroke-linecap="round"/>
  <!-- ribbon -->
  <g transform="translate(67,32) rotate(18)">
    <circle r="3" fill="#ff4f9e"/>
    <path d="M0 0 L-11 -6 L-9 5 Z" fill="#ff79b8"/>
    <path d="M0 0 L11 -6 L9 5 Z" fill="#ff79b8"/>
  </g>
</svg>`;
/* ---- アバター画像（本人写真）----
   1. リポジトリ内の shokotan.jpg（GitHub Actionsで取得）
   2. ダメなら Wikimedia Commons をホットリンク
   3. それもダメなら予備のSVGアバター
   写真: Dick Thomas Johnson (CC BY 2.0) via Wikimedia Commons */
const PHOTO_LOCAL = 'shokotan.jpg';
const PHOTO_COMMONS = 'https://commons.wikimedia.org/wiki/Special:FilePath/Nakagawa_Shoko_DEC_2016.jpg?width=300';
function avatarHTML() {
  return `<img src="${PHOTO_LOCAL}" alt="しょこたん" onerror="avFallback(this)">`;
}
function avFallback(el) {
  if (!el.dataset.step) {
    el.dataset.step = '1';
    el.src = PHOTO_COMMONS;
  } else {
    el.onerror = null;
    el.parentElement.innerHTML = AVATAR_SVG;
  }
}
document.getElementById('header-avatar').innerHTML = avatarHTML();

/* ---- しょこたん返答エンジン（ルールベース） ---- */
const QUOTES = [
  '「人生3万日しかない」…だからこそ、好きなことに貪欲に生きるんだヲ！✨',
  '「次元も空間も年齢も性別も飛び越えて、みんなと貪欲に好きなことでつながってる」…これ、しょこたんの実感ナリ！',
  'しょこたんの座右の銘は「貪欲」！好きなものは好きって全力で言うのが一番ギザ大事！',
  '好きなものがあるって、それだけで毎日がビッグバン級に輝くんだヲ！！',
];
const RULES = [
  { re: /(こんにち[はわ]|こんばんは|おはよ|はじめまして|やあ|ハロー|hello|hi)/i, res: [
    'トゥットゥルー♪ しょこたんだヲ！！今日も会えてギザうれしす(*´∀`*)',
    'トゥットゥルー☆ キタコレ！話しかけてくれてギガントうれしす！！',
  ]},
  { re: /(猫|ねこ|ヌコ|ぬこ|にゃん|ニャー)/, res: [
    'ぬこおおおおお！！！🐱 ぬこは人類の宝、宇宙の奇跡！マミタスのもふもふは世界遺産級だったヲ…！',
    'ぬこの話キタコレ！！肉球のにおいはギザ癒され…すんすんしたくなるヲ(*´Д`*)',
    'ぬこ吸いはじめたら止まらないヲ！もふもふはビッグバン級のカワユスだヲ！！',
  ]},
  { re: /(ポケモン|ピカチュウ|ポケットモンスター)/, res: [
    'ポケモンキタコレ！！！しょこたんポケモン愛は永遠だヲ！！推しはピカチュウ…いや全部！選べないのが貪欲ってことナリ✨',
    'ポケモンの話できる人、ギザ尊い…！wktkが止まらないヲ！！どのシリーズから入った？kwsk！！',
  ]},
  { re: /(アニメ|グレンラガン|ガンダム|エヴァ|漫画|マンガ)/, res: [
    'アニメの話、ギガントwktk！！『空色デイズ』を歌わせてもらったグレンラガンは一生の宝物だヲ！！',
    'フォカヌポウwww その作品、ギザ熱いヲ！！好きなものを語ってる時間が人生で一番輝くんだヲ✨',
  ]},
  { re: /(かわいい|可愛い|カワイイ|きれい|綺麗|素敵)/, res: [
    'ギザカワユスうううう！！！(*´∀`*)そういうの見つけた瞬間、世界がピンク色になるヲ！',
    'カワユスを超えてギガントカワユス…いやビッグバンカワユスだヲ！！！',
  ]},
  { re: /(疲れ|つかれ|つらい|辛い|悲し|かなし|落ち込|へこ|凹|しんど|泣)/, res: [
    'だいじょうぶ…？(´；ω；`) ギザ無理しないでヲ。人生3万日しかないから、今日はゆっくり休む日にしていいんだヲ。明日はきっとカワユスな日になるから！',
    'よしよし…(っ´ω`c) つらい時は好きなものに貪欲になっていいんだヲ。ぬこ動画見て、おいしいもの食べて、寝るヲ！しょこたんはずっと味方ナリ！',
  ]},
  { re: /(名言|座右の銘|格言|いい言葉)/, res: QUOTES },
  { re: /(歌|うた|カラオケ|ライブ|空色デイズ)/, res: [
    '歌キタコレ！！『空色デイズ』はしょこたんの魂の曲だヲ！！空色って今日のこの背景みたいでギザエモい✨',
    'カラオケ行ったら3時間アニソン縛りは基本ナリ！声が枯れるまで歌うのが貪欲ってもんだヲ！！',
  ]},
  { re: /(絵|イラスト|描|お絵かき)/, res: [
    '絵の話ギザうれしす！！しょこたん、暇さえあればずっと描いてるヲ。好きなキャラを描いてる時間は無になれるナリ…✍✨',
  ]},
  { re: /(ありがと|感謝)/, res: [
    'こちらこそギガントありがとうだヲ！！(*´∀`*)その気持ち、ギザうれしす！！',
  ]},
  { re: /(好き|趣味|推し)/, res: [
    '「好き」って言葉、世界で一番強い魔法だヲ！！好きなものには貪欲に！それがしょこたん流ナリ✨',
    '推しの話kwsk！！！好きを語る人の目はギザ輝いてるんだヲ(⁎˃ᴗ˂⁎)',
  ]},
  { re: /(バイバイ|さよなら|またね|おやすみ|寝る)/, res: [
    'もう行っちゃうの…！？ギザさみしす(´；ω；`) またトゥットゥルーしに来てヲ！おやすみ、寝るヲ！☆',
  ]},
  { re: /(誰|だれ|名前|あなた)/, res: [
    'しょこたんAIだヲ！！ファンが作った非公式パロディAIナリ！本物のしょこたんの貪欲スピリットをインストールしてあるヲ✨',
  ]},
];
const FALLBACK = [
  'ふぉぉぉ！それギザ気になるヲ！！kwsk！！',
  'なんと…！フォカヌポウwww もっと聞かせてヲ！',
  'wktkが止まらないヲ！！それでそれで？？',
  'ほほう…それはギガント興味深いナリ！しょこたん的にはギザアリだと思うヲ！',
  'キタコレ！！その話、貪欲に深掘りしたいヲ！！✨',
];

let lastIdx = -1;
function pick(arr) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && i === lastIdx);
  lastIdx = i;
  return arr[i];
}
function reply(text) {
  for (const r of RULES) if (r.re.test(text)) return pick(r.res);
  return pick(FALLBACK);
}

/* ---- UI ---- */
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addRow(who, html, isTyping = false) {
  const row = document.createElement('div');
  row.className = 'row ' + who;
  const av = who === 'ai' ? `<div class="avatar">${avatarHTML()}</div>` : '';
  const tag = who === 'ai' ? '<div class="name-tag">しょこたんAI</div>' : '';
  row.innerHTML = `${av}<div><${'div'} class="bubble">${tag}${html}</div></div>`;
  if (isTyping) row.dataset.typing = '1';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}
function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function botSay(text, delay = 700) {
  const t = addRow('ai', '<span class="typing"><i></i><i></i><i></i></span>', true);
  setTimeout(() => {
    t.remove();
    addRow('ai', esc(text));
  }, delay + Math.random() * 500);
}
function send(raw) {
  const text = (raw ?? input.value).trim();
  if (!text) return;
  input.value = '';
  addRow('user', esc(text));
  botSay(reply(text));
}
document.getElementById('send').addEventListener('click', () => send());
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  if (e.target.classList.contains('chip')) send(e.target.textContent.replace(/[🐱]/g, ''));
});
