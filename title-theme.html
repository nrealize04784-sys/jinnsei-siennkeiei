<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Web Audioでリアルタイム合成するタイトル画面BGM『ゴールド大陸 序曲』。ワールドテーマの主題を荘厳に変奏したライトモチーフ実践。" />
<title>ゴールド大陸 序曲 | Title Theme</title>
</head>
<body>
<style>
  :root{ --gold:#ffcf5a; --gold2:#c9871a; --deep:#3a1e5a; --ink:#fff6df; --dim:#c9b98a; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:
      radial-gradient(120% 90% at 50% -10%, #6a3aa0 0%, transparent 46%),
      radial-gradient(120% 80% at 50% 118%, #b9791e 0%, transparent 52%),
      linear-gradient(180deg,#160a2e,#231038 40%,#3a2140 70%,#7a4a1e 100%);
    color:var(--ink);font-family:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden}
  .cab{width:min(700px,100%);position:relative;border:1px solid rgba(255,207,90,.4);border-radius:20px;
    background:linear-gradient(180deg,rgba(24,14,44,.9),rgba(14,8,26,.95));
    box-shadow:0 30px 90px rgba(0,0,0,.7),0 0 0 1px rgba(255,207,90,.14), inset 0 1px 0 rgba(255,230,150,.14);
    padding:30px 26px 32px;overflow:hidden;text-align:center}
  .cab::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;opacity:.4}
  .tag{font-size:11px;letter-spacing:.5em;color:var(--gold);text-transform:uppercase;opacity:.9}
  .logo{position:relative;margin:14px 0 4px}
  .logo h1{font-size:clamp(34px,9vw,62px);font-weight:800;letter-spacing:.04em;line-height:1;
    background:linear-gradient(180deg,#fff2c8,#ffcf5a 45%,#c9871a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(255,190,70,.4);filter:drop-shadow(0 3px 0 rgba(120,70,10,.5))}
  .logo .sub2{font-size:clamp(13px,3vw,17px);letter-spacing:.42em;color:#e9c877;margin-top:4px;text-transform:uppercase}
  .subtitle{color:var(--dim);font-size:12px;letter-spacing:.24em;margin:6px 0 18px}
  .stage{position:relative;height:170px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,207,90,.25);
    background:radial-gradient(90% 120% at 50% 120%,#5a3a1e,#241033 55%,#140a24);margin-bottom:16px}
  .sun{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:52px;filter:drop-shadow(0 0 30px rgba(255,200,90,.9))}
  .stage.playing .sun{animation:pulse 4.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{filter:drop-shadow(0 0 22px rgba(255,200,90,.7))}50%{filter:drop-shadow(0 0 40px rgba(255,220,120,1))}}
  .land{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-size:44px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
  .ray{position:absolute;left:50%;top:44px;width:2px;height:120px;background:linear-gradient(180deg,rgba(255,220,120,.5),transparent);transform-origin:top;opacity:0}
  .stage.playing .ray{animation:shine 5s ease-in-out infinite}
  @keyframes shine{0%,100%{opacity:0}50%{opacity:.5}}
  .spark{position:absolute;font-size:14px;opacity:0;color:#ffe6a0}
  .stage.playing .spark{animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.3)}}
  .viz{position:absolute;inset:auto 0 0 0;height:44px;display:flex;align-items:flex-end;gap:2px;padding:0 8px;opacity:.55}
  .viz i{flex:1;background:linear-gradient(180deg,#ffcf5a,#8a4ea0);border-radius:2px 2px 0 0;height:2px;transition:height .06s linear}
  .press{font-size:13px;letter-spacing:.4em;color:var(--gold);margin-bottom:14px;opacity:0}
  .cab.on .press{opacity:1;animation:blink 1.4s steps(1) infinite}
  @keyframes blink{50%{opacity:.25}}
  .controls{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:14px 34px;font-size:15px;font-weight:800;letter-spacing:.14em;
    color:#3a1e06;transition:transform .12s,filter .2s;
    background:linear-gradient(180deg,#ffe08a,#f2b23a);box-shadow:0 10px 28px rgba(230,150,40,.45),inset 0 1px 0 rgba(255,255,255,.7)}
  button:hover{transform:translateY(-2px);filter:brightness(1.07)} button:active{transform:translateY(1px)}
  button.playing{background:linear-gradient(180deg,#9b7ad0,#6a3aa0);color:#f6eaff}
  .vol{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px}
  input[type=range]{accent-color:var(--gold);width:110px}
  .hint{color:var(--dim);font-size:12px;margin-top:16px;letter-spacing:.03em;line-height:1.7}
</style>

<div class="cab" id="cab">
  <div class="tag">◆ Title Theme ◆</div>
  <div class="logo">
    <h1>ゴールド大陸</h1>
    <div class="sub2">Golden Continent</div>
  </div>
  <div class="subtitle">MAIN THEME · OVERTURE &nbsp;—&nbsp; a grand variation of the world theme</div>

  <div class="stage" id="stage">
    <div class="ray"></div>
    <div class="sun">🌅</div>
    <div class="land">🏔️🏝️🏰🌴</div>
    <div class="viz" id="viz"></div>
  </div>

  <div class="press">▶ PRESS START</div>
  <div class="controls">
    <button id="play">▶ タイトルを聴く</button>
    <div class="vol">🔊 <input type="range" id="vol" min="0" max="100" value="78"></div>
  </div>
  <div class="hint">
    Web Audio API でリアルタイム合成するタイトル画面BGMです（音源ファイルなし）。<br>
    「ゴールド大陸」ワールドテーマの主題を、荘厳な序曲として変奏（＝ライトモチーフ）しています。
  </div>
</div>

<script>
(() => {
  let ctx, master, comp, limiter, revL, revS, dly, fxIn, analyser, freqData;
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const NOTES={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  const midi=n=>{const m=/^([A-G])(#|b)?(-?\d)$/.exec(n);let s=NOTES[m[1]]+(m[2]==='#'?1:m[2]==='b'?-1:0);return 12*(+m[3]+1)+s;};
  const nm=m=>NAMES[((m%12)+12)%12]+(Math.floor(m/12)-1);
  const hz=n=>440*Math.pow(2,(midi(n)-69)/12);
  const mf=m=>440*Math.pow(2,(m-69)/12);

  const _pw={};
  function pulseWave(duty){ const k=duty.toFixed(3); if(_pw[k])return _pw[k];
    const N=16,real=new Float32Array(N),imag=new Float32Array(N);
    for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*duty);
    return _pw[k]=ctx.createPeriodicWave(real,imag,{disableNormalization:false}); }
  function impulse(dur,decay){ const len=Math.max(1,Math.floor(ctx.sampleRate*dur)),buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);} return buf; }
  function initAudio(){
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=volEl.value/100*0.84;
    comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-15; comp.knee.value=24; comp.ratio.value=3; comp.attack.value=.006; comp.release.value=.25;
    limiter=ctx.createDynamicsCompressor();
    limiter.threshold.value=-2; limiter.knee.value=0; limiter.ratio.value=20; limiter.attack.value=.002; limiter.release.value=.1;
    analyser=ctx.createAnalyser(); analyser.fftSize=128; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);
    revL=ctx.createConvolver(); revL.buffer=impulse(2.8,2.1);         // cathedral hall
    const l=ctx.createGain(); l.gain.value=1.0; revL.connect(l); l.connect(master);
    revS=ctx.createConvolver(); revS.buffer=impulse(.7,2.8); const s=ctx.createGain(); s.gain.value=.6; revS.connect(s); s.connect(master);
    fxIn=ctx.createGain(); dly=ctx.createDelay(1); dly.delayTime.value=3*S;
    const fb=ctx.createGain(); fb.gain.value=.3; const dOut=ctx.createGain(); dOut.gain.value=.34;
    fxIn.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(dOut); dOut.connect(master);
  }

  let REC=null;
  function voice(f,t,d,o){ if(REC) REC.push({t,play:b=>_voice(f,b+t,d,o)}); else _voice(f,t,d,o); }
  function bell(t,n,g){ if(REC) REC.push({t,play:b=>_bell(b+t,n,g)}); else _bell(t,n,g); }
  function timp(t,f,g){ if(REC) REC.push({t,play:b=>_timp(b+t,f,g)}); else _timp(t,f,g); }
  function roll(t,f,g,dur){ if(REC) REC.push({t,play:b=>_roll(b+t,f,g,dur)}); else _roll(t,f,g,dur); }
  function crash(t,g){ if(REC) REC.push({t,play:b=>_crash(b+t,g)}); else _crash(t,g); }

  function _voice(freq,t,dur,{wave='sawtooth',duty=null,g=.14,det=7,vib=0,vr=5,a=.02,d=.1,s=.75,r=.2,
                              cut=4200,ftype='lowpass',q=1,pan=0,rl=0,rs=0,de=0,env='adsr'}={}){
    const gn=ctx.createGain(), f=ctx.createBiquadFilter(); f.type=ftype; f.frequency.value=cut; f.Q.value=q;
    const o1=ctx.createOscillator(), o2=ctx.createOscillator();
    if(duty!=null){const w=pulseWave(duty);o1.setPeriodicWave(w);o2.setPeriodicWave(w);}else{o1.type=wave;o2.type=wave;}
    o1.frequency.setValueAtTime(freq,t); o2.frequency.setValueAtTime(freq,t); o2.detune.value=det;
    if(vib){const l=ctx.createOscillator(),lg=ctx.createGain();l.frequency.value=vr;lg.gain.value=vib;l.connect(lg);lg.connect(o1.detune);lg.connect(o2.detune);l.start(t);l.stop(t+dur+.03);}
    const peak=g, sus=Math.max(g*s,.0001);
    gn.gain.setValueAtTime(.0001,t); gn.gain.exponentialRampToValueAtTime(peak,t+a);
    if(env==='hold'){ gn.gain.setValueAtTime(peak,t+Math.max(dur-r,a)); gn.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    else { gn.gain.exponentialRampToValueAtTime(sus,t+a+d); gn.gain.setValueAtTime(sus,t+Math.max(dur-r,a+d)); gn.gain.exponentialRampToValueAtTime(.0001,t+dur); }
    o1.connect(f); o2.connect(f); f.connect(gn);
    let tail=gn; if(ctx.createStereoPanner){const p=ctx.createStereoPanner();p.pan.value=pan;gn.connect(p);tail=p;}
    tail.connect(master);
    if(rl){const x=ctx.createGain();x.gain.value=rl;gn.connect(x);x.connect(revL);}
    if(rs){const x=ctx.createGain();x.gain.value=rs;gn.connect(x);x.connect(revS);}
    if(de){const x=ctx.createGain();x.gain.value=de;gn.connect(x);x.connect(fxIn);}
    o1.start(t);o2.start(t);o1.stop(t+dur+.05);o2.stop(t+dur+.05);
  }
  function _noise(t,dur,type,cut,q,g,dest){ const n=ctx.createBufferSource();
    const buf=ctx.createBuffer(1,Math.max(1,Math.floor(ctx.sampleRate*dur)),ctx.sampleRate);
    const dd=buf.getChannelData(0); for(let i=0;i<dd.length;i++) dd[i]=Math.random()*2-1; n.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=cut; f.Q.value=q;
    const gn=ctx.createGain(); gn.gain.setValueAtTime(g,t); gn.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f); f.connect(gn); gn.connect(dest||master); n.start(t); n.stop(t+dur+.02); }
  const _bell=(t,note,g=.1)=>{ const f0=hz(note);
    [[1,1],[2.01,.4],[3.0,.2]].forEach(([r,a])=>{ const o=ctx.createOscillator(),e=ctx.createGain(); o.type='sine'; o.frequency.value=f0*r;
      e.gain.setValueAtTime(.0001,t); e.gain.exponentialRampToValueAtTime(g*a,t+.006); e.gain.exponentialRampToValueAtTime(.0001,t+1.5*(1-.1*r));
      o.connect(e); const p=ctx.createStereoPanner?ctx.createStereoPanner():null; if(p){p.pan.value=rnd(-.5,.5);e.connect(p);p.connect(master);}else e.connect(master);
      const x=ctx.createGain(); x.gain.value=.45; e.connect(x); x.connect(revL); const y=ctx.createGain(); y.gain.value=.3; e.connect(y); y.connect(fxIn);
      o.start(t); o.stop(t+1.6); }); };
  const _timp=(t,freq,g=.65)=>{ const o=ctx.createOscillator(),e=ctx.createGain(); o.type='sine';
    o.frequency.setValueAtTime(freq*1.5,t); o.frequency.exponentialRampToValueAtTime(freq,t+.08);
    e.gain.setValueAtTime(g,t); e.gain.exponentialRampToValueAtTime(.0001,t+.55);
    o.connect(e); const x=ctx.createGain(); x.gain.value=.4; e.connect(x); x.connect(revL); e.connect(master); o.start(t); o.stop(t+.6); };
  const _roll=(t,freq,g,dur)=>{ const steps=Math.max(2,Math.floor(dur/0.06));
    for(let i=0;i<steps;i++) _timp(t+i*(dur/steps), freq, g*(0.3+0.7*i/steps)); }; // crescendo timpani roll
  const _crash=(t,g=.3)=> _noise(t,1.4,'highpass',5000,.5,g);

  // ---------- Gold Continent MAIN THEME, arranged as a grand overture (C major, slow) ----------
  const BPM=80, S=60/BPM/4, BAR=16*S;
  const CH={
    C: {b:'C2', pad:['C4','E4','G4']},
    G: {b:'G2', pad:['G3','B3','D4']},
    Am:{b:'A2', pad:['A3','C4','E4']},
    Em:{b:'E2', pad:['E3','G3','B3']},
    F: {b:'F2', pad:['F3','A3','C4']},
    Dm:{b:'D2', pad:['D4','F4','A4']}
  };
  const progA=['C','G','Am','Em','F','C','Dm','G'];
  const progB=['F','G','Em','Am','Dm','G','C','G'];
  // ★ THE LEITMOTIF — identical to the Gold Continent world theme's main melody
  const THEME=[
    ['G4',4],['C5',4],['E5',4],['G5',4],   // the signature rising hook
    ['F5',4],['E5',4],['D5',8],
    ['E5',4],['A5',4],['C6',4],['A5',4],
    ['G5',4],['E5',4],['B4',8],
    ['A5',4],['G5',4],['F5',4],['A5',4],
    ['G5',4],['E5',4],['C5',8],
    ['D5',4],['F5',4],['A5',4],['D6',4],
    ['C6',4],['B5',4],['G5',4],['D5',4]
  ];
  // development — the rising-arpeggio DNA of the hook, sequenced upward (builds anticipation)
  const DEV=[
    ['F5',4],['A5',4],['C6',4],['A5',4],
    ['G5',4],['B5',4],['D6',8],
    ['E5',4],['G5',4],['B5',8],
    ['A5',4],['C6',4],['E6',4],['C6',4],
    ['D5',4],['F5',4],['A5',4],['D6',4],
    ['G5',4],['B5',4],['D6',8],
    ['C6',4],['E6',4],['G5',4],['E6',4],
    ['D6',8],['G5',8]
  ];

  function seqTheme(list, base, {g=.16, oct=false, bells=false}={}){ let acc=0;
    for(const [n,d] of list){ const t=base+acc*S;
      voice(hz(n), t, d*S*0.95, {duty:.25, g, cut:4600, det:8, a:.02, d:.08, s:.82, r:.1, pan:.05, rl:.32, de:.14}); // horn
      voice(hz(n), t, d*S*0.92, {wave:'triangle', g:g*.4, cut:2600, det:4, a:.02, s:.8, r:.1, pan:.05}); // body
      if(oct) voice(mf(midi(n)-12), t, d*S*0.92, {duty:.25, g:g*.55, cut:3200, det:6, a:.02, s:.8, r:.1, pan:-.1, rl:.25}); // octave-down doubling
      if(bells && acc%16===0) bell(t, nm(midi(n)+12), .08);
      acc+=d; } }
  function strings(root, base, g){ for(const n of CH[root].pad){
      voice(hz(n), base, BAR*0.99, {wave:'sawtooth', g:g||.05, det:12, vib:5, vr:4, cut:1900, a:.25, d:.35, s:.92, r:.4, rl:.55, pan:rnd(-.28,.28)});
      voice(hz(n), base, BAR*0.99, {wave:'triangle', g:(g||.05)*.7, det:6, cut:2400, a:.25, s:.92, r:.4, rl:.4}); } }
  function choir(root, base){ for(const n of CH[root].pad){
      voice(hz(midi(n)+12>0?n:n), base, BAR*0.99, {wave:'triangle', g:.035, det:10, vib:7, vr:4.5, cut:2600, a:.35, d:.4, s:.92, r:.5, rl:.6, pan:rnd(-.3,.3)}); } }
  function grandBass(root, base){ const rm=midi(CH[root].b);
    voice(mf(rm), base, BAR*0.98, {wave:'triangle', g:.16, cut:800, det:3, a:.03, d:.15, s:.8, r:.25, rl:.15});
    voice(mf(rm-12), base, BAR*0.98, {wave:'sine', g:.12, cut:400, a:.05, s:.85, r:.3}); } // deep octave
  function harpArp(root, base){ const p=CH[root].pad;
    for(let i=0;i<8;i++){ const m=midi(p[i%3])+12; bell(base+i*2*S, nm(m), .05); } }
  function harpRun(base, notes, span){ notes.forEach((n,i)=> bell(base+i*(span/notes.length), n, .07)); }

  function sectionA(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progA[b];
      grandBass(ch,bt); strings(ch,bt,.055); if(b%2===0) timp(bt,hz(CH[ch].b),.4); }
    timp(base,hz('C2'),.5);
    seqTheme(THEME, base, {g:.16, bells:true}); }
  function sectionB(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progB[b];
      grandBass(ch,bt); strings(ch,bt,.06); choir(ch,bt); harpArp(ch,bt); timp(bt,hz(CH[ch].b),.35); }
    crash(base,.24);
    seqTheme(DEV, base, {g:.15, bells:true}); }
  function sectionC(base){ for(let b=0;b<8;b++){ const bt=base+b*BAR, ch=progA[b];
      grandBass(ch,bt); strings(ch,bt,.07); choir(ch,bt); harpArp(ch,bt); roll(bt,hz(CH[ch].b),.3,BAR*0.5); }
    crash(base,.34); timp(base,hz('C2'),.7);
    seqTheme(THEME, base, {g:.18, oct:true, bells:true}); }   // the triumphant full statement

  const BODY_BARS=24, bodyLen=BODY_BARS*BAR;
  function scheduleBody(base){ sectionA(base); sectionB(base+8*BAR); sectionC(base+16*BAR); }
  function scheduleIntro(base){
    // awe: swelling C-major chord + timpani roll + harp gliss up + a distant, rubato statement of the hook
    for(const n of ['C3','G3','C4','E4','G4']) voice(hz(n), base, 4*BAR*0.98, {wave:'sawtooth', g:.045, det:12, cut:1500, a:1.0, d:.6, s:.9, r:.7, rl:.6, pan:rnd(-.2,.2)});
    _roll(base+2*BAR, hz('C2'), .4, 2*BAR*0.9);
    harpRun(base+BAR, ['C4','E4','G4','C5','E5','G5','C6','E6','G6'], 2*BAR);   // rising gliss
    // the hook, stated grandly & slow (rubato feel via long notes) on horn+bell
    [['G4',6],['C5',6],['E5',6],['G5',14]].reduce((acc,[n,d])=>{ const t=base+2*BAR+acc*S;
      voice(hz(n), t, d*S*0.95, {duty:.25, g:.15, cut:4200, det:8, a:.04, d:.1, s:.85, r:.2, rl:.4, de:.2});
      bell(t, nm(midi(n)+12), .09); return acc+d; }, 0);
    crash(base+4*BAR,.3); timp(base+4*BAR,hz('C2'),.6);
    return 4*BAR;
  }

  function buildEvents(){ REC=[]; scheduleBody(0); const ev=REC; REC=null; ev.sort((a,b)=>a.t-b.t); return ev; }
  let playing=false, timer=null, rafId=null, EVENTS=null, loopBase=0, evIdx=0;
  function pump(){ if(!playing) return; const horizon=ctx.currentTime+0.35; let guard=0;
    while(guard++<5000){ if(evIdx>=EVENTS.length){ loopBase+=bodyLen; evIdx=0; }
      const e=EVENTS[evIdx]; if(loopBase+e.t>horizon) break; e.play(loopBase); evIdx++; } }
  function start(){
    if(!ctx) initAudio(); if(ctx.state==='suspended') ctx.resume();
    master.gain.setValueAtTime(volEl.value/100*0.84, ctx.currentTime);
    playing=true; EVENTS=buildEvents();
    const t0=ctx.currentTime+0.2; const introLen=scheduleIntro(t0);
    loopBase=t0+introLen; evIdx=0; timer=setInterval(pump,25);
    playBtn.textContent='■ 停止'; playBtn.classList.add('playing');
    stage.classList.add('playing'); cab.classList.add('on'); drawViz();
  }
  function stop(){
    playing=false; clearInterval(timer); if(rafId) cancelAnimationFrame(rafId);
    if(master){ master.gain.cancelScheduledValues(ctx.currentTime); master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
      master.gain.linearRampToValueAtTime(.0001,ctx.currentTime+.4); }
    setTimeout(()=>{ if(!playing&&ctx) ctx.suspend(); if(master) master.gain.value=volEl.value/100*0.84; },440);
    playBtn.textContent='▶ タイトルを聴く'; playBtn.classList.remove('playing');
    stage.classList.remove('playing'); cab.classList.remove('on');
    bars.forEach(b=>b.style.height='2px');
  }

  const cab=document.getElementById('cab');
  const stage=document.getElementById('stage');
  const vizEl=document.getElementById('viz');
  const playBtn=document.getElementById('play');
  const volEl=document.getElementById('vol');
  for(let i=0;i<8;i++){ const s=document.createElement('div'); s.className='spark'; s.textContent='✨';
    s.style.left=(8+i*11)+'%'; s.style.top=(14+(i*13%36))+'%'; s.style.animationDelay=(i*0.32)+'s'; stage.appendChild(s); }
  const N=48, bars=[];
  for(let i=0;i<N;i++){ const b=document.createElement('i'); vizEl.appendChild(b); bars.push(b); }
  function drawViz(){ if(!playing) return; analyser.getByteFrequencyData(freqData);
    for(let i=0;i<N;i++){ const v=freqData[Math.floor(i/N*freqData.length)]/255; bars[i].style.height=(2+v*40).toFixed(1)+'px'; }
    rafId=requestAnimationFrame(drawViz); }
  playBtn.addEventListener('click', ()=> playing?stop():start());
  volEl.addEventListener('input', ()=>{ if(master) master.gain.value=volEl.value/100*0.84; });
})();
</script>

</body>
</html>
